<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Developer Agent - Cascade Analysis & Refactoring Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .control-panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .result-card h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .issue-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 10px 0;
        }

        .issue-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .issue-item.critical {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .issue-item.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .selector-name {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .property-conflict {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #6b7280;
        }

        .source-file {
            font-size: 0.85em;
            color: #9ca3af;
            margin-top: 5px;
        }

        .suggestions-panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 15px;
            margin-bottom: 15px;
            background: #f9fafb;
            border-radius: 8px;
            display: flex;
            align-items: start;
            gap: 15px;
        }

        .suggestion-icon {
            font-size: 1.5em;
        }

        .suggestion-content {
            flex: 1;
        }

        .suggestion-title {
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .suggestion-description {
            color: #6b7280;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            display: block;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            display: block;
        }

        .export-options {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .files-panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .files-panel h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .file-category {
            background: #f9fafb;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #667eea;
        }

        .file-category.html {
            border-left-color: #10B981;
        }

        .file-category.js {
            border-left-color: #F59E0B;
        }

        .file-category h4 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-count {
            background: #667eea;
            color: white;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-list li {
            padding: 5px 0;
            color: #6b7280;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .file-list li::before {
            content: '📄';
            font-size: 0.9em;
        }

        .no-files {
            color: #9ca3af;
            font-style: italic;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ CSS Developer Agent</h1>
            <p>Analyze CSS cascading issues, detect conflicts, and get refactoring suggestions</p>
        </div>

        <div class="control-panel">
            <div id="statusMessage" class="status-message"></div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="runAnalysis()">
                    🔍 Analyze Current Page
                </button>
                <button class="btn-primary" onclick="runFullAnalysis()">
                    📁 Scan All Project Files
                </button>
                <button class="btn-secondary" onclick="clearResults()">
                    🧹 Clear Results
                </button>
                <button class="btn-secondary" onclick="exportFullReport()">
                    📥 Export Report
                </button>
                <button class="btn-danger" onclick="showQuickFixes()">
                    ⚡ Quick Fixes
                </button>
            </div>
        </div>

        <div class="loading" id="loadingPanel">
            <div class="spinner"></div>
            <p>Analyzing CSS files...</p>
        </div>

        <div class="files-panel" id="filesPanel" style="display: none;">
            <h3>📂 Scanned Files</h3>
            <div class="files-grid" id="filesGrid"></div>
        </div>

        <div class="results-container" id="resultsContainer"></div>
        
        <div class="suggestions-panel" id="suggestionsPanel" style="display: none;">
            <h3>💡 Refactoring Suggestions</h3>
            <div id="suggestionsList"></div>
        </div>
    </div>

    <script src="js/css-developer-agent.js"></script>
    <script src="js/css-diagnostic-tools.js"></script>
    <script>
        let currentReport = null;

        async function runAnalysis(scanAll = false) {
            const statusMsg = document.getElementById('statusMessage');
            const loading = document.getElementById('loadingPanel');
            const results = document.getElementById('resultsContainer');
            const suggestions = document.getElementById('suggestionsPanel');
            
            // Clear previous results
            results.innerHTML = '';
            suggestions.style.display = 'none';
            statusMsg.className = 'status-message';
            
            // Show loading with appropriate message
            loading.classList.add('active');
            loading.querySelector('p').textContent = scanAll ? 
                'Scanning all project CSS and JS files...' : 
                'Analyzing CSS files...';
            
            try {
                // Run analysis
                const agent = new CSSDeveloperAgent();
                currentReport = await agent.analyze(scanAll);
                
                // Hide loading
                loading.classList.remove('active');
                
                // Show success message
                statusMsg.className = 'status-message success';
                const modeText = scanAll ? ' (Full Project Scan)' : ' (Current Page)';
                statusMsg.textContent = '✅ Analysis complete' + modeText + '! Found ' + 
                    currentReport.summary.totalRules + ' CSS rules across ' + 
                    currentReport.summary.totalFiles + ' files.';
                
                // Display results
                displayResults(currentReport);
                
            } catch (error) {
                loading.classList.remove('active');
                statusMsg.className = 'status-message error';
                statusMsg.textContent = '❌ Analysis failed: ' + error.message;
                console.error('Analysis error:', error);
            }
        }
        
        async function runFullAnalysis() {
            await runAnalysis(true);
        }

        function displayResults(report) {
            const container = document.getElementById('resultsContainer');
            
            // Display scanned files if available
            if (report.scannedFiles) {
                displayScannedFiles(report.scannedFiles);
            }
            
            // Summary cards
            let htmlContent = `
                <div class="result-card">
                    <h3>📊 Overview</h3>
                    <div class="stat-value">${report.summary.totalFiles}</div>
                    <div class="stat-label">CSS Files</div>
                    <div class="stat-value">${report.summary.totalRules}</div>
                    <div class="stat-label">Total Rules</div>
                </div>
                
                <div class="result-card">
                    <h3>⚠️ Conflicts (${report.summary.totalConflicts})</h3>
                    <div class="issue-list">
                        ${report.conflicts.map(conflict => `
                            <div class="issue-item ${conflict.severity >= 6 ? 'critical' : 'warning'}">
                                <div class="selector-name">${conflict.selector}</div>
                                <div class="property-conflict">${conflict.property}: ${conflict.conflicts.length} conflicts</div>
                                <div class="source-file">Severity: ${conflict.severity}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="result-card">
                    <h3>🔄 Duplicates (${report.summary.totalDuplicates})</h3>
                    <div class="issue-list">
                        ${report.duplicates.map(dup => `
                            <div class="issue-item">
                                <div class="selector-name">${dup.selector}</div>
                                <div class="source-file">Found in: ${dup.sources.join(', ')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="result-card">
                    <h3>🗑️ Unused Selectors (${report.summary.totalUnused})</h3>
                    <div class="issue-list">
                        ${report.unused.map(unused => `
                            <div class="issue-item">
                                <div class="selector-name">${unused.selector}</div>
                                <div class="source-file">In: ${unused.sources.join(', ')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // Add JavaScript analysis if present
            if (report.jsAnalysis) {
                htmlContent += `
                    <div class="result-card">
                        <h3>🔧 JavaScript CSS Manipulation</h3>
                        <div class="stat-value">${report.jsAnalysis.totalJSFiles}</div>
                        <div class="stat-label">JS Files with CSS Code</div>
                        <div class="stat-value">${report.jsAnalysis.totalManipulations}</div>
                        <div class="stat-label">Style Manipulations</div>
                        <div class="stat-value">${report.jsAnalysis.totalInlineStyles}</div>
                        <div class="stat-label">Total Inline Styles</div>
                        ${report.jsAnalysis.htmlInlineStyles ? `
                            <div class="stat-value">${report.jsAnalysis.htmlInlineStyles}</div>
                            <div class="stat-label">HTML Inline Styles</div>
                        ` : ''}
                    </div>
                    
                    <div class="result-card">
                        <h3>⚡ JS-CSS Conflicts (${report.jsAnalysis.jsConflicts ? report.jsAnalysis.jsConflicts.length : 0})</h3>
                        <div class="issue-list">
                            ${report.jsAnalysis.jsConflicts ? report.jsAnalysis.jsConflicts.map(conflict => `
                                <div class="issue-item critical">
                                    <div class="selector-name">${conflict.selector}</div>
                                    <div class="property-conflict">${conflict.property}</div>
                                    <div class="source-file">CSS: ${conflict.cssValue} | JS: ${conflict.jsValue}</div>
                                    <div style="font-size: 0.85em; color: #DC2626; margin-top: 5px;">
                                        ⚠️ ${conflict.resolution}
                                    </div>
                                </div>
                            `).join('') : '<div class="issue-item">No JS-CSS conflicts detected</div>'}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = htmlContent;
            
            // Display suggestions
            if (report.suggestions && report.suggestions.length > 0) {
                const suggestionsPanel = document.getElementById('suggestionsPanel');
                const suggestionsList = document.getElementById('suggestionsList');
                
                suggestionsPanel.style.display = 'block';
                suggestionsList.innerHTML = report.suggestions.map(sug => {
                    const icon = sug.priority === 'critical' ? '🔴' : 
                               sug.priority === 'high' ? '🟠' : 
                               sug.priority === 'medium' ? '🟡' : '🟢';
                    
                    return `
                        <div class="suggestion-item">
                            <div class="suggestion-icon">${icon}</div>
                            <div class="suggestion-content">
                                <div class="suggestion-title">${sug.type.replace('-', ' ').toUpperCase()}</div>
                                <div class="suggestion-description">${sug.message}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function displayScannedFiles(scannedFiles) {
            const filesPanel = document.getElementById('filesPanel');
            const filesGrid = document.getElementById('filesGrid');
            
            if (!scannedFiles || (scannedFiles.css.length === 0 && scannedFiles.html.length === 0 && scannedFiles.js.length === 0)) {
                filesPanel.style.display = 'none';
                return;
            }
            
            filesPanel.style.display = 'block';
            
            let gridContent = '';
            
            // CSS Files
            if (scannedFiles.css && scannedFiles.css.length > 0) {
                gridContent += `
                    <div class="file-category">
                        <h4>
                            CSS Files
                            <span class="file-count">${scannedFiles.css.length}</span>
                        </h4>
                        <ul class="file-list">
                            ${scannedFiles.css.map(file => `<li>${file}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            // HTML Files
            if (scannedFiles.html && scannedFiles.html.length > 0) {
                gridContent += `
                    <div class="file-category html">
                        <h4>
                            HTML Files
                            <span class="file-count">${scannedFiles.html.length}</span>
                        </h4>
                        <ul class="file-list">
                            ${scannedFiles.html.map(file => `<li>${file}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            // JS Files
            if (scannedFiles.js && scannedFiles.js.length > 0) {
                gridContent += `
                    <div class="file-category js">
                        <h4>
                            JavaScript Files
                            <span class="file-count">${scannedFiles.js.length}</span>
                        </h4>
                        <ul class="file-list">
                            ${scannedFiles.js.map(file => `<li>${file}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            filesGrid.innerHTML = gridContent;
        }

        function clearResults() {
            document.getElementById('resultsContainer').innerHTML = '';
            document.getElementById('suggestionsPanel').style.display = 'none';
            document.getElementById('filesPanel').style.display = 'none';
            document.getElementById('statusMessage').className = 'status-message';
            currentReport = null;
        }

        function exportFullReport() {
            if (!currentReport) {
                alert('Please run analysis first!');
                return;
            }
            
            const agent = new CSSDeveloperAgent();
            agent.exportReport(currentReport);
            
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.className = 'status-message success';
            statusMsg.textContent = '✅ Report exported successfully!';
        }

        function showQuickFixes() {
            if (!currentReport) {
                alert('Please run analysis first to see available quick fixes!');
                return;
            }
            
            // Show detailed quick fixes using the agent's method
            if (window.cssAgent) {
                window.cssAgent.showDetailedQuickFixes();
                alert('Detailed quick fix instructions have been logged to the console. Press F12 to view.');
            } else {
                alert('CSS Agent not available. Try running analysis first.');
            }
        }

        // Auto-run analysis on page load
        window.addEventListener('load', () => {
            console.log('CSS Developer Agent ready! Click "Analyze CSS" to start.');
        });
    </script>
</body>
</html>
