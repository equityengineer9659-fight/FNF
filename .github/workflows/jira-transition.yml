name: Jira Auto-Transition

on:
  push:
    branches-ignore: [master]
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [master]

jobs:
  in-progress:
    name: Move to In Progress on branch push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and transition
        run: |
          KEYS=$(echo "${{ github.ref_name }}" | grep -oE 'KAN-[0-9]+' | sort -u)
          if [ -z "$KEYS" ]; then
            echo "No Jira keys found in branch name, skipping."
            exit 0
          fi
          AUTH=$(echo -n "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" | base64)
          for KEY in $KEYS; do
            echo "Moving $KEY to In Progress..."
            curl -s -X POST \
              "https://foodnforce.atlassian.net/rest/api/2/issue/$KEY/transitions" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"21"}}'
          done

  in-review:
    name: Move to In Review on PR open
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and transition
        run: |
          KEYS=$(echo "${{ github.event.pull_request.title }} ${{ github.event.pull_request.head.ref }}" | grep -oE 'KAN-[0-9]+' | sort -u)
          if [ -z "$KEYS" ]; then
            echo "No Jira keys found, skipping."
            exit 0
          fi
          AUTH=$(echo -n "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" | base64)
          for KEY in $KEYS; do
            echo "Moving $KEY to In Review..."
            curl -s -X POST \
              "https://foodnforce.atlassian.net/rest/api/2/issue/$KEY/transitions" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"31"}}'
          done

  done:
    name: Move to Done on PR merge
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and transition
        run: |
          KEYS=$(echo "${{ github.event.pull_request.title }} ${{ github.event.pull_request.head.ref }}" | grep -oE 'KAN-[0-9]+' | sort -u)
          if [ -z "$KEYS" ]; then
            echo "No Jira keys found, skipping."
            exit 0
          fi
          AUTH=$(echo -n "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" | base64)
          for KEY in $KEYS; do
            echo "Moving $KEY to Done..."
            curl -s -X POST \
              "https://foodnforce.atlassian.net/rest/api/2/issue/$KEY/transitions" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"41"}}'
          done
