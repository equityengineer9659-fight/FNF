name: Jira Auto-Transition

on:
  push:
    branches-ignore: [master]
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [master]

jobs:
  in-progress:
    name: Move to In Progress on branch push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and transition
        continue-on-error: true
        run: |
          KEYS=$(echo "${{ github.ref_name }}" | grep -oE 'KAN-[0-9]+' | sort -u)
          if [ -z "$KEYS" ]; then
            echo "No Jira keys found in branch name, skipping."
            exit 0
          fi
          AUTH=$(printf '%s' "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" | tr -d '\n\r' | base64 -w 0)
          for KEY in $KEYS; do
            echo "Moving $KEY to In Progress..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://foodnforce.atlassian.net/rest/api/2/issue/$KEY/transitions" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"21"}}')
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "✅ $KEY → In Progress (HTTP $HTTP_STATUS)"
            else
              echo "⚠️ $KEY transition failed (HTTP $HTTP_STATUS)"
            fi
          done

  in-review:
    name: Move to In Review on PR open
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and transition
        continue-on-error: true
        run: |
          KEYS=$(echo "${{ github.event.pull_request.title }} ${{ github.event.pull_request.head.ref }}" | grep -oE 'KAN-[0-9]+' | sort -u)
          if [ -z "$KEYS" ]; then
            echo "No Jira keys found, skipping."
            exit 0
          fi
          AUTH=$(printf '%s' "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" | tr -d '\n\r' | base64 -w 0)
          for KEY in $KEYS; do
            echo "Moving $KEY to In Review..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://foodnforce.atlassian.net/rest/api/2/issue/$KEY/transitions" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"31"}}')
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "✅ $KEY → In Review (HTTP $HTTP_STATUS)"
            else
              echo "⚠️ $KEY transition failed (HTTP $HTTP_STATUS)"
            fi
          done

  done:
    name: Move to Done on PR merge
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and transition
        continue-on-error: true
        run: |
          KEYS=$(echo "${{ github.event.pull_request.title }} ${{ github.event.pull_request.head.ref }}" | grep -oE 'KAN-[0-9]+' | sort -u)
          if [ -z "$KEYS" ]; then
            echo "No Jira keys found, skipping."
            exit 0
          fi
          AUTH=$(printf '%s' "${{ secrets.JIRA_USER }}:${{ secrets.JIRA_API_TOKEN }}" | tr -d '\n\r' | base64 -w 0)
          for KEY in $KEYS; do
            echo "Moving $KEY to Done..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://foodnforce.atlassian.net/rest/api/2/issue/$KEY/transitions" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"41"}}')
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "✅ $KEY → Done (HTTP $HTTP_STATUS)"
            else
              echo "⚠️ $KEY transition failed (HTTP $HTTP_STATUS)"
            fi
          done
