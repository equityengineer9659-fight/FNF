name: Mobile Navigation Rollback Validation

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # Run daily at 6 AM UTC to catch any drift
    - cron: '0 6 * * *'

jobs:
  critical-navigation-tests:
    name: Critical Navigation Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install

    - name: Start dev server
      run: npm run dev &
      env:
        CI: true

    - name: Wait for server
      run: npx wait-on http://localhost:8080 --timeout 30000

    - name: Run critical navigation tests
      run: |
        node tools/testing/rollback-ci-integration.js commit
      env:
        CI: true

    - name: Upload test reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: critical-test-reports
        path: |
          test-results/
          playwright-report/
        retention-days: 7

  performance-budget-validation:
    name: Performance Budget Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install

    - name: Start dev server
      run: npm run dev &
      env:
        CI: true

    - name: Wait for server
      run: npx wait-on http://localhost:8080 --timeout 30000

    - name: Run performance budget monitoring
      run: |
        node tools/testing/performance-budget-monitor.js
      env:
        CI: true

    - name: Upload performance reports
      uses: actions/upload-artifact@v4
      with:
        name: performance-reports
        path: test-results/performance-budget-*.json
        retention-days: 30

    - name: Comment performance results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find the latest performance report
          const reportsDir = 'test-results';
          const files = fs.readdirSync(reportsDir).filter(f => f.startsWith('performance-budget-'));
          if (files.length === 0) return;
          
          const latestReport = files.sort().pop();
          const reportPath = path.join(reportsDir, latestReport);
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          
          const comment = `## 📊 Performance Budget Report
          
          **Overall Compliance:** ${report.summary.overallCompliance.toFixed(1)}% (${report.summary.passedTests}/${report.summary.totalTests} tests passed)
          
          **Average Metrics:**
          - CSS Bundle: ${report.averageMetrics.cssSize} bytes (Budget: ${report.budgets.cssBundleSize})
          - JS Bundle: ${report.averageMetrics.jsSize} bytes (Budget: ${report.budgets.jsBundleSize})
          - Load Time: ${report.averageMetrics.loadTime}ms (Budget: ${report.budgets.loadTime})
          
          **Status:** ${report.summary.budgetsMet ? '✅ All budgets met' : '❌ Budgets exceeded'}
          
          ${report.recommendations.length > 0 ? `**Recommendations:**\n${report.recommendations.map(r => `- ${r}`).join('\n')}` : ''}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  full-rollback-validation:
    name: Full Rollback Validation (Release Only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || contains(github.ref, 'release')

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install

    - name: Start dev server
      run: npm run dev &
      env:
        CI: true

    - name: Wait for server
      run: npx wait-on http://localhost:8080 --timeout 30000

    - name: Run full rollback validation suite
      run: |
        node tools/testing/rollback-ci-integration.js release
      env:
        CI: true
        BROWSER: ${{ matrix.browser }}

    - name: Upload comprehensive test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: full-validation-reports-${{ matrix.browser }}
        path: |
          test-results/
          playwright-report/
        retention-days: 30

  accessibility-regression-check:
    name: Accessibility Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Start dev server
      run: npm run dev &
      env:
        CI: true

    - name: Wait for server
      run: npx wait-on http://localhost:8080 --timeout 30000

    - name: Run accessibility tests
      run: npm run test:accessibility
      env:
        CI: true

    - name: Upload accessibility reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-reports
        path: |
          pa11y-ci-results.json
          test-results/a11y-*.json
        retention-days: 7

  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [critical-navigation-tests, performance-budget-validation, accessibility-regression-check]
    if: always()

    steps:
    - name: Check quality gates
      run: |
        echo "=== QUALITY GATE SUMMARY ==="
        echo "Critical Navigation: ${{ needs.critical-navigation-tests.result }}"
        echo "Performance Budget: ${{ needs.performance-budget-validation.result }}"
        echo "Accessibility: ${{ needs.accessibility-regression-check.result }}"
        
        if [[ "${{ needs.critical-navigation-tests.result }}" == "success" && \
              "${{ needs.performance-budget-validation.result }}" == "success" && \
              "${{ needs.accessibility-regression-check.result }}" == "success" ]]; then
          echo "✅ All quality gates passed - Safe to deploy"
          exit 0
        else
          echo "❌ Quality gates failed - Deployment blocked"
          exit 1
        fi

    - name: Create quality gate status check
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const success = '${{ needs.critical-navigation-tests.result }}' === 'success' &&
                         '${{ needs.performance-budget-validation.result }}' === 'success' &&
                         '${{ needs.accessibility-regression-check.result }}' === 'success';
          
          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: success ? 'success' : 'failure',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            description: success ? 'All quality gates passed' : 'Quality gates failed',
            context: 'rollback-validation/quality-gates'
          });

# Slack notification for critical failures (optional)
  notify-on-failure:
    name: Notify on Critical Failure
    runs-on: ubuntu-latest
    needs: [critical-navigation-tests, performance-budget-validation]
    if: failure() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
    - name: Notify team of critical failure
      run: |
        echo "🚨 CRITICAL: Mobile navigation regression detected on main branch"
        echo "This indicates the rollback validation failed"
        echo "Immediate action required to prevent production deployment"
        # Add Slack webhook or email notification here if needed