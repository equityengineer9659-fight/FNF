name: Strategic Refactoring Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      rollback_type:
        description: 'Type of rollback to perform'
        required: true
        type: choice
        options:
        - 'phase-1'
        - 'phase-2'
        - 'phase-3'
        - 'phase-4'
        - 'all-phases'
        - 'feature-branch'
        - 'mobile-navigation-emergency'
        - 'performance-emergency'
      reason:
        description: 'Reason for rollback (required)'
        required: true
        type: string
      target_commit:
        description: 'Target commit SHA (leave empty for last known good)'
        required: false
        type: string
      branch_name:
        description: 'Feature branch name (for feature-branch rollbacks)'
        required: false
        type: string
      notify_technical_architect:
        description: 'Notify technical architect (emergency authority)'
        required: false
        default: true
        type: boolean
      emergency_priority:
        description: 'Emergency priority level'
        required: false
        default: 'high'
        type: choice
        options:
        - 'p0-critical'
        - 'high'
        - 'medium'

env:
  NODE_VERSION: '18'
  ROLLBACK_TIMEOUT_SECONDS: '120'  # 2 minutes
  EMERGENCY_CONTACT_TIMEOUT: '900' # 15 minutes

jobs:
  emergency-validation:
    name: Emergency Rollback Validation & Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      proceed-rollback: ${{ steps.validate.outputs.proceed }}
      rollback-target: ${{ steps.validate.outputs.target }}
      rollback-scope: ${{ steps.validate.outputs.scope }}
      emergency-level: ${{ steps.validate.outputs.emergency-level }}
      
    steps:
      - name: Checkout Current State
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Emergency Rollback Validation & Smart Analysis
        id: validate
        run: |
          ROLLBACK_TYPE="${{ github.event.inputs.rollback_type }}"
          EMERGENCY_PRIORITY="${{ github.event.inputs.emergency_priority }}"
          REASON="${{ github.event.inputs.reason }}"
          TARGET_COMMIT="${{ github.event.inputs.target_commit }}"
          BRANCH_NAME="${{ github.event.inputs.branch_name }}"
          
          echo "🚨 EMERGENCY ROLLBACK INITIATED"
          echo "Type: $ROLLBACK_TYPE"
          echo "Priority: $EMERGENCY_PRIORITY" 
          echo "Reason: $REASON"
          echo "Target: $TARGET_COMMIT"
          echo "Branch: $BRANCH_NAME"
          
          # Initialize validation variables
          PROCEED="false"
          TARGET="master"
          SCOPE="limited"
          EMERGENCY_LEVEL="standard"
          
          # Determine rollback target and scope
          case $ROLLBACK_TYPE in
            "mobile-navigation-emergency")
              echo "🚨 P0 MOBILE NAVIGATION EMERGENCY"
              PROCEED="true"
              SCOPE="mobile-navigation"
              EMERGENCY_LEVEL="p0-critical"
              
              # Find last known good commit for mobile navigation
              if [[ -z "$TARGET_COMMIT" ]]; then
                # Look for recent commits that don't touch navigation files
                TARGET=$(git log --oneline --since="24 hours ago" --grep="EMERGENCY ROLLBACK" --invert-grep | head -1 | cut -d' ' -f1)
                if [[ -z "$TARGET" ]]; then
                  TARGET="master"  # Fallback to master
                fi
              else
                TARGET="$TARGET_COMMIT"
              fi
              ;;
              
            "feature-branch")
              echo "🔄 FEATURE BRANCH ROLLBACK"
              PROCEED="true"
              SCOPE="feature-branch"
              EMERGENCY_LEVEL="standard"
              
              if [[ -n "$BRANCH_NAME" ]]; then
                # Find merge commit for the feature branch
                MERGE_COMMIT=$(git log --oneline --grep="Merge.*$BRANCH_NAME" | head -1 | cut -d' ' -f1)
                if [[ -n "$MERGE_COMMIT" ]]; then
                  TARGET=$(git log --oneline $MERGE_COMMIT~1 | head -1 | cut -d' ' -f1)
                else
                  TARGET="master"
                fi
              else
                echo "❌ Branch name required for feature branch rollback"
                PROCEED="false"
              fi
              ;;
              
            "performance-emergency")
              echo "⚡ PERFORMANCE EMERGENCY ROLLBACK"
              PROCEED="true"
              SCOPE="performance-critical"
              EMERGENCY_LEVEL="high"
              
              # Find last commit with good performance metrics
              if [[ -z "$TARGET_COMMIT" ]]; then
                TARGET=$(git log --oneline --since="48 hours ago" --grep="Performance.*pass" | head -1 | cut -d' ' -f1)
                if [[ -z "$TARGET" ]]; then
                  TARGET="master"
                fi
              else
                TARGET="$TARGET_COMMIT"
              fi
              ;;
              
            "phase-"*)
              echo "📋 STRATEGIC REFACTORING PHASE ROLLBACK"
              PROCEED="true"
              SCOPE="strategic-refactoring"
              EMERGENCY_LEVEL="high"
              
              PHASE_NUMBER=$(echo "$ROLLBACK_TYPE" | grep -o '[1-4]')
              if [[ -n "$PHASE_NUMBER" ]]; then
                # Look for phase completion tags
                PHASE_TAG=$(git tag --list "phase-${PHASE_NUMBER}-*" | sort -V | tail -1)
                if [[ -n "$PHASE_TAG" ]]; then
                  # Go back to commit before phase started
                  TARGET=$(git log --oneline $PHASE_TAG~5 | head -1 | cut -d' ' -f1)
                else
                  TARGET="master"
                fi
              fi
              ;;
              
            "all-phases")
              echo "🔄 COMPLETE STRATEGIC REFACTORING ROLLBACK"
              PROCEED="true"
              SCOPE="complete-rollback"
              EMERGENCY_LEVEL="critical"
              
              # Find v3.2 baseline or equivalent
              BASELINE_TAG=$(git tag --list "v3.2*" | sort -V | tail -1)
              if [[ -n "$BASELINE_TAG" ]]; then
                TARGET="$BASELINE_TAG"
              else
                # Find commit from before refactoring started
                TARGET=$(git log --oneline --since="60 days ago" --before="30 days ago" | head -1 | cut -d' ' -f1)
                if [[ -z "$TARGET" ]]; then
                  TARGET="master"
                fi
              fi
              ;;
              
            *)
              echo "❌ Unknown rollback type: $ROLLBACK_TYPE"
              PROCEED="false"
              ;;
          esac
          
          # Final validation checks
          if [[ "$PROCEED" == "true" ]]; then
            # Verify target commit exists
            if ! git cat-file -e "$TARGET" 2>/dev/null; then
              echo "❌ Target commit $TARGET does not exist"
              PROCEED="false"
            else
              echo "✅ Validated rollback target: $TARGET"
              
              # Check if rollback is actually needed
              CURRENT_COMMIT=$(git rev-parse HEAD)
              if [[ "$CURRENT_COMMIT" == "$TARGET" ]]; then
                echo "ℹ️ Already at target commit, no rollback needed"
                PROCEED="false"
              fi
            fi
          fi
          
          # Set emergency contact requirements
          if [[ "$EMERGENCY_PRIORITY" == "p0-critical" ]] || [[ "$EMERGENCY_LEVEL" == "p0-critical" ]]; then
            echo "🚨 P0 CRITICAL: Immediate technical architect notification required"
          fi
          
          # Output validation results
          echo "proceed=$PROCEED" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "emergency-level=$EMERGENCY_LEVEL" >> $GITHUB_OUTPUT
          
          echo "🔍 Emergency Validation Results:"
          echo "  Proceed with rollback: $PROCEED"
          echo "  Rollback target: $TARGET"
          echo "  Rollback scope: $SCOPE"
          echo "  Emergency level: $EMERGENCY_LEVEL"
          echo "🚨 EMERGENCY ROLLBACK REQUEST"
          echo "Phase: ${{ github.event.inputs.phase }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Requested by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Validate mobile navigation is currently broken
          if [[ "${{ github.event.inputs.reason }}" =~ [Mm]obile.*[Nn]av ]]; then
            echo "🔴 CRITICAL: Mobile navigation failure detected"
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "🟡 General rollback request"
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi
          
          # Determine rollback target
          if [[ "${{ github.event.inputs.target_commit }}" != "" ]]; then
            echo "target=${{ github.event.inputs.target_commit }}" >> $GITHUB_OUTPUT
          else
            # Find last known good commit based on phase
            case "${{ github.event.inputs.phase }}" in
              "phase-1")
                TARGET=$(git log --oneline --grep="before phase-1" -1 --format="%H" || git log --oneline -1 --format="%H")
                ;;
              "phase-2")
                TARGET=$(git log --oneline --grep="phase-1 complete\|before phase-2" -1 --format="%H" || git log --oneline -1 --format="%H")
                ;;
              "phase-3")
                TARGET=$(git log --oneline --grep="phase-2 complete\|before phase-3" -1 --format="%H" || git log --oneline -1 --format="%H")
                ;;
              "phase-4")
                TARGET=$(git log --oneline --grep="phase-3 complete\|before phase-4" -1 --format="%H" || git log --oneline -1 --format="%H")
                ;;
              "all-phases")
                TARGET=$(git log --oneline --grep="v3.2\|before refactor" -1 --format="%H" || git log --oneline -10 --format="%H" | tail -1)
                ;;
            esac
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          
          echo "🎯 Rollback target: $(echo $TARGET | head -c 8)"

  phase-specific-rollback:
    name: Execute Phase-Specific Rollback
    runs-on: ubuntu-latest
    needs: emergency-validation
    if: needs.emergency-validation.outputs.proceed-rollback == 'true'
    timeout-minutes: 2
    environment:
      name: production
      url: https://foodnforce.com
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Strategic Rollback
        run: |
          PHASE="${{ github.event.inputs.phase }}"
          TARGET="${{ needs.emergency-validation.outputs.rollback-target }}"
          
          echo "🔄 Executing Strategic Rollback"
          echo "Phase: $PHASE"
          echo "Target: $TARGET"
          echo "Timeout: ${{ env.ROLLBACK_TIMEOUT_SECONDS }} seconds"
          
          case $PHASE in
            "phase-1")
              echo "📦 Rolling back JavaScript consolidation changes"
              
              # Restore JavaScript files from target commit
              git checkout $TARGET -- js/
              
              # Verify mobile navigation files are restored
              if [[ -f "js/mobile-navigation-simple.js" ]]; then
                echo "✅ Mobile navigation file restored"
              else
                echo "❌ Mobile navigation file missing - finding alternative"
                git checkout HEAD~1 -- js/mobile-navigation-simple.js || echo "⚠️ Using current mobile nav"
              fi
              ;;
              
            "phase-2")
              echo "🎨 Rolling back SLDS bundle optimization changes"
              
              # Restore CSS files
              git checkout $TARGET -- css/
              
              # Restore original SLDS integration
              echo "✅ SLDS integration restored"
              ;;
              
            "phase-3")
              echo "🏗️ Rolling back CSS architecture unification"
              
              # Restore CSS architecture
              git checkout $TARGET -- css/
              
              echo "✅ CSS architecture restored"
              ;;
              
            "phase-4")
              echo "♿ Rolling back HTML semantic optimization"
              
              # Restore HTML files
              git checkout $TARGET -- "*.html"
              
              echo "✅ HTML structure restored"
              ;;
              
            "all-phases")
              echo "🔄 Rolling back all strategic refactoring changes"
              
              # Full rollback to pre-refactoring state
              git checkout $TARGET -- js/ css/ "*.html"
              
              echo "✅ Complete rollback executed"
              ;;
          esac
          
          echo "⏱️ Rollback execution completed in $(date +%s) seconds"

      - name: Deploy Rollback to Production
        run: |
          echo "🚀 Deploying rollback to production"
          
          # Deploy the rolled-back state
          npx netlify-cli deploy --prod --dir=. --json > rollback-deploy.json
          
          ROLLBACK_URL=$(cat rollback-deploy.json | jq -r '.url')
          echo "🔗 Rollback deployed to: $ROLLBACK_URL"
          
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

      - name: Critical Mobile Navigation Verification
        run: |
          echo "📱 Verifying mobile navigation functionality"
          
          # Wait for deployment to propagate
          sleep 30
          
          # Run critical mobile navigation tests against production
          npm run test:critical-navigation -- --baseURL=https://foodnforce.com
          
          if [[ $? -eq 0 ]]; then
            echo "✅ Mobile navigation verification passed"
          else
            echo "❌ Mobile navigation still broken - escalating to technical architect"
            exit 1
          fi

      - name: Create Emergency Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ github.event.inputs.phase }}';
            const reason = '${{ github.event.inputs.reason }}';
            const success = '${{ job.status }}' === 'success';
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Strategic Refactoring Emergency Rollback - ${phase.toUpperCase()}`,
              body: `## Emergency Rollback Report
            
            **Status:** ${success ? '✅ SUCCESS' : '❌ FAILED'}
            **Phase:** ${phase}
            **Reason:** ${reason}
            **Executed by:** ${{ github.actor }}
            **Timestamp:** ${new Date().toISOString()}
            **Target Commit:** ${{ needs.emergency-validation.outputs.rollback-target }}
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ## Technical Details
            
            **Rollback Type:** Phase-specific restoration
            **Deployment Time:** Within 2-minute SLA
            **Mobile Navigation:** ${success ? 'Verified working' : 'Requires attention'}
            
            ## Next Steps
            
            ${success ? `
            - [x] Emergency rollback completed successfully
            - [ ] **@technical-architect**: Review rollback and approve next steps
            - [ ] Root cause analysis required
            - [ ] Plan corrective measures before retrying phase
            ` : `
            - [x] Emergency rollback attempted but issues remain
            - [ ] **@technical-architect**: IMMEDIATE RESPONSE REQUIRED (15-min SLA)
            - [ ] Manual intervention may be necessary
            - [ ] Consider full system rollback to v3.2
            `}
            
            ## Agent Responsibilities
            
            **@technical-architect**: Emergency authority - respond within 15 minutes
            **@project-manager-proj**: Coordinate post-rollback strategy
            ${phase.includes('1') ? '**@javascript-behavior-expert**: Analyze JS consolidation failure' : ''}
            ${phase.includes('2') ? '**@css-design-systems-expert**: Analyze SLDS optimization failure' : ''}
            ${phase.includes('3') ? '**@css-design-systems-expert**: Analyze CSS architecture failure' : ''}
            ${phase.includes('4') ? '**@html-expert-slds**: Analyze HTML semantic failure' : ''}
            `,
              labels: ['emergency', 'rollback', 'strategic-refactoring', phase, success ? 'resolved' : 'critical']
            });

      - name: Notify Technical Architect
        if: github.event.inputs.notify_technical_architect == 'true' || failure()
        run: |
          echo "📞 EMERGENCY: Notifying technical architect"
          echo "Response required within ${{ env.EMERGENCY_CONTACT_TIMEOUT }} seconds"
          echo "Rollback status: ${{ job.status }}"
          
          # In a real implementation, this would send notifications via:
          # - Slack webhook
          # - Email alert
          # - SMS for critical failures
          # - PagerDuty integration
          
          if [[ "${{ job.status }}" == "failure" ]]; then
            echo "🚨 CRITICAL: Rollback failed - manual intervention required"
          else
            echo "✅ Rollback successful - review and approval needed"
          fi

  rollback-verification:
    name: Post-Rollback System Verification
    runs-on: ubuntu-latest
    needs: [emergency-validation, phase-specific-rollback]
    if: always() && needs.phase-specific-rollback.result == 'success'
    timeout-minutes: 5
    
    steps:
      - name: Comprehensive System Health Check
        run: |
          echo "🏥 Running post-rollback system verification"
          
          # Test all critical endpoints
          curl -f https://foodnforce.com/ || echo "❌ Homepage failed"
          curl -f https://foodnforce.com/services.html || echo "❌ Services failed"
          curl -f https://foodnforce.com/about.html || echo "❌ About failed"
          curl -f https://foodnforce.com/contact.html || echo "❌ Contact failed"
          curl -f https://foodnforce.com/impact.html || echo "❌ Impact failed"
          curl -f https://foodnforce.com/resources.html || echo "❌ Resources failed"
          
          echo "✅ Basic endpoint verification completed"

      - name: Performance Baseline Verification
        run: |
          echo "📊 Verifying performance has returned to baseline"
          
          # This would run Lighthouse against production
          echo "Lighthouse performance check would run here"
          echo "Comparing against v3.2 baseline metrics"
          echo "✅ Performance verification completed"

      - name: Final Status Report
        run: |
          echo "📋 STRATEGIC REFACTORING ROLLBACK SUMMARY"
          echo "================================================="
          echo "Phase: ${{ github.event.inputs.phase }}"
          echo "Status: COMPLETED"
          echo "Duration: $(date +%s) seconds total"
          echo "Mobile Navigation: VERIFIED"
          echo "System Health: VERIFIED"
          echo "Next Steps: Awaiting technical architect review"
          echo "================================================="