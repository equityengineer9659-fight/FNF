name: Food-N-Force CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # QUALITY GATES - Code Quality & Validation
  # ============================================
  quality-checks:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: HTML Validation
        run: npm run validate:html

      - name: CSS Linting
        run: npm run lint:css

      - name: JavaScript Linting
        run: npm run lint:js

      - name: Unit Tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          VITE_ENV: production
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ============================================
  # DEPLOY TO SITEGROUND (master branch only)
  # ============================================
  deploy:
    name: Deploy to SiteGround
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SSH_PASS: ${{ secrets.SITEGROUND_SSH_PASSPHRASE }}
          SSH_HOST: ${{ secrets.SITEGROUND_HOST }}
          SSH_USER: ${{ secrets.SITEGROUND_USER }}
          SSH_PORT: ${{ secrets.SITEGROUND_PORT }}
        run: |
          sudo apt-get install -y expect

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Use expect to handle passphrase for ssh-add
          eval "$(ssh-agent -s)"
          expect <<EOF
          spawn ssh-add /home/runner/.ssh/deploy_key
          expect "Enter passphrase"
          send "$SSH_PASS\r"
          expect eof
          EOF

          # Deploy to www path (what the web server reads)
          rsync -avz --delete -e "ssh -p $SSH_PORT" \
            dist/ \
            ${SSH_USER}@${SSH_HOST}:www/food-n-force.com/public_html/

          # Flush SiteGround caches after deploy
          ssh -p $SSH_PORT ${SSH_USER}@${SSH_HOST} "cd www/food-n-force.com/public_html && find . -name '*.html' -exec touch {} + 2>/dev/null; echo 'Cache touch complete'" || true
          # Flush Memcached if available (SiteGround managed cache)
          ssh -p $SSH_PORT ${SSH_USER}@${SSH_HOST} "echo 'flush_all' | nc -q1 localhost 11211 2>/dev/null && echo 'Memcached flushed' || echo 'Memcached flush skipped (not available via CLI)'"

          echo "✅ Files deployed to SiteGround"

      - name: Post-Deployment Health Check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://food-n-force.com)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Deployment successful — site is live"
          else
            echo "⚠️ Site returned HTTP $STATUS — please verify manually"
          fi
