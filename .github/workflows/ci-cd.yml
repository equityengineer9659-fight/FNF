name: Food-N-Force CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # QUALITY GATES - Code Quality & Validation
  # ============================================
  quality-checks:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: HTML Validation
        run: npm run validate:html

      - name: CSS Linting
        run: npm run lint:css

      - name: JavaScript Linting
        run: npm run lint:js

      - name: Unit Tests
        run: npm run test:unit:coverage

      - name: Build
        run: npm run build
        env:
          VITE_ENV: production
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Accessibility Tests (sample)
        run: |
          node scripts/generate-pa11y-config.js --mode=sample
          npx vite preview --port 4173 &
          PREVIEW_PID=$!
          sleep 3
          npm run test:accessibility
          kill $PREVIEW_PID || true
        continue-on-error: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          include-hidden-files: true
          retention-days: 1

  # ============================================
  # DEPLOY TO SITEGROUND (master branch only)
  # ============================================
  deploy:
    name: Deploy to SiteGround
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    # P2-33: Serialize deploys so two rapid merges to master can't race
    # rsync + scp against SiteGround's public_html/. `cancel-in-progress: false`
    # preserves in-flight deploys — new pushes wait in line.
    concurrency:
      group: deploy-siteground
      cancel-in-progress: false

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SSH_PASS: ${{ secrets.SITEGROUND_SSH_PASSPHRASE }}
          SSH_HOST: ${{ secrets.SITEGROUND_HOST }}
          SSH_USER: ${{ secrets.SITEGROUND_USER }}
          SSH_PORT: ${{ secrets.SITEGROUND_PORT }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CHARITY_NAVIGATOR_API_KEY: ${{ secrets.CHARITY_NAVIGATOR_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          eval "$(ssh-agent -s)"

          # Load SSH key — handle passphrase-protected key or plain key
          if [ -n "$SSH_PASS" ]; then
            PASS_FILE=$(mktemp)
            echo "$SSH_PASS" > "$PASS_FILE"
            chmod 600 "$PASS_FILE"
            ASKPASS=$(mktemp /tmp/askpass.XXXXXX)
            chmod 700 "$ASKPASS"
            trap 'rm -f "$PASS_FILE" "$ASKPASS"' EXIT
            printf '#!/bin/sh\ncat "%s"\n' "$PASS_FILE" > "$ASKPASS"
            DISPLAY=:0 SSH_ASKPASS_REQUIRE=force SSH_ASKPASS="$ASKPASS" \
              ssh-add ~/.ssh/deploy_key < /dev/null
          else
            ssh-add ~/.ssh/deploy_key
          fi

          # Deploy to www path (what the web server reads)
          # Exclude api/_config.php so rsync --delete doesn't wipe it in the
          # window before the subsequent scp re-uploads it (audit 2026-04-13, P0-4)
          rsync -avz --delete --exclude 'api/_config.php' -e "ssh -p $SSH_PORT" \
            dist/ \
            "${SSH_USER}@${SSH_HOST}:www/food-n-force.com/public_html/"

          # Write API config — generate locally then scp to avoid passing
          # secrets as SSH command arguments (prevents process inspection
          # and remote shell history exposure)
          CONFIG_PATH="www/food-n-force.com/public_html/api/_config.php"
          printf "<?php\ndefine('BLS_API_KEY', '%s');\ndefine('MAPBOX_ACCESS_TOKEN', '%s');\ndefine('FRED_API_KEY', '%s');\ndefine('CHARITY_NAVIGATOR_API_KEY', '%s');\n" \
            "$BLS_API_KEY" "$MAPBOX_ACCESS_TOKEN" "$FRED_API_KEY" "$CHARITY_NAVIGATOR_API_KEY" \
            > /tmp/_config.php
          scp -P "$SSH_PORT" /tmp/_config.php "${SSH_USER}@${SSH_HOST}:${CONFIG_PATH}"
          rm -f /tmp/_config.php

          # Verify _config.php landed with valid contents — guards against
          # silent scp failures that would leave PHP proxies returning 500
          # (audit 2026-04-09, P0-4)
          ssh -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" \
            "test -f '$CONFIG_PATH' && grep -q 'BLS_API_KEY' '$CONFIG_PATH'" \
            || { echo "::error::_config.php upload verification failed — dashboard PHP proxies will return 500"; exit 1; }
          echo "✅ _config.php verified on server"

          # Flush LiteSpeed page cache (stored in .lscache/ directory)
          ssh -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" "rm -rf ~/www/food-n-force.com/public_html/.lscache/ 2>/dev/null && echo 'LiteSpeed cache cleared' || echo 'No .lscache found'" || true
          # Flush Memcached if available (SiteGround managed cache)
          ssh -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" "echo 'flush_all' | nc -q1 localhost 11211 2>/dev/null && echo 'Memcached flushed' || echo 'Memcached flush skipped (not available via CLI)'" || true

          echo "✅ Files deployed to SiteGround"

      - name: Post-Deployment Health Check
        run: |
          # Retry up to 6 times (90s total) — LiteSpeed cache warm-up after
          # flush can briefly return 202 before settling on 200.
          sleep 10
          STATUS=0
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://food-n-force.com)
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Deployment successful — site is live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: site returned HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Production health check passed (HTTP $STATUS)"
          else
            echo "::error::Production health check failed after retries (HTTP $STATUS)"
            exit 1
          fi
