name: Food-N-Force CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # ============================================
  # QUALITY GATES - Code Quality & Validation
  # ============================================
  quality-checks:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: HTML Validation
        run: npm run validate:html

      - name: CSS Linting
        run: npm run lint:css

      - name: JavaScript Linting
        run: npm run lint:js

      - name: Unit Tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          VITE_ENV: production

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ============================================
  # DEPLOY TO SITEGROUND (master branch only)
  # ============================================
  deploy:
    name: Deploy to SiteGround
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          passphrase: ${{ secrets.SITEGROUND_SSH_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          source: "dist/*"
          target: "food-n-force.com/public_html"
          strip_components: 1
          rm: true

      - name: Post-Deployment Health Check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://food-n-force.com)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Deployment successful — site is live"
          else
            echo "⚠️ Site returned HTTP $STATUS — please verify manually"
          fi
