name: Strategic Refactoring Continuous Monitoring

on:
  schedule:
    # Run every 15 minutes during active refactoring phases
    - cron: '*/15 * * * *'
  push:
    branches: [ master, main, develop, 'phase-*', 'refactor/*' ]
  workflow_dispatch:
    inputs:
      monitoring_intensity:
        description: 'Monitoring Intensity'
        required: false
        type: choice
        default: 'standard'
        options:
        - 'light'
        - 'standard' 
        - 'intensive'
        - 'emergency'

env:
  NODE_VERSION: '18'
  MONITORING_TIMEOUT: '5'
  EMERGENCY_RESPONSE_TIME: '15'

jobs:
  detect-active-phase:
    name: Detect Active Refactoring Phase
    runs-on: ubuntu-latest
    outputs:
      active-phase: ${{ steps.detect.outputs.phase }}
      monitoring-required: ${{ steps.detect.outputs.monitoring-required }}
      alert-level: ${{ steps.detect.outputs.alert-level }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Current Phase
        id: detect
        run: |
          # Detect active refactoring phase
          MONITORING_REQUIRED="false"
          ALERT_LEVEL="info"
          PHASE="none"
          
          # Check branch name for phase indicators
          if [[ "${{ github.ref }}" =~ phase-[1-4] ]]; then
            PHASE=$(echo "${{ github.ref }}" | grep -o 'phase-[1-4]')
            MONITORING_REQUIRED="true"
            ALERT_LEVEL="warning"
          fi
          
          # Check for phase transition files
          if [[ -d ".phase-transition" ]]; then
            MONITORING_REQUIRED="true"
            ALERT_LEVEL="info"
            
            if [[ -f ".phase-transition/phase-1-plan.md" ]]; then
              PHASE="phase-1"
            elif [[ -f ".phase-transition/phase-2-plan.md" ]]; then
              PHASE="phase-2"
            elif [[ -f ".phase-transition/phase-3-plan.md" ]]; then
              PHASE="phase-3"
            elif [[ -f ".phase-transition/phase-4-plan.md" ]]; then
              PHASE="phase-4"
            fi
          fi
          
          # Check for recent refactoring commits
          if git log --oneline -10 | grep -E "(phase-[1-4]|refactor|consolidat|optim|unif)" > /dev/null; then
            MONITORING_REQUIRED="true"
          fi
          
          # Override for manual intensive monitoring
          if [[ "${{ github.event.inputs.monitoring_intensity }}" == "intensive" ]] || [[ "${{ github.event.inputs.monitoring_intensity }}" == "emergency" ]]; then
            MONITORING_REQUIRED="true"
            ALERT_LEVEL="critical"
          fi
          
          echo "phase=$PHASE" >> $GITHUB_OUTPUT
          echo "monitoring-required=$MONITORING_REQUIRED" >> $GITHUB_OUTPUT
          echo "alert-level=$ALERT_LEVEL" >> $GITHUB_OUTPUT
          
          echo "🔍 Active Phase: $PHASE"
          echo "📊 Monitoring Required: $MONITORING_REQUIRED"
          echo "🚨 Alert Level: $ALERT_LEVEL"

  mobile-navigation-monitoring:
    name: Mobile Navigation Continuous Monitoring
    runs-on: ubuntu-latest
    needs: detect-active-phase
    if: needs.detect-active-phase.outputs.monitoring-required == 'true'
    timeout-minutes: 5
    
    strategy:
      matrix:
        environment: [production, staging]
        browser: [chromium, firefox]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          npx playwright install ${{ matrix.browser }}

      - name: Mobile Navigation Health Check
        id: nav-check
        run: |
          echo "📱 Mobile Navigation Health Check - ${{ matrix.environment }}"
          
          # Determine base URL
          if [[ "${{ matrix.environment }}" == "production" ]]; then
            BASE_URL="https://foodnforce.com"
          else
            BASE_URL="http://localhost:8080"
            # Start local server for staging tests
            npm run dev &
            sleep 10
          fi
          
          # Run mobile navigation tests
          FAILED_PAGES=""
          PAGES=("/" "/services.html" "/about.html" "/contact.html" "/impact.html" "/resources.html")
          
          for page in "${PAGES[@]}"; do
            echo "Testing: $BASE_URL$page"
            
            if ! npx playwright test --grep="Mobile navigation toggle works" --project=${{ matrix.browser }} --config=tools/testing/playwright.config.js; then
              FAILED_PAGES="$FAILED_PAGES $page"
            fi
          done
          
          if [[ -n "$FAILED_PAGES" ]]; then
            echo "failed-pages=$FAILED_PAGES" >> $GITHUB_OUTPUT
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Mobile navigation failed on pages:$FAILED_PAGES"
            exit 1
          else
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Mobile navigation working on all pages"
          fi

      - name: Create Failure Alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ needs.detect-active-phase.outputs.active-phase }}';
            const environment = '${{ matrix.environment }}';
            const browser = '${{ matrix.browser }}';
            const failedPages = '${{ steps.nav-check.outputs.failed-pages }}';
            
            // Create emergency issue for mobile navigation failure
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 MOBILE NAVIGATION FAILURE DETECTED - ${environment.toUpperCase()}`,
              body: `## 🚨 CRITICAL MOBILE NAVIGATION FAILURE

            **Environment:** ${environment}
            **Browser:** ${browser}
            **Active Phase:** ${phase}
            **Failed Pages:** ${failedPages}
            **Detection Time:** ${new Date().toISOString()}
            **Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## Immediate Actions Required

            **@technical-architect**: EMERGENCY RESPONSE REQUIRED (15-minute SLA)

            This is a P0 failure affecting mobile navigation functionality. Immediate investigation and potential rollback may be required.

            ## Emergency Procedures

            1. **Immediate Assessment**: Verify if this is a genuine failure or test environment issue
            2. **Impact Analysis**: Determine if production users are affected
            3. **Rollback Decision**: Consider emergency rollback if production is impacted
            4. **Root Cause**: Identify what change caused the failure

            ## Quick Actions

            **Emergency Rollback:**
            \`\`\`bash
            gh workflow run strategic-rollback.yml -f phase="${phase}" -f reason="Mobile navigation failure detected by monitoring"
            \`\`\`

            **Check Production Status:**
            \`\`\`bash
            curl -f https://foodnforce.com/
            \`\`\`

            ## Agent Notifications

            - **@technical-architect**: Emergency authority (15-min response)
            - **@javascript-behavior-expert**: Analyze JS issues if Phase 1
            - **@css-design-systems-expert**: Analyze styling if Phase 2-3
            - **@project-manager-proj**: Coordinate response`,
              labels: ['critical', 'mobile-navigation', 'P0', phase, environment, 'emergency-response']
            });

            // If this is production failure, also create status check failure
            if (environment === 'production') {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: 'failure',
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${issue.data.number}`,
                description: `Mobile navigation failure in production (${browser})`,
                context: 'strategic-refactoring/mobile-nav-monitoring'
              });
            }

  performance-monitoring:
    name: Performance Budget Monitoring  
    runs-on: ubuntu-latest
    needs: detect-active-phase
    if: needs.detect-active-phase.outputs.monitoring-required == 'true'
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Performance Budget Analysis
        id: performance
        run: |
          echo "📊 Performance Budget Analysis"
          
          PHASE="${{ needs.detect-active-phase.outputs.active-phase }}"
          BUDGET_VIOLATIONS=""
          
          # JavaScript bundle analysis
          if [[ -d "js/" ]]; then
            JS_SIZE=$(find js/ -name "*.js" -exec wc -c {} + | tail -1 | awk '{print $1}')
            JS_SIZE_KB=$((JS_SIZE / 1024))
            
            echo "JavaScript Bundle: ${JS_SIZE_KB}KB"
            
            case $PHASE in
              "phase-1"|"phase-2"|"phase-3"|"phase-4")
                if [[ $JS_SIZE_KB -gt 90 ]]; then
                  BUDGET_VIOLATIONS="$BUDGET_VIOLATIONS JS:${JS_SIZE_KB}KB>90KB"
                fi
                ;;
            esac
          fi
          
          # CSS bundle analysis
          if [[ -d "css/" ]]; then
            CSS_SIZE=$(find css/ -name "*.css" -exec wc -c {} + | tail -1 | awk '{print $1}')
            CSS_SIZE_KB=$((CSS_SIZE / 1024))
            
            echo "CSS Bundle: ${CSS_SIZE_KB}KB"
            
            case $PHASE in
              "phase-2"|"phase-3"|"phase-4")
                if [[ $CSS_SIZE_KB -gt 200 ]]; then
                  BUDGET_VIOLATIONS="$BUDGET_VIOLATIONS CSS:${CSS_SIZE_KB}KB>200KB"
                fi
                ;;
            esac
          fi
          
          # !important declarations analysis
          if [[ -d "css/" ]]; then
            IMPORTANT_COUNT=$(find css/ -name "*.css" -exec grep -c "!important" {} \; | awk '{sum += $1} END {print sum}')
            
            echo "!important declarations: $IMPORTANT_COUNT"
            
            case $PHASE in
              "phase-3"|"phase-4")
                if [[ $IMPORTANT_COUNT -gt 400 ]]; then
                  BUDGET_VIOLATIONS="$BUDGET_VIOLATIONS IMPORTANT:${IMPORTANT_COUNT}>400"
                fi
                ;;
            esac
          fi
          
          if [[ -n "$BUDGET_VIOLATIONS" ]]; then
            echo "violations=$BUDGET_VIOLATIONS" >> $GITHUB_OUTPUT
            echo "status=violated" >> $GITHUB_OUTPUT
            echo "❌ Budget violations: $BUDGET_VIOLATIONS"
            exit 1
          else
            echo "status=compliant" >> $GITHUB_OUTPUT
            echo "✅ All performance budgets within limits"
          fi

      - name: Alert on Budget Violations
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const violations = '${{ steps.performance.outputs.violations }}';
            const phase = '${{ needs.detect-active-phase.outputs.active-phase }}';
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Performance Budget Violations - ${phase.toUpperCase()}`,
              body: `## Performance Budget Alert

            **Phase:** ${phase}
            **Violations:** ${violations}
            **Detection Time:** ${new Date().toISOString()}

            ## Budget Status

            ${violations.includes('JS:') ? '❌ JavaScript bundle exceeds 90KB limit' : ''}
            ${violations.includes('CSS:') ? '❌ CSS bundle exceeds 200KB limit' : ''}
            ${violations.includes('IMPORTANT:') ? '❌ !important declarations exceed 400 limit' : ''}

            ## Responsible Agents

            ${phase.includes('1') ? '**@javascript-behavior-expert**: Address JavaScript bundle size' : ''}
            ${phase.includes('2') ? '**@css-design-systems-expert**: Address SLDS bundle optimization' : ''}
            ${phase.includes('3') ? '**@css-design-systems-expert**: Address CSS architecture issues' : ''}
            ${phase.includes('4') ? '**@html-expert-slds**: Address final optimization issues' : ''}

            ## Next Steps

            - [ ] Investigate cause of budget violation
            - [ ] Implement optimization measures
            - [ ] Re-run performance analysis
            - [ ] Consider phase rollback if severe`,
              labels: ['performance', 'budget-violation', phase, 'optimization-needed']
            });

  visual-regression-monitoring:
    name: Visual Regression Monitoring
    runs-on: ubuntu-latest
    needs: detect-active-phase
    if: needs.detect-active-phase.outputs.monitoring-required == 'true' && github.event_name == 'push'
    timeout-minutes: 15
    
    strategy:
      matrix:
        viewport: [mobile, tablet, desktop]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          npx playwright install chromium

      - name: Visual Regression Check
        id: visual-check
        run: |
          echo "📸 Visual Regression Check - ${{ matrix.viewport }}"
          
          # Start local server
          npm run dev &
          sleep 10
          
          # Run visual regression tests
          npx playwright test --grep="visual consistency" --project=chromium-${{ matrix.viewport }}
          
          if [[ $? -eq 0 ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Visual regression check passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Visual regression detected"
            exit 1
          fi

      - name: Upload Visual Diff Reports
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: visual-regression-${{ matrix.viewport }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  monitoring-summary:
    name: Strategic Refactoring Monitoring Summary
    runs-on: ubuntu-latest
    needs: [detect-active-phase, mobile-navigation-monitoring, performance-monitoring, visual-regression-monitoring]
    if: always() && needs.detect-active-phase.outputs.monitoring-required == 'true'
    
    steps:
      - name: Generate Monitoring Report
        run: |
          echo "📋 STRATEGIC REFACTORING MONITORING SUMMARY"
          echo "================================================="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Active Phase: ${{ needs.detect-active-phase.outputs.active-phase }}"
          echo "Alert Level: ${{ needs.detect-active-phase.outputs.alert-level }}"
          echo ""
          echo "Component Status:"
          echo "- Mobile Navigation: ${{ needs.mobile-navigation-monitoring.result }}"
          echo "- Performance Budget: ${{ needs.performance-monitoring.result }}"
          echo "- Visual Regression: ${{ needs.visual-regression-monitoring.result }}"
          echo "================================================="
          
          # Determine overall health
          OVERALL_STATUS="healthy"
          CRITICAL_ISSUES=0
          
          if [[ "${{ needs.mobile-navigation-monitoring.result }}" == "failure" ]]; then
            OVERALL_STATUS="critical"
            CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            echo "🚨 CRITICAL: Mobile navigation failure detected"
          fi
          
          if [[ "${{ needs.performance-monitoring.result }}" == "failure" ]]; then
            OVERALL_STATUS="degraded"
            echo "⚠️ WARNING: Performance budget violations"
          fi
          
          if [[ "${{ needs.visual-regression-monitoring.result }}" == "failure" ]]; then
            OVERALL_STATUS="degraded"
            echo "⚠️ WARNING: Visual regressions detected"
          fi
          
          echo ""
          echo "OVERALL STATUS: $OVERALL_STATUS"
          
          if [[ $CRITICAL_ISSUES -gt 0 ]]; then
            echo "🚨 $CRITICAL_ISSUES CRITICAL ISSUES REQUIRE IMMEDIATE ATTENTION"
            exit 1
          else
            echo "✅ System monitoring completed successfully"
          fi

      - name: Update Commit Status
        uses: actions/github-script@v7
        with:
          script: |
            const mobileNavResult = '${{ needs.mobile-navigation-monitoring.result }}';
            const performanceResult = '${{ needs.performance-monitoring.result }}';
            const visualResult = '${{ needs.visual-regression-monitoring.result }}';
            
            let state = 'success';
            let description = 'All strategic refactoring monitoring checks passed';
            
            if (mobileNavResult === 'failure') {
              state = 'failure';
              description = 'Mobile navigation failure detected (P0)';
            } else if (performanceResult === 'failure' || visualResult === 'failure') {
              state = 'failure';  
              description = 'Performance or visual regression issues detected';
            }
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: description,
              context: 'strategic-refactoring/continuous-monitoring'
            });