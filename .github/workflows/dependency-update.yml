name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of updates to apply'
        required: true
        default: 'security'
        type: choice
        options:
          - security
          - patch
          - minor
          - major
          - all

jobs:
  check-updates:
    runs-on: ubuntu-latest
    name: Check for Updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Check for outdated packages
        run: node tools/dependencies/check-updates.js
        continue-on-error: true

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.html
          retention-days: 30

  security-updates:
    runs-on: ubuntu-latest
    name: Apply Security Updates
    needs: check-updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Apply security updates
        run: |
          npm audit fix || true

      - name: Run tests
        run: |
          npm run lint
          npm run build
          npm run test:performance || true

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): apply security updates'
          title: '🔒 Security Updates'
          body: |
            ## Security Updates

            This PR applies automated security updates from npm audit.

            ### Checks
            - [ ] Tests passing
            - [ ] Build successful
            - [ ] No visual regressions

            ---
            *This PR was created automatically by GitHub Actions*
          branch: automated-security-updates
          labels: |
            dependencies
            security
            automated

  patch-updates:
    runs-on: ubuntu-latest
    name: Apply Patch Updates
    needs: check-updates
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.update_type == 'patch' || github.event.inputs.update_type == 'all')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Apply patch updates
        run: node tools/dependencies/auto-update.js --patch

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): apply patch updates'
          title: '📦 Patch Updates'
          body: |
            ## Patch Updates

            This PR applies automated patch version updates.

            ### Checks
            - [ ] Tests passing
            - [ ] Build successful
            - [ ] No breaking changes

            ---
            *This PR was created automatically by GitHub Actions*
          branch: automated-patch-updates
          labels: |
            dependencies
            patch
            automated

  notify:
    runs-on: ubuntu-latest
    name: Send Notifications
    needs: [check-updates, security-updates]
    if: always()

    steps:
      - name: Check job status
        id: status
        run: |
          if [ "${{ needs.security-updates.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Security updates failed" >> $GITHUB_OUTPUT
          elif [ "${{ needs.check-updates.result }}" == "failure" ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "message=Dependency check completed with warnings" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=Dependency updates completed successfully" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification (optional)
        if: always()
        continue-on-error: true
        run: |
          # Add your Slack webhook URL as a secret
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"${{ steps.status.outputs.message }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
          echo "Notification: ${{ steps.status.outputs.message }}"