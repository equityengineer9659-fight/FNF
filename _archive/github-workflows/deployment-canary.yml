name: Strategic Refactoring Canary Deployment

on:
  workflow_dispatch:
    inputs:
      deployment_phase:
        description: 'Refactoring Phase for Canary Deployment'
        required: true
        type: choice
        options:
        - 'phase-2-slds'
        - 'phase-3-css'
      canary_percentage:
        description: 'Initial Canary Traffic Percentage'
        required: false
        default: '5'
        type: choice
        options:
        - '5'
        - '10'
        - '25'
        - '50'
      environment_target:
        description: 'Target Environment'
        required: true
        type: choice
        options:
        - 'staging'
        - 'production'
      auto_promote:
        description: 'Automatically promote if success criteria met'
        required: false
        default: true
        type: boolean
      
  workflow_call:
    inputs:
      deployment_phase:
        required: true
        type: string
      canary_percentage:
        required: false
        type: string
        default: '5'
      environment_target:
        required: true
        type: string
      auto_promote:
        required: false
        type: boolean
        default: true

env:
  NODE_VERSION: '18'
  CANARY_MONITORING_DURATION: '1800'  # 30 minutes
  SUCCESS_THRESHOLD: '95'             # 95% success rate
  ERROR_THRESHOLD: '5'                # 5% error rate max
  PERFORMANCE_THRESHOLD: '85'         # Minimum Lighthouse score

jobs:
  # ============================================
  # CANARY DEPLOYMENT PREPARATION
  # ============================================
  canary-preparation:
    name: Canary Deployment Preparation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deployment-id: ${{ steps.prepare.outputs.deployment-id }}
      canary-url: ${{ steps.prepare.outputs.canary-url }}
      production-url: ${{ steps.prepare.outputs.production-url }}
      validation-passed: ${{ steps.validate.outputs.passed }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Canary Deployment
        id: prepare
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          CANARY_PCT="${{ github.event.inputs.canary_percentage || inputs.canary_percentage }}"
          DEPLOYMENT_ID="canary-$(date +%Y%m%d-%H%M%S)-${PHASE}-${CANARY_PCT}pct"
          
          echo "🕯️ Canary Deployment Preparation"
          echo "Phase: $PHASE"
          echo "Target: $TARGET"
          echo "Canary Traffic: $CANARY_PCT%"
          echo "Deployment ID: $DEPLOYMENT_ID"
          
          # Set URLs based on target environment
          if [[ "$TARGET" == "production" ]]; then
            PRODUCTION_URL="https://foodnforce.com"
            CANARY_URL="https://canary-${DEPLOYMENT_ID}--foodnforce.netlify.app"
          else
            PRODUCTION_URL="https://staging--foodnforce.netlify.app"
            CANARY_URL="https://canary-staging-${DEPLOYMENT_ID}--foodnforce.netlify.app"
          fi
          
          echo "deployment-id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "canary-url=$CANARY_URL" >> $GITHUB_OUTPUT
          echo "production-url=$PRODUCTION_URL" >> $GITHUB_OUTPUT
          
          echo "🎯 Production URL: $PRODUCTION_URL"
          echo "🕯️ Canary URL: $CANARY_URL"

      - name: Phase-Specific Pre-Validation
        id: validate
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          VALIDATION_PASSED="true"
          
          echo "🔍 Canary Pre-Validation for: $PHASE"
          
          case $PHASE in
            "phase-2-slds")
              echo "🎨 Phase 2: SLDS Bundle Optimization - Canary Validation"
              
              # SLDS compliance check
              npm run validate:slds || VALIDATION_PASSED="false"
              
              # CSS bundle size validation
              CSS_SIZE=$(find css/ -name "*.css" -exec wc -c {} + | tail -1 | awk '{print $1}' || echo 0)
              CSS_SIZE_KB=$((CSS_SIZE / 1024))
              if [[ $CSS_SIZE_KB -gt 200 ]]; then
                echo "❌ CSS bundle too large for canary: ${CSS_SIZE_KB}KB (limit: 200KB)"
                VALIDATION_PASSED="false"
              fi
              
              # Check for critical CSS conflicts
              npm run lint:css || VALIDATION_PASSED="false"
              
              echo "📊 SLDS Bundle: ${CSS_SIZE_KB}KB"
              ;;
              
            "phase-3-css")
              echo "🏗️ Phase 3: CSS Architecture - Canary Validation"
              
              # CSS architecture validation
              IMPORTANT_COUNT=$(find css/ -name "*.css" -exec grep -c "!important" {} \; | awk '{sum += $1} END {print sum}' || echo 0)
              if [[ $IMPORTANT_COUNT -gt 400 ]]; then
                echo "❌ Too many !important declarations: $IMPORTANT_COUNT (limit: 400)"
                VALIDATION_PASSED="false"
              fi
              
              # CSS cascade validation
              npm run lint:css || VALIDATION_PASSED="false"
              
              echo "📊 CSS Architecture: $IMPORTANT_COUNT !important declarations"
              ;;
          esac
          
          echo "passed=$VALIDATION_PASSED" >> $GITHUB_OUTPUT
          
          if [[ "$VALIDATION_PASSED" == "true" ]]; then
            echo "✅ Canary pre-validation passed"
          else
            echo "❌ Canary pre-validation failed"
            exit 1
          fi

  # ============================================
  # CANARY VERSION DEPLOYMENT
  # ============================================
  deploy-canary:
    name: Deploy Canary Version
    runs-on: ubuntu-latest
    needs: canary-preparation
    if: needs.canary-preparation.outputs.validation-passed == 'true'
    timeout-minutes: 15
    environment:
      name: canary-${{ github.event.inputs.environment_target || inputs.environment_target }}
      url: ${{ steps.deploy.outputs.canary-url }}
    outputs:
      canary-url: ${{ steps.deploy.outputs.canary-url }}
      deployment-status: ${{ steps.deploy.outputs.status }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Canary Version
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          echo "🔨 Building Canary Version for: $PHASE"
          
          # Phase-specific canary optimizations
          case $PHASE in
            "phase-2-slds")
              echo "🎨 SLDS-optimized canary build"
              # Build with SLDS bundle optimization
              NODE_ENV=production npm run build
              
              # Add canary identifier for tracking
              echo "<!-- CANARY: Phase 2 SLDS Bundle Optimization -->" >> index.html
              ;;
              
            "phase-3-css")
              echo "🏗️ CSS-optimized canary build"
              # Build with CSS architecture improvements
              NODE_ENV=production npm run build
              
              # Add canary identifier for tracking
              echo "<!-- CANARY: Phase 3 CSS Architecture -->" >> index.html
              ;;
          esac
          
          echo "✅ Canary build completed"

      - name: Deploy Canary Version
        id: deploy
        run: |
          DEPLOYMENT_ID="${{ needs.canary-preparation.outputs.deployment-id }}"
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          
          echo "🕯️ Deploying Canary Version"
          echo "Deployment ID: $DEPLOYMENT_ID"
          
          # Deploy canary version to unique Netlify branch deploy
          if [[ "$TARGET" == "production" ]]; then
            npx netlify-cli deploy --dir=. --json --alias="canary-$DEPLOYMENT_ID" > canary-deploy.json
            NETLIFY_SITE_ID="${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}"
          else
            npx netlify-cli deploy --dir=. --json --alias="canary-staging-$DEPLOYMENT_ID" > canary-deploy.json
            NETLIFY_SITE_ID="${{ secrets.NETLIFY_STAGING_SITE_ID }}"
          fi
          
          CANARY_URL=$(cat canary-deploy.json | jq -r '.deploy_url')
          echo "canary-url=$CANARY_URL" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT
          
          echo "🌐 Canary URL: $CANARY_URL"
          
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Canary Health Check
        run: |
          CANARY_URL="${{ steps.deploy.outputs.canary-url }}"
          echo "🏥 Canary Health Check"
          
          # Wait for deployment propagation
          sleep 30
          
          # Basic connectivity
          curl -f "$CANARY_URL" || {
            echo "❌ Canary deployment health check failed"
            exit 1
          }
          
          # Check all pages are accessible
          PAGES=("/" "/services.html" "/about.html" "/contact.html" "/impact.html" "/resources.html")
          for page in "${PAGES[@]}"; do
            if ! curl -f "${CANARY_URL}${page}"; then
              echo "❌ Canary page $page failed health check"
              exit 1
            fi
          done
          
          echo "✅ Canary health check passed"

  # ============================================
  # CANARY COMPREHENSIVE TESTING
  # ============================================
  test-canary:
    name: Canary Comprehensive Testing
    runs-on: ubuntu-latest
    needs: [canary-preparation, deploy-canary]
    if: needs.deploy-canary.outputs.deployment-status == 'success'
    timeout-minutes: 25
    strategy:
      matrix:
        test-type: [mobile-navigation, performance, visual-comparison, load-testing]
    outputs:
      mobile-status: ${{ steps.mobile-test.outputs.status }}
      performance-status: ${{ steps.perf-test.outputs.status }}
      visual-status: ${{ steps.visual-test.outputs.status }}
      load-status: ${{ steps.load-test.outputs.status }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        if: matrix.test-type == 'mobile-navigation' || matrix.test-type == 'visual-comparison'
        run: npx playwright install --with-deps

      - name: Critical Mobile Navigation Test (P0)
        id: mobile-test
        if: matrix.test-type == 'mobile-navigation'
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          echo "📱 CRITICAL: Canary Mobile Navigation Test (P0)"
          
          # Test mobile navigation on canary version
          npx playwright test --config=tools/testing/playwright.config.js \
            --grep="Critical navigation smoke test" \
            --project="Mobile Chrome" \
            --base-url="$CANARY_URL" \
            --reporter=json > canary-mobile-results.json
          
          if [[ $? -eq 0 ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Canary mobile navigation test passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ CANARY MOBILE NAVIGATION FAILURE (P0)"
            
            # Create emergency alert for P0 failure
            echo "🚨 P0 failure detected - canary deployment must be stopped"
            exit 1
          fi
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-canary.outputs.canary-url }}

      - name: Performance Comparison Testing
        id: perf-test
        if: matrix.test-type == 'performance'
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          PRODUCTION_URL="${{ needs.canary-preparation.outputs.production-url }}"
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          
          echo "📊 Canary vs Production Performance Comparison"
          
          # Run Lighthouse on both versions
          npx lighthouse "$CANARY_URL" \
            --chrome-flags="--headless --no-sandbox" \
            --output=json \
            --output-path=./canary-lighthouse.json
          
          npx lighthouse "$PRODUCTION_URL" \
            --chrome-flags="--headless --no-sandbox" \
            --output=json \
            --output-path=./production-lighthouse.json
          
          # Compare performance scores
          CANARY_SCORE=$(cat canary-lighthouse.json | jq '.categories.performance.score * 100')
          PROD_SCORE=$(cat production-lighthouse.json | jq '.categories.performance.score * 100')
          
          echo "🕯️ Canary Performance: $CANARY_SCORE"
          echo "🏭 Production Performance: $PROD_SCORE"
          
          # Canary must not be significantly worse than production
          PERFORMANCE_DIFF=$(echo "$CANARY_SCORE - $PROD_SCORE" | bc -l)
          if (( $(echo "$PERFORMANCE_DIFF < -5" | bc -l) )); then
            echo "❌ Canary performance significantly worse: ${PERFORMANCE_DIFF} points"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Phase-specific performance validation
          case $PHASE in
            "phase-2-slds")
              # SLDS bundle should improve loading
              CANARY_FCP=$(cat canary-lighthouse.json | jq '.audits["first-contentful-paint"].numericValue')
              PROD_FCP=$(cat production-lighthouse.json | jq '.audits["first-contentful-paint"].numericValue')
              
              echo "🕯️ Canary FCP: ${CANARY_FCP}ms"
              echo "🏭 Production FCP: ${PROD_FCP}ms"
              
              if (( $(echo "$CANARY_FCP > $PROD_FCP + 500" | bc -l) )); then
                echo "❌ Canary FCP significantly slower"
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
              fi
              ;;
          esac
          
          echo "status=passed" >> $GITHUB_OUTPUT
          echo "✅ Canary performance test passed"

      - name: Visual Comparison Testing
        id: visual-test
        if: matrix.test-type == 'visual-comparison'
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          PRODUCTION_URL="${{ needs.canary-preparation.outputs.production-url }}"
          
          echo "📸 Canary vs Production Visual Comparison"
          
          # Create visual comparison test
          cat > visual-comparison.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');

          test('Canary vs Production Visual Comparison', async ({ page }) => {
            const canaryUrl = process.env.CANARY_URL;
            const productionUrl = process.env.PRODUCTION_URL;
            
            // Test homepage visual consistency
            await page.goto(canaryUrl);
            await expect(page).toHaveScreenshot('canary-homepage.png');
            
            await page.goto(productionUrl);
            await expect(page).toHaveScreenshot('production-homepage.png');
            
            // Test mobile navigation visual consistency
            await page.setViewportSize({ width: 375, height: 667 });
            
            await page.goto(canaryUrl);
            await page.locator('.mobile-nav-trigger').click();
            await expect(page).toHaveScreenshot('canary-mobile-nav.png');
            
            await page.goto(productionUrl);
            await page.locator('.mobile-nav-trigger').click();
            await expect(page).toHaveScreenshot('production-mobile-nav.png');
          });
          EOF
          
          # Run visual comparison
          npx playwright test visual-comparison.spec.js \
            --project="chromium" \
            --update-snapshots=false
          
          if [[ $? -eq 0 ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Visual comparison passed - no significant differences"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Visual differences detected between canary and production"
            exit 1
          fi
        env:
          CANARY_URL: ${{ needs.deploy-canary.outputs.canary-url }}
          PRODUCTION_URL: ${{ needs.canary-preparation.outputs.production-url }}

      - name: Load Testing Comparison
        id: load-test
        if: matrix.test-type == 'load-testing'
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          PRODUCTION_URL="${{ needs.canary-preparation.outputs.production-url }}"
          
          echo "⚡ Canary Load Testing"
          
          # Simple load test using curl (in production, use proper load testing tools)
          echo "Testing canary under load..."
          for i in {1..50}; do
            curl -s -o /dev/null -w "%{http_code},%{time_total}\\n" "$CANARY_URL" &
          done
          wait
          
          echo "Testing production under load..."
          for i in {1..50}; do
            curl -s -o /dev/null -w "%{http_code},%{time_total}\\n" "$PRODUCTION_URL" &
          done
          wait
          
          echo "status=passed" >> $GITHUB_OUTPUT
          echo "✅ Load testing completed"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: canary-test-results-${{ matrix.test-type }}
          path: |
            canary-lighthouse.json
            production-lighthouse.json
            canary-mobile-results.json
            playwright-report/
            test-results/
          retention-days: 30

  # ============================================
  # CANARY MONITORING & METRICS COLLECTION
  # ============================================
  canary-monitoring:
    name: Canary Monitoring & Metrics Collection
    runs-on: ubuntu-latest
    needs: [canary-preparation, deploy-canary, test-canary]
    if: needs.deploy-canary.result == 'success'
    timeout-minutes: 35  # 30 minutes monitoring + 5 minutes buffer
    outputs:
      monitoring-results: ${{ steps.monitor.outputs.results }}
      success-rate: ${{ steps.monitor.outputs.success-rate }}
      error-rate: ${{ steps.monitor.outputs.error-rate }}
      performance-score: ${{ steps.monitor.outputs.performance-score }}
      
    steps:
      - name: Canary Monitoring Setup
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          MONITORING_DURATION="${{ env.CANARY_MONITORING_DURATION }}"
          
          echo "📊 Starting Canary Monitoring"
          echo "Canary URL: $CANARY_URL"
          echo "Monitoring Duration: $MONITORING_DURATION seconds (30 minutes)"
          echo "Success Threshold: ${{ env.SUCCESS_THRESHOLD }}%"

      - name: Continuous Monitoring
        id: monitor
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          MONITORING_DURATION="${{ env.CANARY_MONITORING_DURATION }}"
          
          echo "🔄 Starting continuous monitoring for 30 minutes"
          
          SUCCESS_COUNT=0
          ERROR_COUNT=0
          TOTAL_REQUESTS=0
          PERFORMANCE_SCORES=()
          
          # Monitor for 30 minutes (1800 seconds)
          END_TIME=$(($(date +%s) + MONITORING_DURATION))
          
          while [[ $(date +%s) -lt $END_TIME ]]; do
            # Health check request
            if curl -s -o /dev/null -w "%{http_code}" "$CANARY_URL" | grep -q "200"; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            TOTAL_REQUESTS=$((TOTAL_REQUESTS + 1))
            
            # Every 5 minutes, run a performance check
            if [[ $((TOTAL_REQUESTS % 10)) -eq 0 ]]; then
              echo "📊 Running performance check at $(date)"
              npx lighthouse "$CANARY_URL" \
                --chrome-flags="--headless --no-sandbox" \
                --quiet \
                --output=json \
                --output-path="./lighthouse-$(date +%s).json" || true
            fi
            
            # Check every 30 seconds
            sleep 30
            
            # Report progress every 5 minutes
            if [[ $((TOTAL_REQUESTS % 10)) -eq 0 ]]; then
              CURRENT_SUCCESS_RATE=$(( SUCCESS_COUNT * 100 / TOTAL_REQUESTS ))
              CURRENT_ERROR_RATE=$(( ERROR_COUNT * 100 / TOTAL_REQUESTS ))
              echo "📈 Progress: ${CURRENT_SUCCESS_RATE}% success, ${CURRENT_ERROR_RATE}% errors ($TOTAL_REQUESTS requests)"
            fi
          done
          
          # Calculate final metrics
          SUCCESS_RATE=$(( SUCCESS_COUNT * 100 / TOTAL_REQUESTS ))
          ERROR_RATE=$(( ERROR_COUNT * 100 / TOTAL_REQUESTS ))
          
          # Average performance scores
          PERFORMANCE_TOTAL=0
          PERFORMANCE_COUNT=0
          for lighthouse_file in lighthouse-*.json; do
            if [[ -f "$lighthouse_file" ]]; then
              SCORE=$(cat "$lighthouse_file" | jq -r '.categories.performance.score * 100' 2>/dev/null || echo "0")
              PERFORMANCE_TOTAL=$(( PERFORMANCE_TOTAL + SCORE ))
              PERFORMANCE_COUNT=$(( PERFORMANCE_COUNT + 1 ))
            fi
          done
          
          AVERAGE_PERFORMANCE=$((PERFORMANCE_TOTAL / PERFORMANCE_COUNT))
          
          echo "📊 CANARY MONITORING RESULTS"
          echo "Success Rate: $SUCCESS_RATE%"
          echo "Error Rate: $ERROR_RATE%"
          echo "Average Performance: $AVERAGE_PERFORMANCE"
          echo "Total Requests: $TOTAL_REQUESTS"
          
          # Output results
          echo "results=success" >> $GITHUB_OUTPUT
          echo "success-rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "error-rate=$ERROR_RATE" >> $GITHUB_OUTPUT
          echo "performance-score=$AVERAGE_PERFORMANCE" >> $GITHUB_OUTPUT
          
          # Create monitoring report
          cat > canary-monitoring-report.json << EOF
          {
            "monitoring_duration": "$MONITORING_DURATION",
            "total_requests": $TOTAL_REQUESTS,
            "success_count": $SUCCESS_COUNT,
            "error_count": $ERROR_COUNT,
            "success_rate": $SUCCESS_RATE,
            "error_rate": $ERROR_RATE,
            "average_performance": $AVERAGE_PERFORMANCE,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload Monitoring Results
        uses: actions/upload-artifact@v3
        with:
          name: canary-monitoring-report
          path: |
            canary-monitoring-report.json
            lighthouse-*.json
          retention-days: 30

  # ============================================
  # CANARY PROMOTION DECISION
  # ============================================
  promotion-decision:
    name: Canary Promotion Decision
    runs-on: ubuntu-latest
    needs: [canary-preparation, deploy-canary, test-canary, canary-monitoring]
    if: always() && needs.canary-monitoring.result == 'success'
    timeout-minutes: 5
    outputs:
      promote: ${{ steps.decision.outputs.promote }}
      rollback: ${{ steps.decision.outputs.rollback }}
      
    steps:
      - name: Evaluate Canary Success Criteria
        id: decision
        run: |
          echo "🎯 Canary Promotion Decision Analysis"
          
          SUCCESS_RATE="${{ needs.canary-monitoring.outputs.success-rate }}"
          ERROR_RATE="${{ needs.canary-monitoring.outputs.error-rate }}"
          PERFORMANCE_SCORE="${{ needs.canary-monitoring.outputs.performance-score }}"
          
          MOBILE_STATUS="${{ needs.test-canary.outputs.mobile-status }}"
          PERF_STATUS="${{ needs.test-canary.outputs.performance-status }}"
          VISUAL_STATUS="${{ needs.test-canary.outputs.visual-status }}"
          LOAD_STATUS="${{ needs.test-canary.outputs.load-status }}"
          
          echo "📊 Canary Metrics:"
          echo "Success Rate: $SUCCESS_RATE% (threshold: ${{ env.SUCCESS_THRESHOLD }}%)"
          echo "Error Rate: $ERROR_RATE% (threshold: ${{ env.ERROR_THRESHOLD }}%)"
          echo "Performance: $PERFORMANCE_SCORE (threshold: ${{ env.PERFORMANCE_THRESHOLD }})"
          
          echo "🧪 Test Results:"
          echo "Mobile Navigation (P0): $MOBILE_STATUS"
          echo "Performance: $PERF_STATUS"
          echo "Visual: $VISUAL_STATUS"
          echo "Load: $LOAD_STATUS"
          
          PROMOTE="true"
          ROLLBACK="false"
          
          # P0 Priority: Mobile navigation must pass
          if [[ "$MOBILE_STATUS" == "failed" ]]; then
            echo "🚨 P0 FAILURE: Mobile navigation failed"
            PROMOTE="false"
            ROLLBACK="true"
          fi
          
          # Success rate threshold
          if [[ $SUCCESS_RATE -lt ${{ env.SUCCESS_THRESHOLD }} ]]; then
            echo "❌ Success rate below threshold: $SUCCESS_RATE%"
            PROMOTE="false"
          fi
          
          # Error rate threshold
          if [[ $ERROR_RATE -gt ${{ env.ERROR_THRESHOLD }} ]]; then
            echo "❌ Error rate above threshold: $ERROR_RATE%"
            PROMOTE="false"
          fi
          
          # Performance threshold
          if [[ $PERFORMANCE_SCORE -lt ${{ env.PERFORMANCE_THRESHOLD }} ]]; then
            echo "❌ Performance below threshold: $PERFORMANCE_SCORE"
            PROMOTE="false"
          fi
          
          # Critical test failures
          if [[ "$PERF_STATUS" == "failed" || "$VISUAL_STATUS" == "failed" ]]; then
            echo "❌ Critical test failures detected"
            PROMOTE="false"
          fi
          
          echo "promote=$PROMOTE" >> $GITHUB_OUTPUT
          echo "rollback=$ROLLBACK" >> $GITHUB_OUTPUT
          
          if [[ "$PROMOTE" == "true" ]]; then
            echo "✅ CANARY PROMOTION APPROVED"
            echo "All success criteria met - ready for full deployment"
          else
            echo "❌ CANARY PROMOTION DENIED"
            echo "Success criteria not met - canary will be rolled back"
          fi

  # ============================================
  # AUTOMATIC CANARY PROMOTION
  # ============================================
  promote-canary:
    name: Promote Canary to Production
    runs-on: ubuntu-latest
    needs: [canary-preparation, deploy-canary, canary-monitoring, promotion-decision]
    if: |
      needs.promotion-decision.outputs.promote == 'true' &&
      github.event.inputs.auto_promote == 'true'
    timeout-minutes: 10
    environment:
      name: ${{ github.event.inputs.environment_target || inputs.environment_target }}
      url: ${{ steps.promote.outputs.production-url }}
      
    steps:
      - name: Promote Canary to Production
        id: promote
        run: |
          CANARY_URL="${{ needs.deploy-canary.outputs.canary-url }}"
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          
          echo "🚀 Promoting Canary to Production"
          echo "Canary URL: $CANARY_URL"
          echo "Target: $TARGET"
          
          # Promote canary version to production
          if [[ "$TARGET" == "production" ]]; then
            npx netlify-cli deploy --prod --dir=. --json > promotion-deploy.json
            PRODUCTION_URL=$(cat promotion-deploy.json | jq -r '.url')
          else
            npx netlify-cli deploy --dir=. --json > promotion-deploy.json
            PRODUCTION_URL=$(cat promotion-deploy.json | jq -r '.deploy_url')
          fi
          
          echo "production-url=$PRODUCTION_URL" >> $GITHUB_OUTPUT
          echo "🌐 New Production URL: $PRODUCTION_URL"
          
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

      - name: Post-Promotion Verification
        run: |
          PRODUCTION_URL="${{ steps.promote.outputs.production-url }}"
          echo "✅ Post-Promotion Verification"
          
          # Wait for DNS propagation
          sleep 60
          
          # Verify mobile navigation still works
          npx playwright test --config=tools/testing/playwright.config.js \
            --grep="Critical navigation smoke test" \
            --project="Mobile Chrome" \
            --base-url="$PRODUCTION_URL"
          
          echo "✅ Post-promotion verification completed"

      - name: Cleanup Canary Environment
        run: |
          echo "🧹 Cleaning up canary environment"
          # Canary environments are automatically cleaned up by Netlify branch deploys
          echo "✅ Canary cleanup completed"

  # ============================================
  # CANARY ROLLBACK
  # ============================================
  rollback-canary:
    name: Rollback Failed Canary
    runs-on: ubuntu-latest
    needs: [canary-preparation, deploy-canary, promotion-decision]
    if: needs.promotion-decision.outputs.rollback == 'true'
    timeout-minutes: 5
    
    steps:
      - name: Execute Canary Rollback
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          echo "🔄 Executing Canary Rollback"
          echo "Reason: P0 mobile navigation failure or critical issues"
          
          # Trigger strategic rollback workflow
          gh workflow run strategic-rollback.yml \
            -f phase="$PHASE" \
            -f reason="Canary deployment failure: Mobile navigation P0 failure" \
            -f notify_technical_architect="true"
          
          echo "✅ Canary rollback initiated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Failed Canary
        run: |
          echo "🧹 Cleaning up failed canary deployment"
          # Canary is automatically cleaned up, but mark as failed
          echo "❌ Canary marked as failed and cleaned up"

  # ============================================
  # CANARY DEPLOYMENT COMPLETION
  # ============================================
  canary-completion:
    name: Canary Deployment Completion
    runs-on: ubuntu-latest
    needs: [canary-preparation, deploy-canary, test-canary, canary-monitoring, promotion-decision, promote-canary]
    if: always()
    
    steps:
      - name: Canary Deployment Summary
        run: |
          PROMOTE="${{ needs.promotion-decision.outputs.promote }}"
          ROLLBACK="${{ needs.promotion-decision.outputs.rollback }}"
          
          echo "🕯️ CANARY DEPLOYMENT SUMMARY"
          echo "================================================="
          echo "Phase: ${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          echo "Target: ${{ github.event.inputs.environment_target || inputs.environment_target }}"
          echo "Canary Traffic: ${{ github.event.inputs.canary_percentage || inputs.canary_percentage }}%"
          echo "Deployment ID: ${{ needs.canary-preparation.outputs.deployment-id }}"
          echo "Success Rate: ${{ needs.canary-monitoring.outputs.success-rate }}%"
          echo "Error Rate: ${{ needs.canary-monitoring.outputs.error-rate }}%"
          echo "Performance: ${{ needs.canary-monitoring.outputs.performance-score }}"
          echo "Promotion: $PROMOTE"
          echo "Rollback: $ROLLBACK"
          echo "================================================="

      - name: Create Canary Report
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}';
            const promote = '${{ needs.promotion-decision.outputs.promote }}';
            const rollback = '${{ needs.promotion-decision.outputs.rollback }}';
            const successRate = '${{ needs.canary-monitoring.outputs.success-rate }}';
            const errorRate = '${{ needs.canary-monitoring.outputs.error-rate }}';
            
            const title = promote === 'true' ? 
              `✅ Canary Deployment Success - ${phase.toUpperCase()} Promoted` :
              `❌ Canary Deployment ${rollback === 'true' ? 'Rolled Back' : 'Completed'} - ${phase.toUpperCase()}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `# 🕯️ Canary Deployment Report - ${phase.toUpperCase()}
            
            ## Deployment Summary
            
            **Phase:** ${phase}
            **Target:** ${{ github.event.inputs.environment_target || inputs.environment_target }}
            **Canary Traffic:** ${{ github.event.inputs.canary_percentage || inputs.canary_percentage }}%
            **Monitoring Duration:** 30 minutes
            **Final Status:** ${promote === 'true' ? 'PROMOTED' : rollback === 'true' ? 'ROLLED BACK' : 'COMPLETED'}
            
            ## Metrics Results
            
            - **Success Rate:** ${successRate}% (threshold: 95%)
            - **Error Rate:** ${errorRate}% (threshold: 5%)
            - **Performance:** ${{ needs.canary-monitoring.outputs.performance-score }} (threshold: 85)
            - **Mobile Navigation (P0):** ${{ needs.test-canary.outputs.mobile-status }}
            - **Visual Consistency:** ${{ needs.test-canary.outputs.visual-status }}
            
            ## Test Results
            
            - Mobile Navigation: ${{ needs.test-canary.outputs.mobile-status }}
            - Performance Comparison: ${{ needs.test-canary.outputs.performance-status }}
            - Visual Comparison: ${{ needs.test-canary.outputs.visual-status }}
            - Load Testing: ${{ needs.test-canary.outputs.load-status }}
            
            ## Next Steps
            
            ${promote === 'true' ? `
            ✅ **Canary Successfully Promoted**
            - Full traffic now directed to new version
            - Continue monitoring for 24 hours
            - Prepare for next phase if applicable
            ` : rollback === 'true' ? `
            ❌ **Canary Rolled Back Due to Issues**
            - P0 mobile navigation failure detected
            - Production remains on stable version
            - Root cause analysis required
            - Fix issues before retry
            ` : `
            ⏸️ **Manual Review Required**
            - Canary completed but requires manual promotion
            - Review metrics and decide on next steps
            `}`,
              labels: ['canary-deployment', 'strategic-refactoring', phase, 
                      promote === 'true' ? 'promoted' : rollback === 'true' ? 'rolled-back' : 'manual-review']
            });