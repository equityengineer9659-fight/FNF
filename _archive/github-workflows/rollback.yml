name: Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment ID to rollback to (leave empty to rollback to previous)'
        required: false
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

env:
  NODE_VERSION: '18'

jobs:
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://foodnforce.com
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Rollback
        run: node scripts/rollback.js
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_PRODUCTION_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}
          ROLLBACK_DEPLOYMENT_ID: ${{ github.event.inputs.deployment_id }}
          ROLLBACK_REASON: ${{ github.event.inputs.reason }}

      - name: Post-Rollback Health Check
        run: |
          sleep 30
          node scripts/health-check.js https://foodnforce.com

      - name: Create Rollback Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Emergency Rollback Executed',
              body: `## Rollback Details
              
              **Reason:** ${{ github.event.inputs.reason }}
              **Target Deployment:** ${{ github.event.inputs.deployment_id || 'Previous deployment' }}
              **Executed by:** ${{ github.actor }}
              **Timestamp:** ${new Date().toISOString()}
              **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              
              ## Next Steps
              
              - [ ] Verify rollback was successful
              - [ ] Identify root cause of the issue
              - [ ] Plan remediation strategy
              - [ ] Schedule new deployment when ready
              
              ## Health Check Results
              
              See workflow logs for post-rollback health check results.`,
              labels: ['rollback', 'urgent', 'production']
            });

      - name: Notify Team
        if: always()
        run: |
          echo "🚨 Emergency rollback executed"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Executed by: ${{ github.actor }}"
          echo "Status: ${{ job.status }}"