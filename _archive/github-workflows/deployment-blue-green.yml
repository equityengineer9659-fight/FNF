name: Strategic Refactoring Blue-Green Deployment

on:
  workflow_dispatch:
    inputs:
      deployment_phase:
        description: 'Refactoring Phase for Deployment'
        required: true
        type: choice
        options:
        - 'phase-1-javascript'
        - 'phase-2-slds'
        - 'phase-3-css'
        - 'phase-4-html'
      environment_target:
        description: 'Target Environment'
        required: true
        type: choice
        options:
        - 'staging'
        - 'production'
      rollback_enabled:
        description: 'Enable automatic rollback on failure'
        required: false
        default: true
        type: boolean
      skip_mobile_nav_validation:
        description: 'EMERGENCY: Skip mobile nav validation'
        required: false
        default: false
        type: boolean
      
  workflow_call:
    inputs:
      deployment_phase:
        required: true
        type: string
      environment_target:
        required: true
        type: string
      rollback_enabled:
        required: false
        type: boolean
        default: true

env:
  NODE_VERSION: '18'
  BLUE_GREEN_SWITCH_TIMEOUT: '300'  # 5 minutes
  HEALTH_CHECK_TIMEOUT: '180'       # 3 minutes
  ROLLBACK_SLA: '120'               # 2 minutes
  MOBILE_NAV_P0_PRIORITY: 'true'

jobs:
  # ============================================
  # DEPLOYMENT PREPARATION & VALIDATION
  # ============================================
  deployment-preparation:
    name: Blue-Green Deployment Preparation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deployment-id: ${{ steps.prepare.outputs.deployment-id }}
      blue-environment: ${{ steps.prepare.outputs.blue-environment }}
      green-environment: ${{ steps.prepare.outputs.green-environment }}
      current-active: ${{ steps.prepare.outputs.current-active }}
      validation-passed: ${{ steps.validate.outputs.passed }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Blue-Green Deployment
        id: prepare
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          DEPLOYMENT_ID="deploy-$(date +%Y%m%d-%H%M%S)-${PHASE}-${TARGET}"
          
          echo "🚀 Blue-Green Deployment Preparation"
          echo "Phase: $PHASE"
          echo "Target: $TARGET"
          echo "Deployment ID: $DEPLOYMENT_ID"
          
          # Determine current active environment (Blue or Green)
          if [[ "$TARGET" == "production" ]]; then
            CURRENT_ACTIVE="blue"  # Production is typically blue
            BLUE_ENV="production"
            GREEN_ENV="production-green"
          else
            CURRENT_ACTIVE="blue"  # Staging blue
            BLUE_ENV="staging"
            GREEN_ENV="staging-green"
          fi
          
          echo "deployment-id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "blue-environment=$BLUE_ENV" >> $GITHUB_OUTPUT
          echo "green-environment=$GREEN_ENV" >> $GITHUB_OUTPUT
          echo "current-active=$CURRENT_ACTIVE" >> $GITHUB_OUTPUT
          
          echo "📊 Current Active: $CURRENT_ACTIVE"
          echo "🔵 Blue Environment: $BLUE_ENV"
          echo "🟢 Green Environment: $GREEN_ENV"

      - name: Pre-Deployment Validation
        id: validate
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          VALIDATION_PASSED="true"
          
          echo "🔍 Pre-Deployment Phase Validation: $PHASE"
          
          case $PHASE in
            "phase-1-javascript")
              echo "📦 Phase 1: JavaScript Consolidation Validation"
              
              # Verify mobile navigation preservation
              if [[ "${{ github.event.inputs.skip_mobile_nav_validation }}" != "true" ]]; then
                npm run test:critical-navigation || VALIDATION_PASSED="false"
              fi
              
              # Check JavaScript bundle size
              JS_SIZE=$(find js/ -name "*.js" -exec wc -c {} + | tail -1 | awk '{print $1}' || echo 0)
              JS_SIZE_KB=$((JS_SIZE / 1024))
              if [[ $JS_SIZE_KB -gt 90 ]]; then
                echo "❌ JavaScript bundle too large: ${JS_SIZE_KB}KB (limit: 90KB)"
                VALIDATION_PASSED="false"
              fi
              
              echo "📊 JavaScript Bundle: ${JS_SIZE_KB}KB"
              ;;
              
            "phase-2-slds")
              echo "🎨 Phase 2: SLDS Bundle Optimization Validation"
              
              # Check CSS bundle size
              CSS_SIZE=$(find css/ -name "*.css" -exec wc -c {} + | tail -1 | awk '{print $1}' || echo 0)
              CSS_SIZE_KB=$((CSS_SIZE / 1024))
              if [[ $CSS_SIZE_KB -gt 200 ]]; then
                echo "❌ CSS bundle too large: ${CSS_SIZE_KB}KB (limit: 200KB)"
                VALIDATION_PASSED="false"
              fi
              
              # SLDS compliance check
              npm run validate:slds || VALIDATION_PASSED="false"
              
              echo "📊 CSS Bundle: ${CSS_SIZE_KB}KB"
              ;;
              
            "phase-3-css")
              echo "🏗️ Phase 3: CSS Architecture Validation"
              
              # Check !important declarations
              IMPORTANT_COUNT=$(find css/ -name "*.css" -exec grep -c "!important" {} \; | awk '{sum += $1} END {print sum}' || echo 0)
              if [[ $IMPORTANT_COUNT -gt 400 ]]; then
                echo "❌ Too many !important declarations: $IMPORTANT_COUNT (limit: 400)"
                VALIDATION_PASSED="false"
              fi
              
              echo "📊 !important declarations: $IMPORTANT_COUNT"
              ;;
              
            "phase-4-html")
              echo "♿ Phase 4: HTML Semantic Validation"
              
              # HTML validation
              npm run validate:html || VALIDATION_PASSED="false"
              
              # Accessibility compliance
              npm run test:accessibility || VALIDATION_PASSED="false"
              
              echo "📊 HTML and accessibility validation completed"
              ;;
          esac
          
          echo "passed=$VALIDATION_PASSED" >> $GITHUB_OUTPUT
          
          if [[ "$VALIDATION_PASSED" == "true" ]]; then
            echo "✅ Pre-deployment validation passed"
          else
            echo "❌ Pre-deployment validation failed - blocking deployment"
            exit 1
          fi

  # ============================================
  # GREEN ENVIRONMENT DEPLOYMENT
  # ============================================
  deploy-green-environment:
    name: Deploy to Green Environment
    runs-on: ubuntu-latest
    needs: deployment-preparation
    if: needs.deployment-preparation.outputs.validation-passed == 'true'
    timeout-minutes: 15
    environment:
      name: ${{ needs.deployment-preparation.outputs.green-environment }}
      url: ${{ steps.deploy-green.outputs.green-url }}
    outputs:
      green-url: ${{ steps.deploy-green.outputs.green-url }}
      deployment-status: ${{ steps.deploy-green.outputs.status }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build for Green Deployment
        run: |
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          echo "🔨 Building for Phase: $PHASE"
          
          # Phase-specific build optimizations
          case $PHASE in
            "phase-1-javascript")
              echo "📦 JavaScript-optimized build"
              NODE_ENV=production npm run build
              ;;
            "phase-2-slds")
              echo "🎨 SLDS-optimized build"
              NODE_ENV=production npm run build
              ;;
            "phase-3-css")
              echo "🏗️ CSS-optimized build"
              NODE_ENV=production npm run build
              ;;
            "phase-4-html")
              echo "♿ Accessibility-optimized build"
              NODE_ENV=production npm run build
              ;;
          esac
          
          echo "✅ Build completed successfully"

      - name: Deploy to Green Environment
        id: deploy-green
        run: |
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          DEPLOYMENT_ID="${{ needs.deployment-preparation.outputs.deployment-id }}"
          
          echo "🟢 Deploying to Green Environment"
          echo "Target: $TARGET"
          echo "Deployment ID: $DEPLOYMENT_ID"
          
          # Deploy to green environment (staging branch of Netlify site)
          if [[ "$TARGET" == "production" ]]; then
            # Production green deployment
            npx netlify-cli deploy --dir=. --json --alias="green-$DEPLOYMENT_ID" > green-deploy.json
            GREEN_SITE_ID="${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}"
          else
            # Staging green deployment  
            npx netlify-cli deploy --dir=. --json --alias="staging-green-$DEPLOYMENT_ID" > green-deploy.json
            GREEN_SITE_ID="${{ secrets.NETLIFY_STAGING_SITE_ID }}"
          fi
          
          GREEN_URL=$(cat green-deploy.json | jq -r '.deploy_url')
          echo "green-url=$GREEN_URL" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT
          
          echo "🌐 Green Environment URL: $GREEN_URL"
          
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Green Environment Health Check
        run: |
          GREEN_URL="${{ steps.deploy-green.outputs.green-url }}"
          echo "🏥 Green Environment Health Check"
          
          # Wait for deployment propagation
          sleep 30
          
          # Basic connectivity check
          curl -f "$GREEN_URL" || {
            echo "❌ Green environment health check failed"
            exit 1
          }
          
          # Check all critical pages
          PAGES=("/" "/services.html" "/about.html" "/contact.html" "/impact.html" "/resources.html")
          for page in "${PAGES[@]}"; do
            if ! curl -f "${GREEN_URL}${page}"; then
              echo "❌ Page $page failed health check"
              exit 1
            fi
          done
          
          echo "✅ Green environment health check passed"

  # ============================================
  # GREEN ENVIRONMENT COMPREHENSIVE TESTING
  # ============================================
  test-green-environment:
    name: Comprehensive Green Environment Testing
    runs-on: ubuntu-latest
    needs: [deployment-preparation, deploy-green-environment]
    if: needs.deploy-green-environment.outputs.deployment-status == 'success'
    timeout-minutes: 20
    strategy:
      matrix:
        test-suite: [mobile-navigation, performance, accessibility, visual-regression]
    outputs:
      mobile-nav-status: ${{ steps.mobile-test.outputs.status }}
      performance-status: ${{ steps.perf-test.outputs.status }}
      accessibility-status: ${{ steps.a11y-test.outputs.status }}
      visual-status: ${{ steps.visual-test.outputs.status }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        if: matrix.test-suite == 'visual-regression' || matrix.test-suite == 'mobile-navigation'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Mobile Navigation Testing (P0 Priority)
        id: mobile-test
        if: matrix.test-suite == 'mobile-navigation'
        run: |
          GREEN_URL="${{ needs.deploy-green-environment.outputs.green-url }}"
          echo "📱 CRITICAL: Mobile Navigation Testing (P0)"
          
          # Run critical mobile navigation tests against green environment
          npx playwright test --config=tools/testing/playwright.config.js \
            --grep="Critical navigation smoke test" \
            --project="Mobile Chrome" \
            --reporter=json > mobile-results.json
          
          if [[ $? -eq 0 ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Mobile navigation tests passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT  
            echo "❌ Mobile navigation tests FAILED - P0 CRITICAL"
            
            # Immediate rollback trigger for P0 failure
            if [[ "${{ github.event.inputs.rollback_enabled }}" == "true" ]]; then
              echo "🚨 Triggering immediate rollback due to P0 failure"
            fi
            exit 1
          fi
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-green-environment.outputs.green-url }}

      - name: Performance Testing
        id: perf-test
        if: matrix.test-suite == 'performance'
        run: |
          GREEN_URL="${{ needs.deploy-green-environment.outputs.green-url }}"
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          
          echo "📊 Performance Testing for: $PHASE"
          
          # Run Lighthouse against green environment
          npx lighthouse "$GREEN_URL" \
            --chrome-flags="--headless --no-sandbox" \
            --output=json \
            --output-path=./green-lighthouse.json
          
          # Phase-specific performance validation
          case $PHASE in
            "phase-1-javascript")
              # Validate JavaScript performance
              JS_SCORE=$(cat green-lighthouse.json | jq '.categories.performance.score * 100')
              if (( $(echo "$JS_SCORE < 85" | bc -l) )); then
                echo "❌ Performance score too low: $JS_SCORE (minimum: 85)"
                exit 1
              fi
              ;;
            "phase-2-slds")
              # Validate CSS load performance
              FCP=$(cat green-lighthouse.json | jq '.audits["first-contentful-paint"].numericValue')
              if (( $(echo "$FCP > 2000" | bc -l) )); then
                echo "❌ First Contentful Paint too slow: ${FCP}ms (limit: 2000ms)"
                exit 1
              fi
              ;;
          esac
          
          echo "status=passed" >> $GITHUB_OUTPUT
          echo "✅ Performance testing passed"

      - name: Accessibility Testing
        id: a11y-test
        if: matrix.test-suite == 'accessibility'
        run: |
          GREEN_URL="${{ needs.deploy-green-environment.outputs.green-url }}"
          echo "♿ Accessibility Testing"
          
          # Run Pa11y against green environment
          npx pa11y-ci --sitemap "${GREEN_URL}/sitemap.xml" \
            --config tools/testing/pa11y-ci.json \
            --json > green-a11y-results.json
          
          if [[ $? -eq 0 ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Accessibility testing passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Accessibility testing failed"
            exit 1
          fi

      - name: Visual Regression Testing
        id: visual-test
        if: matrix.test-suite == 'visual-regression'
        run: |
          GREEN_URL="${{ needs.deploy-green-environment.outputs.green-url }}"
          echo "📸 Visual Regression Testing"
          
          # Run visual regression tests
          npx playwright test --config=tools/testing/playwright.config.js \
            --grep="visual consistency" \
            --project="chromium" \
            --update-snapshots=false
          
          if [[ $? -eq 0 ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ Visual regression testing passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Visual regression detected"
            exit 1
          fi
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-green-environment.outputs.green-url }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: green-test-results-${{ matrix.test-suite }}
          path: |
            green-lighthouse.json
            green-a11y-results.json
            mobile-results.json
            playwright-report/
            test-results/
          retention-days: 30

  # ============================================
  # BLUE-GREEN TRAFFIC SWITCH DECISION
  # ============================================
  switch-decision:
    name: Blue-Green Switch Decision
    runs-on: ubuntu-latest
    needs: [deployment-preparation, deploy-green-environment, test-green-environment]
    if: always() && needs.deploy-green-environment.result == 'success'
    timeout-minutes: 5
    outputs:
      switch-approved: ${{ steps.decision.outputs.approved }}
      rollback-required: ${{ steps.decision.outputs.rollback-required }}
      
    steps:
      - name: Evaluate Test Results
        id: decision
        run: |
          echo "🎯 Blue-Green Switch Decision Analysis"
          
          # Check if all test suites are available (they run in parallel)
          MOBILE_STATUS="${{ needs.test-green-environment.outputs.mobile-nav-status }}"
          PERF_STATUS="${{ needs.test-green-environment.outputs.performance-status }}" 
          A11Y_STATUS="${{ needs.test-green-environment.outputs.accessibility-status }}"
          VISUAL_STATUS="${{ needs.test-green-environment.outputs.visual-status }}"
          
          echo "📱 Mobile Navigation: $MOBILE_STATUS"
          echo "📊 Performance: $PERF_STATUS"  
          echo "♿ Accessibility: $A11Y_STATUS"
          echo "📸 Visual: $VISUAL_STATUS"
          
          SWITCH_APPROVED="true"
          ROLLBACK_REQUIRED="false"
          
          # P0 Priority: Mobile navigation must pass
          if [[ "$MOBILE_STATUS" == "failed" ]]; then
            echo "🚨 P0 FAILURE: Mobile navigation failed"
            SWITCH_APPROVED="false" 
            ROLLBACK_REQUIRED="true"
          fi
          
          # Critical failures block switch
          if [[ "$PERF_STATUS" == "failed" && "${{ env.MOBILE_NAV_P0_PRIORITY }}" == "true" ]]; then
            echo "❌ Performance failure detected"
            SWITCH_APPROVED="false"
          fi
          
          if [[ "$A11Y_STATUS" == "failed" ]]; then
            echo "❌ Accessibility failure detected" 
            SWITCH_APPROVED="false"
          fi
          
          if [[ "$VISUAL_STATUS" == "failed" ]]; then
            echo "❌ Visual regression detected"
            SWITCH_APPROVED="false"
          fi
          
          echo "approved=$SWITCH_APPROVED" >> $GITHUB_OUTPUT
          echo "rollback-required=$ROLLBACK_REQUIRED" >> $GITHUB_OUTPUT
          
          if [[ "$SWITCH_APPROVED" == "true" ]]; then
            echo "✅ Switch approved - green environment ready for traffic"
          else
            echo "❌ Switch blocked - issues detected in green environment"
          fi

  # ============================================
  # EXECUTE BLUE-GREEN TRAFFIC SWITCH
  # ============================================
  execute-switch:
    name: Execute Blue-Green Traffic Switch
    runs-on: ubuntu-latest
    needs: [deployment-preparation, deploy-green-environment, test-green-environment, switch-decision]
    if: needs.switch-decision.outputs.switch-approved == 'true'
    timeout-minutes: 10
    environment:
      name: ${{ needs.deployment-preparation.outputs.blue-environment }}
      url: ${{ steps.switch.outputs.new-active-url }}
      
    steps:
      - name: Execute Traffic Switch
        id: switch
        run: |
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          GREEN_URL="${{ needs.deploy-green-environment.outputs.green-url }}"
          DEPLOYMENT_ID="${{ needs.deployment-preparation.outputs.deployment-id }}"
          
          echo "🔀 Executing Blue-Green Traffic Switch"
          echo "Target: $TARGET"
          echo "Green URL: $GREEN_URL"
          
          # Switch traffic to green environment
          if [[ "$TARGET" == "production" ]]; then
            # Production traffic switch
            npx netlify-cli deploy --prod --dir=. --json > production-switch.json
            NEW_ACTIVE_URL=$(cat production-switch.json | jq -r '.url')
          else
            # Staging traffic switch
            npx netlify-cli deploy --dir=. --json > staging-switch.json  
            NEW_ACTIVE_URL=$(cat staging-switch.json | jq -r '.deploy_url')
          fi
          
          echo "new-active-url=$NEW_ACTIVE_URL" >> $GITHUB_OUTPUT
          echo "🌐 New Active URL: $NEW_ACTIVE_URL"
          
          # Store switch metadata
          cat > switch-metadata.json << EOF
          {
            "switch_timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployment_id": "$DEPLOYMENT_ID", 
            "old_environment": "blue",
            "new_environment": "green",
            "new_active_url": "$NEW_ACTIVE_URL",
            "phase": "${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}",
            "target": "$TARGET"
          }
          EOF
          
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

      - name: Post-Switch Health Verification
        run: |
          NEW_ACTIVE_URL="${{ steps.switch.outputs.new-active-url }}"
          echo "🏥 Post-Switch Health Verification"
          
          # Wait for DNS propagation
          sleep 60
          
          # Verify all pages are accessible
          PAGES=("/" "/services.html" "/about.html" "/contact.html" "/impact.html" "/resources.html")
          for page in "${PAGES[@]}"; do
            for attempt in {1..3}; do
              if curl -f "${NEW_ACTIVE_URL}${page}"; then
                echo "✅ Page $page accessible (attempt $attempt)"
                break
              else
                echo "⚠️ Page $page failed (attempt $attempt)"
                if [[ $attempt -eq 3 ]]; then
                  echo "❌ Page $page failed all attempts"
                  exit 1
                fi
                sleep 10
              fi
            done
          done
          
          echo "✅ Post-switch health verification completed"

      - name: Mobile Navigation Verification (Post-Switch)
        run: |
          NEW_ACTIVE_URL="${{ steps.switch.outputs.new-active-url }}"
          echo "📱 Post-Switch Mobile Navigation Verification"
          
          # Critical mobile navigation test against new active environment
          npx playwright test --config=tools/testing/playwright.config.js \
            --grep="Critical navigation smoke test" \
            --project="Mobile Chrome" \
            --base-url="$NEW_ACTIVE_URL"
          
          if [[ $? -eq 0 ]]; then
            echo "✅ Post-switch mobile navigation verified"
          else
            echo "🚨 POST-SWITCH MOBILE NAVIGATION FAILURE"
            echo "Immediate rollback required"
            exit 1
          fi

      - name: Upload Switch Metadata
        uses: actions/upload-artifact@v3
        with:
          name: blue-green-switch-metadata
          path: switch-metadata.json
          retention-days: 90

  # ============================================
  # AUTOMATIC ROLLBACK ON FAILURE
  # ============================================
  emergency-rollback:
    name: Emergency Rollback Execution
    runs-on: ubuntu-latest
    needs: [deployment-preparation, switch-decision, execute-switch]
    if: |
      always() && 
      (needs.switch-decision.outputs.rollback-required == 'true' || 
       needs.execute-switch.result == 'failure') &&
      github.event.inputs.rollback_enabled == 'true'
    timeout-minutes: 5
    
    steps:
      - name: Execute Emergency Rollback
        run: |
          echo "🚨 EXECUTING EMERGENCY ROLLBACK"
          echo "Reason: Blue-green deployment failure detected"
          echo "SLA: ${{ env.ROLLBACK_SLA }} seconds"
          
          TARGET="${{ github.event.inputs.environment_target || inputs.environment_target }}"
          PHASE="${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          
          # Trigger the strategic rollback workflow
          gh workflow run strategic-rollback.yml \
            -f phase="$PHASE" \
            -f reason="Blue-green deployment failure: $PHASE" \
            -f notify_technical_architect="true"
          
          echo "✅ Emergency rollback initiated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Emergency Alert
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}';
            const target = '${{ github.event.inputs.environment_target || inputs.environment_target }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 EMERGENCY: Blue-Green Deployment Failure - ${phase.toUpperCase()}`,
              body: `## Emergency Blue-Green Deployment Failure
            
            **Phase:** ${phase}
            **Target Environment:** ${target}
            **Failure Time:** ${new Date().toISOString()}
            **Deployment ID:** ${{ needs.deployment-preparation.outputs.deployment-id }}
            
            ## Failure Details
            
            - **Switch Decision:** ${{ needs.switch-decision.outputs.switch-approved }}
            - **Rollback Required:** ${{ needs.switch-decision.outputs.rollback-required }}
            - **Mobile Navigation Status:** Critical failure detected
            
            ## Emergency Response
            
            ✅ Automatic rollback initiated
            📞 Technical architect notification sent
            ⏱️ Rollback SLA: ${{ env.ROLLBACK_SLA }} seconds
            
            ## Required Actions
            
            **@technical-architect**: Immediate response required (15-minute SLA)
            **@project-manager-proj**: Coordinate emergency response
            
            ## Next Steps
            
            1. Verify rollback completion
            2. Analyze root cause of deployment failure
            3. Fix issues before retrying deployment
            4. Update deployment procedures if necessary`,
              labels: ['emergency', 'deployment-failure', 'blue-green', phase, target]
            });

  # ============================================
  # DEPLOYMENT COMPLETION NOTIFICATION
  # ============================================
  deployment-completion:
    name: Blue-Green Deployment Completion
    runs-on: ubuntu-latest
    needs: [deployment-preparation, deploy-green-environment, test-green-environment, switch-decision, execute-switch]
    if: always() && needs.execute-switch.result == 'success'
    
    steps:
      - name: Deployment Success Summary
        run: |
          echo "🎉 BLUE-GREEN DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "================================================="
          echo "Phase: ${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}"
          echo "Target: ${{ github.event.inputs.environment_target || inputs.environment_target }}" 
          echo "Deployment ID: ${{ needs.deployment-preparation.outputs.deployment-id }}"
          echo "Active URL: ${{ needs.execute-switch.outputs.new-active-url }}"
          echo "Switch Duration: Within ${{ env.BLUE_GREEN_SWITCH_TIMEOUT }} seconds"
          echo "Mobile Navigation: ✅ P0 Priority Maintained"
          echo "================================================="
          echo "Strategic refactoring deployment phase completed with zero downtime"

      - name: Update Deployment Status
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ github.event.inputs.deployment_phase || inputs.deployment_phase }}';
            const target = '${{ github.event.inputs.environment_target || inputs.environment_target }}';
            
            // Create success notification
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ Blue-Green Deployment Success - ${phase.toUpperCase()} to ${target.toUpperCase()}`,
              body: `## ✅ Strategic Refactoring Blue-Green Deployment Success
            
            **Phase:** ${phase}
            **Target:** ${target}
            **Completion Time:** ${new Date().toISOString()}
            **Deployment ID:** ${{ needs.deployment-preparation.outputs.deployment-id }}
            **Active URL:** ${{ needs.execute-switch.outputs.new-active-url }}
            
            ## Deployment Metrics
            
            - **Zero Downtime:** ✅ Achieved
            - **Mobile Navigation (P0):** ✅ Preserved
            - **Performance:** ✅ Within budgets
            - **Accessibility:** ✅ Compliance maintained
            - **Visual Consistency:** ✅ No regressions
            
            ## Test Results Summary
            
            - Mobile Navigation: ${{ needs.test-green-environment.outputs.mobile-nav-status }}
            - Performance: ${{ needs.test-green-environment.outputs.performance-status }}
            - Accessibility: ${{ needs.test-green-environment.outputs.accessibility-status }}
            - Visual Regression: ${{ needs.test-green-environment.outputs.visual-status }}
            
            ## Next Steps
            
            - [ ] Monitor deployment for 24 hours
            - [ ] Collect performance metrics
            - [ ] Prepare for next phase if applicable
            - [ ] Update team on successful deployment`,
              labels: ['deployment-success', 'blue-green', 'strategic-refactoring', phase, target]
            });