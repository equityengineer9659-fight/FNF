<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Grant lifecycle wheel diagram showing six stages: Identify, Apply, Award, Manage, Report, Renew with stage indicators">
  <defs>
    <linearGradient id="gm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gm-complete" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="gm-active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="gm-deadline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="gm-upcoming" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="gm-center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="gm-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm-softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#gm-bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">GRANT LIFECYCLE</text>

  <!-- Outer ring track -->
  <circle cx="400" cy="210" r="145" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="40"/>

  <!-- Arc segments for each stage (6 stages = 60° each, starting from top -90°) -->
  <!-- Stage 1: Identify — complete (green) — 0° to 60° (from -90 to -30) -->
  <!-- Using path arcs. Each arc: large-arc=0 for <180°. cx=400,cy=210,r=145 -->
  <!-- Segment 1: -90° to -30° = top to upper-right -->
  <path d="M 400 65 A 145 145 0 0 1 525.6 137.5" fill="none" stroke="url(#gm-complete)" stroke-width="38" stroke-linecap="butt" filter="url(#gm-softglow)"/>
  <!-- Segment 2: -30° to 30° = upper-right to right -->
  <path d="M 525.6 137.5 A 145 145 0 0 1 525.6 282.5" fill="none" stroke="url(#gm-active)" stroke-width="38" stroke-linecap="butt" filter="url(#gm-softglow)"/>
  <!-- Segment 3: 30° to 90° = right to lower-right — deadline amber -->
  <path d="M 525.6 282.5 A 145 145 0 0 1 400 355" fill="none" stroke="url(#gm-deadline)" stroke-width="38" stroke-linecap="butt" filter="url(#gm-softglow)"/>
  <!-- Segment 4: 90° to 150° = lower-right to lower-left — upcoming -->
  <path d="M 400 355 A 145 145 0 0 1 274.4 282.5" fill="none" stroke="url(#gm-upcoming)" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 5: 150° to 210° = lower-left to left — upcoming -->
  <path d="M 274.4 282.5 A 145 145 0 0 1 274.4 137.5" fill="none" stroke="url(#gm-upcoming)" stroke-width="38" stroke-linecap="butt"/>
  <!-- Segment 6: 210° to 270° = left to top — upcoming slightly brighter -->
  <path d="M 274.4 137.5 A 145 145 0 0 1 400 65" fill="none" stroke="rgba(30,58,138,0.7)" stroke-width="38" stroke-linecap="butt"/>

  <!-- Segment divider lines -->
  <line x1="400" y1="65" x2="400" y2="355" stroke="rgba(15,23,42,0.9)" stroke-width="3"/>
  <line x1="400" y1="210" x2="525.6" y2="137.5" stroke="rgba(15,23,42,0.9)" stroke-width="3" transform="rotate(0,400,210)"/>
  <line x1="400" y1="210" x2="525.6" y2="282.5" stroke="rgba(15,23,42,0.9)" stroke-width="3"/>
  <line x1="400" y1="210" x2="274.4" y2="282.5" stroke="rgba(15,23,42,0.9)" stroke-width="3"/>
  <line x1="400" y1="210" x2="274.4" y2="137.5" stroke="rgba(15,23,42,0.9)" stroke-width="3"/>

  <!-- Center circle -->
  <circle cx="400" cy="210" r="100" fill="url(#gm-center)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="400" y="200" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle">Grant</text>
  <text x="400" y="218" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle">Lifecycle</text>
  <text x="400" y="238" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">6 Stages</text>

  <!-- Stage labels — positioned at midpoint of each arc segment, r=145 from center -->
  <!-- Stage 1 IDENTIFY: midpoint at -60° → x=400+145*cos(-60°)=472.5, y=210+145*sin(-60°)=84.4 -->
  <text x="472" y="96" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">IDENTIFY</text>
  <text x="472" y="108" font-family="system-ui,sans-serif" font-size="9" fill="rgba(16,185,129,0.9)" text-anchor="middle">✓ Complete</text>

  <!-- Stage 2 APPLY: midpoint at 0° → x=545, y=210 -->
  <text x="553" y="206" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">APPLY</text>
  <text x="553" y="218" font-family="system-ui,sans-serif" font-size="9" fill="rgba(14,165,233,0.9)" text-anchor="middle">● Active</text>

  <!-- Stage 3 AWARD: midpoint at 60° → x=472.5, y=335.6 -->
  <text x="476" y="322" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">AWARD</text>
  <text x="476" y="334" font-family="system-ui,sans-serif" font-size="9" fill="rgba(245,158,11,0.9)" text-anchor="middle">⚑ Deadline</text>

  <!-- Stage 4 MANAGE: midpoint at 120° → x=327.5, y=335.6 -->
  <text x="324" y="322" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">MANAGE</text>
  <text x="324" y="334" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Upcoming</text>

  <!-- Stage 5 REPORT: midpoint at 180° → x=247, y=210 -->
  <text x="241" y="206" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">REPORT</text>
  <text x="241" y="218" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Upcoming</text>

  <!-- Stage 6 RENEW: midpoint at 240° → x=327.5, y=84.4 -->
  <text x="327" y="96" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">RENEW</text>
  <text x="327" y="108" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">Upcoming</text>

  <!-- Legend -->
  <rect x="30" y="355" width="12" height="12" rx="2" fill="url(#gm-complete)"/>
  <text x="47" y="365" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Completed</text>
  <rect x="130" y="355" width="12" height="12" rx="2" fill="url(#gm-active)"/>
  <text x="147" y="365" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Active</text>
  <rect x="210" y="355" width="12" height="12" rx="2" fill="url(#gm-deadline)"/>
  <text x="227" y="365" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Deadline Soon</text>
  <rect x="335" y="355" width="12" height="12" rx="2" fill="url(#gm-upcoming)"/>
  <text x="352" y="365" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Upcoming</text>

  <!-- Direction arrow on ring -->
  <path d="M 436 66 Q 460 58 478 72" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <polygon points="475,69 480,74 470,75" fill="rgba(255,255,255,0.3)"/>
</svg>
