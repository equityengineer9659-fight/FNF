  <text x="610" y="294" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">Waste Reduction</text>
  <text x="610" y="329" font-family="system-ui" font-size="32" font-weight="700" fill="url(#da-grad3)">31%</text>
  <text x="610" y="346" font-family="system-ui" font-size="10" fill="rgba(99,102,241,0.7)">year over year</text>
