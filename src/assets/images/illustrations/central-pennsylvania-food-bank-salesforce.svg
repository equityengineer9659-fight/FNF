<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SNAP case management pipeline showing client intake flowing through case tracking to outcomes">
  <defs>
    <linearGradient id="cpf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cpf-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cpf-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cpf-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="cpf-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.85"/>
    </linearGradient>
    <radialGradient id="cpf-glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cpf-glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cpf-glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cpf-glow-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="cpf-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#cpf-bg)"/>

  <!-- Title -->
  <text x="400" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">SNAP CASE MANAGEMENT — SALESFORCE NONPROFIT CLOUD</text>

  <!-- Glows behind circles -->
  <circle cx="140" cy="180" r="70" fill="url(#cpf-glow-cyan)"/>
  <circle cx="330" cy="180" r="70" fill="url(#cpf-glow-blue)"/>
  <circle cx="520" cy="180" r="70" fill="url(#cpf-glow-green)"/>
  <circle cx="700" cy="180" r="70" fill="url(#cpf-glow-amber)"/>

  <!-- Connection lines with arrows -->
  <line x1="190" y1="180" x2="275" y2="180" stroke="rgba(14,165,233,0.3)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="275,177 284,180 275,183" fill="rgba(14,165,233,0.5)"/>

  <line x1="380" y1="180" x2="465" y2="180" stroke="rgba(1,118,211,0.3)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="465,177 474,180 465,183" fill="rgba(1,118,211,0.5)"/>

  <line x1="570" y1="180" x2="645" y2="180" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="645,177 654,180 645,183" fill="rgba(16,185,129,0.5)"/>

  <!-- Node 1: Client Intake (cyan) -->
  <circle cx="140" cy="180" r="48" fill="url(#cpf-cyan)" filter="url(#cpf-glow)"/>
  <circle cx="140" cy="180" r="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Person icon -->
  <circle cx="140" cy="167" r="8" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M125,193 Q125,180 140,180 Q155,180 155,193" fill="none" stroke="white" stroke-width="1.5"/>
  <text x="140" y="210" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">CLIENT</text>
  <text x="140" y="220" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">INTAKE</text>
  <!-- Metric -->
  <text x="140" y="260" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(14,165,233,0.8)" text-anchor="middle">Unified Data</text>

  <!-- Node 2: Case Tracking (blue) -->
  <circle cx="330" cy="180" r="48" fill="url(#cpf-blue)" filter="url(#cpf-glow)"/>
  <circle cx="330" cy="180" r="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Folder icon -->
  <rect x="312" y="167" width="36" height="26" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M312,173 L312,167 Q312,165 314,165 L325,165 L328,167 L346,167" fill="none" stroke="white" stroke-width="1.5"/>
  <text x="330" y="210" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">CASE</text>
  <text x="330" y="220" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">TRACKING</text>
  <!-- Metric -->
  <text x="330" y="260" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(1,118,211,0.8)" text-anchor="middle">60% Faster</text>

  <!-- Node 3: Follow-up (green) -->
  <circle cx="520" cy="180" r="48" fill="url(#cpf-green)" filter="url(#cpf-glow)"/>
  <circle cx="520" cy="180" r="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Bell icon -->
  <path d="M510,182 Q510,168 520,168 Q530,168 530,182 L532,185 L508,185 Z" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="520" cy="188" r="3" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="520" y1="165" x2="520" y2="168" stroke="white" stroke-width="1.5"/>
  <text x="520" y="210" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">FOLLOW-UP</text>
  <!-- Metric -->
  <text x="520" y="260" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(16,185,129,0.8)" text-anchor="middle">Auto Alerts</text>

  <!-- Node 4: Outcomes (amber) -->
  <circle cx="700" cy="180" r="48" fill="url(#cpf-amber)" filter="url(#cpf-glow)"/>
  <circle cx="700" cy="180" r="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Chart icon -->
  <rect x="684" y="165" width="32" height="24" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="690" y1="183" x2="690" y2="175" stroke="white" stroke-width="2"/>
  <line x1="696" y1="183" x2="696" y2="171" stroke="white" stroke-width="2"/>
  <line x1="702" y1="183" x2="702" y2="177" stroke="white" stroke-width="2"/>
  <line x1="708" y1="183" x2="708" y2="169" stroke="white" stroke-width="2"/>
  <text x="700" y="210" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">OUTCOMES</text>
  <!-- Metric -->
  <text x="700" y="260" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(245,158,11,0.8)" text-anchor="middle">Better Reporting</text>

  <!-- Subtle progress bar connecting all stages -->
  <line x1="90" y1="300" x2="750" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="90" y1="300" x2="750" y2="300" stroke="rgba(14,165,233,0.15)" stroke-width="2" stroke-dasharray="3,6"/>

  <!-- Legend -->
  <circle cx="32" cy="378" r="7" fill="url(#cpf-cyan)"/>
  <text x="44" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Intake</text>
  <circle cx="100" cy="378" r="7" fill="url(#cpf-blue)"/>
  <text x="112" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Case Tracking</text>
  <circle cx="206" cy="378" r="7" fill="url(#cpf-green)"/>
  <text x="218" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Follow-up</text>
  <circle cx="296" cy="378" r="7" fill="url(#cpf-amber)"/>
  <text x="308" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Outcomes</text>
  <text x="780" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="end">Dashed lines = case progression flow</text>
</svg>