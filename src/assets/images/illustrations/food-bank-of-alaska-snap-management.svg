<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alaska map outline showing SNAP service distribution from central hub to remote communities">
  <defs>
    <linearGradient id="fba-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fba-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fba-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="fba-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="fba-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.85"/>
    </linearGradient>
    <radialGradient id="fba-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0"/>
    </radialGradient>
    <filter id="fba-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#fba-bg)"/>

  <!-- Title -->
  <text x="400" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">FOOD BANK OF ALASKA — REACHING REMOTE COMMUNITIES</text>

  <!-- Simplified Alaska outline (abstract shape) -->
  <path d="M120,280 L100,250 L90,210 L105,170 L130,140 L170,110 L220,90 L280,75 L340,70 L400,72 L460,80 L510,95 L540,115 L555,140 L560,170 L570,195 L600,210 L630,230 L650,260 L640,290 L610,310 L560,325 L500,330 L440,328 L380,320 L320,310 L260,300 L200,290 L160,285 Z"
    fill="rgba(14,165,233,0.04)"
    stroke="rgba(14,165,233,0.15)"
    stroke-width="1.5"
    stroke-linejoin="round"/>

  <!-- Aleutian Islands extension (abstract) -->
  <path d="M120,280 L95,285 L70,278 L50,268 L35,255"
    fill="none"
    stroke="rgba(14,165,233,0.12)"
    stroke-width="1.5"
    stroke-linecap="round"/>
  <!-- Small island dots -->
  <circle cx="55" cy="262" r="3" fill="rgba(14,165,233,0.15)"/>
  <circle cx="38" cy="255" r="2.5" fill="rgba(14,165,233,0.12)"/>

  <!-- Panhandle (Southeast) -->
  <path d="M650,260 L670,270 L685,290 L695,315 L700,340"
    fill="none"
    stroke="rgba(14,165,233,0.12)"
    stroke-width="1.5"
    stroke-linecap="round"/>

  <!-- === Connection lines from hub to remote communities === -->
  <!-- Hub is at ~380,230 (Anchorage area, south-central) -->

  <!-- To Fairbanks (north) -->
  <line x1="380" y1="210" x2="370" y2="110" stroke="rgba(245,158,11,0.2)" stroke-width="1.2" stroke-dasharray="4,4"/>
  <!-- To Barrow/North Slope -->
  <line x1="380" y1="210" x2="310" y2="82" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Nome (west) -->
  <line x1="360" y1="225" x2="150" y2="155" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Bethel (southwest) -->
  <line x1="365" y1="240" x2="165" y2="260" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Juneau (southeast) -->
  <line x1="400" y1="240" x2="665" y2="280" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Kodiak -->
  <line x1="370" y1="245" x2="310" y2="310" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Kenai -->
  <line x1="375" y1="245" x2="350" y2="295" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Valdez -->
  <line x1="400" y1="230" x2="490" y2="180" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Kotzebue -->
  <line x1="370" y1="215" x2="185" y2="115" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Dillingham -->
  <line x1="360" y1="248" x2="210" y2="290" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- To Sitka -->
  <line x1="400" y1="245" x2="640" y2="305" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Hub glow -->
  <circle cx="380" cy="230" r="55" fill="url(#fba-hub-glow)"/>

  <!-- === Central Hub (Anchorage) === -->
  <circle cx="380" cy="230" r="32" fill="url(#fba-blue)" filter="url(#fba-glow)"/>
  <circle cx="380" cy="230" r="32" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="380" y="225" font-family="system-ui,sans-serif" font-size="9" font-weight="800" fill="white" text-anchor="middle">ANCHORAGE</text>
  <text x="380" y="237" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle">Central Hub</text>

  <!-- === Remote Community dots === -->
  <!-- Fairbanks (large, interior) -->
  <circle cx="370" cy="105" r="12" fill="url(#fba-cyan)"/>
  <text x="370" y="108" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="white" text-anchor="middle">FBX</text>

  <!-- Barrow / Utqiagvik (far north) -->
  <circle cx="310" cy="78" r="8" fill="url(#fba-green)"/>

  <!-- Nome (west coast) -->
  <circle cx="145" cy="150" r="8" fill="url(#fba-green)"/>

  <!-- Kotzebue -->
  <circle cx="180" cy="110" r="7" fill="url(#fba-green)"/>

  <!-- Bethel (southwest) -->
  <circle cx="160" cy="258" r="8" fill="url(#fba-green)"/>

  <!-- Dillingham -->
  <circle cx="205" cy="290" r="6" fill="url(#fba-green)"/>

  <!-- Kodiak -->
  <circle cx="305" cy="312" r="8" fill="url(#fba-green)"/>

  <!-- Kenai -->
  <circle cx="346" cy="297" r="7" fill="url(#fba-cyan)"/>

  <!-- Valdez -->
  <circle cx="492" cy="176" r="7" fill="url(#fba-cyan)"/>

  <!-- Juneau -->
  <circle cx="668" cy="278" r="10" fill="url(#fba-cyan)"/>
  <text x="668" y="281" font-family="system-ui,sans-serif" font-size="6" font-weight="600" fill="white" text-anchor="middle">JNU</text>

  <!-- Sitka -->
  <circle cx="642" cy="308" r="6" fill="url(#fba-green)"/>

  <!-- Additional small remote dots -->
  <circle cx="240" cy="125" r="4" fill="rgba(16,185,129,0.6)"/>
  <circle cx="430" cy="95" r="4" fill="rgba(16,185,129,0.6)"/>
  <circle cx="520" cy="130" r="4" fill="rgba(16,185,129,0.6)"/>
  <circle cx="110" cy="200" r="4" fill="rgba(16,185,129,0.5)"/>
  <circle cx="270" cy="290" r="4" fill="rgba(16,185,129,0.5)"/>
  <circle cx="460" cy="310" r="3.5" fill="rgba(16,185,129,0.5)"/>
  <circle cx="580" cy="260" r="3.5" fill="rgba(16,185,129,0.5)"/>

  <!-- Scale / distance indicator -->
  <text x="710" y="55" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.2)" text-anchor="middle">580K sq mi</text>
  <line x1="678" y1="62" x2="742" y2="62" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="678" y1="59" x2="678" y2="65" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="742" y1="59" x2="742" y2="65" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Legend -->
  <circle cx="32" cy="378" r="7" fill="url(#fba-blue)"/>
  <text x="44" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Central Hub</text>
  <circle cx="130" cy="378" r="7" fill="url(#fba-cyan)"/>
  <text x="142" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Regional Centers</text>
  <circle cx="256" cy="378" r="7" fill="url(#fba-green)"/>
  <text x="268" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Remote Communities</text>
  <circle cx="400" cy="378" r="5" fill="rgba(245,158,11,0.4)"/>
  <text x="410" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">SNAP Service Routes</text>
  <text x="780" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="end">Dashed lines = supply routes</text>
</svg>