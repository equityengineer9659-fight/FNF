<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Salesforce leadership dashboard mockup with metric tiles showing key food bank performance indicators">
  <defs>
    <linearGradient id="rd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rd-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rd-tile1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="rd-tile2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="rd-tile3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="rd-tile4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="rd-tile5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="rd-tile6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="rd-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#rd-bg)"/>

  <!-- Dashboard chrome / header bar -->
  <rect x="40" y="20" width="720" height="38" rx="6" fill="url(#rd-header)"/>
  <circle cx="60" cy="39" r="7" fill="white" opacity="0.3"/>
  <text x="80" y="44" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Food Bank Leadership Dashboard</text>
  <text x="660" y="44" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Last updated: Today</text>

  <!-- Row 1 tiles -->
  <!-- Tile 1: Clients Served -->
  <rect x="40" y="70" width="170" height="110" rx="8" fill="url(#rd-tile1)" stroke="#0176D3" stroke-width="1.5"/>
  <text x="55" y="92" font-family="Arial, sans-serif" font-size="10" fill="#7ec8e8">CLIENTS SERVED</text>
  <text x="55" y="95" font-family="Arial, sans-serif" font-size="9" fill="#7ec8e8">THIS MONTH</text>
  <text x="55" y="130" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#bae6fd">2,847</text>
  <!-- Trend arrow up -->
  <polygon points="148,118 156,118 152,110" fill="#10b981"/>
  <text x="160" y="120" font-family="Arial, sans-serif" font-size="10" fill="#10b981">+12%</text>
  <!-- Mini sparkline -->
  <polyline points="55,162 72,155 89,158 106,148 123,152 140,142 157,138 174,135" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="55" y="175" font-family="Arial, sans-serif" font-size="8" fill="#7ec8e8">vs. prior month</text>

  <!-- Tile 2: Pounds Distributed -->
  <rect x="222" y="70" width="170" height="110" rx="8" fill="url(#rd-tile2)" stroke="#10b981" stroke-width="1.5"/>
  <text x="237" y="92" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7">POUNDS DISTRIBUTED</text>
  <text x="237" y="130" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#a7f3d0">142K</text>
  <polygon points="330,118 338,118 334,110" fill="#10b981"/>
  <text x="342" y="120" font-family="Arial, sans-serif" font-size="10" fill="#10b981">+8%</text>
  <polyline points="237,162 254,156 271,160 288,150 305,154 322,144 339,148 356,140" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="237" y="175" font-family="Arial, sans-serif" font-size="8" fill="#6ee7b7">lbs this month</text>

  <!-- Tile 3: Volunteer Hours -->
  <rect x="404" y="70" width="170" height="110" rx="8" fill="url(#rd-tile3)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="419" y="92" font-family="Arial, sans-serif" font-size="9" fill="#fde68a">VOLUNTEER HOURS</text>
  <text x="419" y="130" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#fef3c7">1,204</text>
  <polygon points="512,118 520,118 516,110" fill="#10b981"/>
  <text x="524" y="120" font-family="Arial, sans-serif" font-size="10" fill="#10b981">+5%</text>
  <polyline points="419,162 436,158 453,163 470,154 487,158 504,149 521,152 538,145" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="419" y="175" font-family="Arial, sans-serif" font-size="8" fill="#fde68a">hrs this month</text>

  <!-- Tile 4: Active Grants -->
  <rect x="586" y="70" width="174" height="110" rx="8" fill="url(#rd-tile4)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="601" y="92" font-family="Arial, sans-serif" font-size="9" fill="#c4b5fd">ACTIVE GRANTS</text>
  <text x="601" y="130" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ede9fe">14</text>
  <text x="641" y="130" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd">grants</text>
  <text x="601" y="152" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">Total: $1.2M awarded</text>
  <text x="601" y="168" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6">3 reports due this month</text>
  <text x="601" y="175" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd">⚠ 1 overdue</text>

  <!-- Row 2 tiles -->
  <!-- Tile 5: Donor Retention -->
  <rect x="40" y="195" width="355" height="100" rx="8" fill="url(#rd-tile5)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="55" y="215" font-family="Arial, sans-serif" font-size="10" fill="#67e8f9">DONOR RETENTION RATE</text>
  <!-- Donut chart simplified -->
  <circle cx="105" cy="252" r="32" fill="none" stroke="#1e3a5f" stroke-width="10"/>
  <circle cx="105" cy="252" r="32" fill="none" stroke="#06b6d4" stroke-width="10" stroke-dasharray="128 73" stroke-dashoffset="-40" stroke-linecap="round"/>
  <text x="105" y="248" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#67e8f9" text-anchor="middle">63%</text>
  <text x="105" y="262" font-family="Arial, sans-serif" font-size="8" fill="#22d3ee" text-anchor="middle">retained</text>
  <!-- Bar breakdown -->
  <text x="155" y="235" font-family="Arial, sans-serif" font-size="9" fill="#67e8f9">Major Donors</text>
  <rect x="155" y="240" width="120" height="8" rx="3" fill="#1e3a5f"/>
  <rect x="155" y="240" width="96" height="8" rx="3" fill="#06b6d4" opacity="0.8"/>
  <text x="260" y="248" font-family="Arial, sans-serif" font-size="8" fill="#22d3ee">80%</text>
  <text x="155" y="258" font-family="Arial, sans-serif" font-size="9" fill="#67e8f9">Mid-Level</text>
  <rect x="155" y="263" width="120" height="8" rx="3" fill="#1e3a5f"/>
  <rect x="155" y="263" width="78" height="8" rx="3" fill="#06b6d4" opacity="0.6"/>
  <text x="260" y="271" font-family="Arial, sans-serif" font-size="8" fill="#22d3ee">65%</text>
  <text x="155" y="280" font-family="Arial, sans-serif" font-size="9" fill="#67e8f9">First-Time</text>
  <rect x="155" y="285" width="120" height="8" rx="3" fill="#1e3a5f"/>
  <rect x="155" y="285" width="49" height="8" rx="3" fill="#06b6d4" opacity="0.4"/>
  <text x="260" y="293" font-family="Arial, sans-serif" font-size="8" fill="#22d3ee">41%</text>

  <!-- Tile 6: Distribution Events -->
  <rect x="404" y="195" width="356" height="100" rx="8" fill="url(#rd-tile6)" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="419" y="215" font-family="Arial, sans-serif" font-size="10" fill="#7dd3fc">DISTRIBUTION EVENTS — THIS MONTH</text>
  <!-- Bar chart -->
  <rect x="428" y="272" width="18" height="22" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="455" y="255" width="18" height="39" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="482" y="248" width="18" height="46" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="509" y="260" width="18" height="34" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="536" y="243" width="18" height="51" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="563" y="252" width="18" height="42" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="590" y="258" width="18" height="36" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="617" y="246" width="18" height="48" rx="2" fill="url(#rd-bar)" opacity="0.9"/>
  <rect x="644" y="268" width="18" height="26" rx="2" fill="url(#rd-bar)" opacity="0.5"/>
  <text x="428" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W1</text>
  <text x="455" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W2</text>
  <text x="482" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W3</text>
  <text x="509" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W4</text>
  <text x="536" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W5</text>
  <text x="563" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W6</text>
  <text x="590" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W7</text>
  <text x="617" y="300" font-family="Arial, sans-serif" font-size="7" fill="#7ec8e8">W8</text>
  <text x="644" y="300" font-family="Arial, sans-serif" font-size="7" fill="#38bdf8">W9▶</text>
  <text x="530" y="225" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#bae6fd" text-anchor="middle">38 events</text>

  <!-- Footer label -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e0f2fe" text-anchor="middle">Salesforce Leadership Dashboard</text>
  <text x="400" y="378" font-family="Arial, sans-serif" font-size="10" fill="#7ec8e8" text-anchor="middle">One screen · Six decisions · Zero guesswork</text>
</svg>
