  <text x="120" y="230" font-family="system-ui, sans-serif" font-size="19" text-anchor="middle">📱</text>
  <text x="120" y="249" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Scheduled appt.</text>
  <text x="120" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">SMS reminder</text>
  <text x="120" y="275" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">QR check-in</text>
  <text x="120" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">5 min wait</text>
  <text x="120" y="301" font-family="system-ui, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">✓ smooth</text>
  <text x="120" y="344" font-family="system-ui, sans-serif" font-size="8" fill="#0ea5e9" text-anchor="middle">-89% wait time</text>

  <!-- Arrow 1 After -->
  <polygon points="169,282 180,277 180,287" fill="#10b981" opacity="0.7"/>

  <!-- Intake After -->
  <rect x="185" y="205" width="150" height="148" rx="8" fill="url(#fbcs-after)" stroke="#10b981" stroke-width="1" stroke-opacity="0.6"/>
  <text x="260" y="230" font-family="system-ui, sans-serif" font-size="19" text-anchor="middle">💻</text>
  <text x="260" y="249" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Tablet — auto-fill</text>
  <text x="260" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Bilingual forms</text>
  <text x="260" y="275" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Minimal data ask</text>
  <text x="260" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">2 min per client</text>
  <text x="260" y="301" font-family="system-ui, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">✓ smooth</text>
  <text x="260" y="344" font-family="system-ui, sans-serif" font-size="8" fill="#0ea5e9" text-anchor="middle">-75% intake time</text>

  <!-- Arrow 2 After -->
  <polygon points="338,282 349,277 349,287" fill="#10b981" opacity="0.7"/>

  <!-- Selection After -->
  <rect x="354" y="205" width="110" height="148" rx="8" fill="url(#fbcs-after)" stroke="#10b981" stroke-width="1" stroke-opacity="0.6"/>
  <text x="410" y="230" font-family="system-ui, sans-serif" font-size="19" text-anchor="middle">✅</text>
  <text x="410" y="249" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Client-choice</text>
  <text x="410" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Saved prefs</text>
  <text x="410" y="275" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Dietary filters</text>
  <text x="410" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">Autonomy respected</text>
  <text x="410" y="301" font-family="system-ui, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">✓ smooth</text>
  <text x="410" y="344" font-family="system-ui, sans-serif" font-size="8" fill="#0ea5e9" text-anchor="middle">+31% satisfaction</text>

  <!-- Arrow 3 After -->
  <polygon points="467,282 478,277 478,287" fill="#10b981" opacity="0.7"/>

  <!-- Distribution After -->
  <rect x="483" y="205" width="170" height="148" rx="8" fill="url(#fbcs-after)" stroke="#10b981" stroke-width="1" stroke-opacity="0.6"/>
  <text x="568" y="230" font-family="system-ui, sans-serif" font-size="19" text-anchor="middle">📊</text>
  <text x="568" y="249" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Auto inventory update</text>
  <text x="568" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Real-time capacity</text>
  <text x="568" y="275" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Digital receipt</text>
  <text x="568" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">Data auto-captured</text>
  <text x="568" y="301" font-family="system-ui, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">✓ smooth</text>
  <text x="568" y="344" font-family="system-ui, sans-serif" font-size="8" fill="#0ea5e9" text-anchor="middle">-60% data entry</text>

  <!-- Arrow 4 After -->
  <polygon points="656,282 667,277 667,287" fill="#10b981" opacity="0.7"/>

  <!-- Follow-up After -->
  <rect x="672" y="205" width="108" height="148" rx="8" fill="url(#fbcs-after)" stroke="#10b981" stroke-width="1" stroke-opacity="0.6"/>
  <text x="726" y="230" font-family="system-ui, sans-serif" font-size="19" text-anchor="middle">💬</text>
  <text x="726" y="249" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Auto next-visit</text>
  <text x="726" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">SMS resources</text>
  <text x="726" y="275" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Satisfaction pulse</text>
  <text x="726" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">Client retained</text>
  <text x="726" y="301" font-family="system-ui, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">✓ smooth</text>
  <text x="726" y="344" font-family="system-ui, sans-serif" font-size="8" fill="#0ea5e9" text-anchor="middle">+44% retention</text>

  <!-- Bottom label -->
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">food-n-force.com · Client Services Technology</text>
</svg>
