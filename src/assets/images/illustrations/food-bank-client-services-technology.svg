  <rect x="483" y="55" width="170" height="108" rx="8" fill="url(#fbcs-before)" stroke="#f87171" stroke-width="1" stroke-opacity="0.5"/>
  <text x="568" y="78" font-family="system-ui, sans-serif" font-size="19" text-anchor="middle">📦</text>
  <text x="568" y="96" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">Manual check-in</text>
  <text x="568" y="109" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">No record update</text>
  <text x="568" y="122" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">Inventory guesswork</text>
  <text x="568" y="135" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Paper tracking</text>
  <text x="568" y="149" font-family="system-ui, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">★ friction</text>

  <!-- Arrow 4 -->
  <polygon points="656,117 667,112 667,122" fill="#475569"/>

