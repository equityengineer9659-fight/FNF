  <text x="726" y="96" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">No follow-up</text>
  <text x="726" y="109" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">No reminder</text>
  <text x="726" y="122" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">Client lost</text>
  <text x="726" y="135" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">High lapse rate</text>
  <text x="726" y="149" font-family="system-ui, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">★★ friction</text>

  <!-- ===== AFTER ROW ===== -->
  <!-- Progress arrows (bottom, after) -->
  <line x1="75" y1="282" x2="785" y2="282" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>

