<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Data flow map showing client record with privacy shield and access controls">
  <defs>
    <linearGradient id="dp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dp-center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dp-shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="dp-staff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dp-partner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dp-report" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dp-storage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1"/>
    </linearGradient>
    <filter id="dp-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#dp-bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="200" y1="0" x2="200" y2="400" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="0" y1="133" x2="800" y2="133" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="0" y1="267" x2="800" y2="267" stroke="#0ea5e9" stroke-width="1"/>
  </g>

  <!-- Connection lines from center to nodes -->
  <line x1="320" y1="200" x2="160" y2="100" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="320" y1="200" x2="160" y2="300" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="480" y1="200" x2="640" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="480" y1="200" x2="640" y2="300" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- Center: Client Record box -->
  <rect x="280" y="155" width="240" height="90" rx="10" fill="url(#dp-center)" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="280" y="155" width="240" height="90" rx="10" fill="none" stroke="url(#dp-center)" stroke-width="2"/>
  <!-- Person icon -->
  <circle cx="320" cy="185" r="10" fill="#0ea5e9" opacity="0.9"/>
  <path d="M308 210 Q320 202 332 210" stroke="#0ea5e9" stroke-width="2" fill="none" opacity="0.9"/>
  <text x="340" y="188" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e0f2fe">Client Record</text>
  <text x="340" y="204" font-family="Arial, sans-serif" font-size="10" fill="#94d2f5">Name · Household · Income</text>
  <text x="340" y="218" font-family="Arial, sans-serif" font-size="10" fill="#94d2f5">Visit History · Health Notes</text>
  <text x="292" y="235" font-family="Arial, sans-serif" font-size="9" fill="#7ec8e8">Stored in Salesforce</text>

  <!-- Node: Staff Access (top-left) -->
  <rect x="70" y="55" width="150" height="70" rx="8" fill="url(#dp-staff)" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Lock icon -->
  <rect x="86" y="75" width="14" height="11" rx="2" fill="#0ea5e9" opacity="0.8"/>
  <path d="M89 75 Q93 68 99 68 Q105 68 107 75" stroke="#0ea5e9" stroke-width="2" fill="none"/>
  <text x="108" y="80" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#bae6fd">Staff Access</text>
  <text x="86" y="96" font-family="Arial, sans-serif" font-size="9" fill="#7ec8e8">Role-based permissions</text>
  <text x="86" y="109" font-family="Arial, sans-serif" font-size="9" fill="#7ec8e8">Field-level security</text>

  <!-- Node: Partner Access (bottom-left) -->
  <rect x="70" y="265" width="150" height="70" rx="8" fill="url(#dp-partner)" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="90" cy="283" r="8" fill="#8b5cf6" opacity="0.7"/>
  <path d="M86 283 L90 279 L94 283" stroke="white" stroke-width="1.5" fill="none"/>
  <text x="106" y="286" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c4b5fd">Partner Access</text>
  <text x="86" y="303" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">Minimum data only</text>
  <text x="86" y="316" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">Consent required</text>

  <!-- Node: Reporting/Analytics (top-right) -->
  <rect x="580" y="55" width="155" height="70" rx="8" fill="url(#dp-report)" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Chart icon -->
  <rect x="596" y="76" width="5" height="10" fill="#f59e0b" opacity="0.9"/>
  <rect x="604" y="70" width="5" height="16" fill="#f59e0b" opacity="0.9"/>
  <rect x="612" y="73" width="5" height="13" fill="#f59e0b" opacity="0.9"/>
  <text x="624" y="80" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fde68a">Reporting &amp;</text>
  <text x="624" y="93" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fde68a">Analytics</text>
  <text x="596" y="109" font-family="Arial, sans-serif" font-size="9" fill="#fcd34d">Aggregated · Anonymized</text>

  <!-- Node: Encrypted Storage (bottom-right) -->
  <rect x="580" y="265" width="155" height="70" rx="8" fill="url(#dp-storage)" opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <!-- Database icon -->
  <ellipse cx="598" cy="281" rx="10" ry="4" fill="#10b981" opacity="0.7"/>
  <rect x="588" y="281" width="20" height="12" fill="#10b981" opacity="0.5"/>
  <ellipse cx="598" cy="293" rx="10" ry="4" fill="#10b981" opacity="0.7"/>
  <text x="616" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6ee7b7">Encrypted</text>
  <text x="616" y="298" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6ee7b7">Storage</text>
  <text x="596" y="316" font-family="Arial, sans-serif" font-size="9" fill="#34d399">AES-256 · TLS in transit</text>

  <!-- Privacy Shield (large, semi-transparent overlay) -->
  <g filter="url(#dp-glow)" opacity="0.18">
    <path d="M400 20 L480 50 L480 160 Q480 230 400 260 Q320 230 320 160 L320 50 Z" fill="url(#dp-shield)"/>
  </g>
  <!-- Shield outline -->
  <path d="M400 22 L476 51 L476 158 Q476 226 400 256 Q324 226 324 158 L324 51 Z" fill="none" stroke="url(#dp-shield)" stroke-width="2" opacity="0.6"/>
  <!-- Shield checkmark -->
  <path d="M382 135 L395 150 L420 122" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Privacy Shield label -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle" opacity="0.9">Privacy Shield</text>

  <!-- Title -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e0f2fe" text-anchor="middle">Client Data Privacy Framework</text>
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="11" fill="#7ec8e8" text-anchor="middle">Collect only what is needed · Control who can see it · Protect it at every step</text>
</svg>
