<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flow diagram showing food bank kitchen operations pipeline from sourcing through preparation, production, packaging, and distribution">
  <defs>
    <linearGradient id="fko-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fko-sourcing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4F72;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="fko-prep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="fko-prod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="fko-pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="fko-dist" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="fko-stat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="fko-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#fko-bg)"/>

  <!-- Subtle horizontal guide lines -->
  <line x1="0" y1="155" x2="800" y2="155" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="265" x2="800" y2="265" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui" font-size="14" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">KITCHEN OPERATIONS PIPELINE</text>

  <!-- STEP 1: Sourcing -->
  <rect x="30" y="155" width="118" height="110" rx="12" fill="url(#fko-sourcing)" filter="url(#fko-glow)"/>
  <rect x="30" y="155" width="118" height="110" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Truck icon (simplified) -->
  <rect x="60" y="172" width="56" height="30" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="82" y="164" width="34" height="20" rx="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="66" cy="206" r="7" fill="rgba(255,255,255,0.3)"/>
  <circle cx="100" cy="206" r="7" fill="rgba(255,255,255,0.3)"/>
  <circle cx="66" cy="206" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="100" cy="206" r="3" fill="rgba(255,255,255,0.7)"/>
  <text x="89" y="234" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Sourcing</text>
  <text x="89" y="249" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Rescued &amp; donated</text>
  <text x="89" y="260" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">ingredients</text>

  <!-- Arrow 1→2 -->
  <path d="M148 210 L172 210" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="172,205 182,210 172,215" fill="rgba(255,255,255,0.4)"/>

  <!-- STEP 2: Preparation -->
  <rect x="182" y="155" width="118" height="110" rx="12" fill="url(#fko-prep)" filter="url(#fko-glow)"/>
  <rect x="182" y="155" width="118" height="110" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Chef hat icon -->
  <ellipse cx="241" cy="178" rx="22" ry="14" fill="rgba(255,255,255,0.25)"/>
  <rect x="222" y="183" width="38" height="12" rx="2" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="241" cy="178" rx="16" ry="10" fill="rgba(255,255,255,0.15)"/>
  <text x="241" y="217" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Preparation</text>
  <text x="241" y="232" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Sorting, washing</text>
  <text x="241" y="243" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">&amp; mise en place</text>
  <text x="241" y="257" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">HACCP monitored</text>

  <!-- Arrow 2→3 -->
  <path d="M300 210 L324 210" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="324,205 334,210 324,215" fill="rgba(255,255,255,0.4)"/>

  <!-- STEP 3: Production -->
  <rect x="334" y="155" width="118" height="110" rx="12" fill="url(#fko-prod)" filter="url(#fko-glow)"/>
  <rect x="334" y="155" width="118" height="110" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Flame / cooking icon -->
  <path d="M393 175 Q389 182 391 188 Q386 183 387 176 Q382 183 384 192 Q387 200 393 202 Q399 200 402 192 Q404 183 399 176 Q400 183 395 188 Q397 182 393 175Z" fill="rgba(255,255,255,0.3)"/>
  <text x="393" y="217" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Production</text>
  <text x="393" y="232" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Batch cooking</text>
  <text x="393" y="243" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">&amp; recipe scaling</text>
  <text x="393" y="257" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">Volume-tracked</text>

  <!-- Arrow 3→4 -->
  <path d="M452 210 L476 210" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="476,205 486,210 476,215" fill="rgba(255,255,255,0.4)"/>

  <!-- STEP 4: Packaging -->
  <rect x="486" y="155" width="118" height="110" rx="12" fill="url(#fko-pack)" filter="url(#fko-glow)"/>
  <rect x="486" y="155" width="118" height="110" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Box icon -->
  <rect x="523" y="172" width="32" height="26" rx="3" fill="rgba(255,255,255,0.2)"/>
  <path d="M523 180 L539 180" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <path d="M523 172 L531 166 L555 166 L555 192 L539 192" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <path d="M539 172 L539 166" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="545" y="217" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Packaging</text>
  <text x="545" y="232" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Portioning &amp;</text>
  <text x="545" y="243" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">labeling meals</text>
  <text x="545" y="257" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">Cold chain verified</text>

  <!-- Arrow 4→5 -->
  <path d="M604 210 L628 210" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="628,205 638,210 628,215" fill="rgba(255,255,255,0.4)"/>

  <!-- STEP 5: Distribution -->
  <rect x="638" y="155" width="118" height="110" rx="12" fill="url(#fko-dist)" filter="url(#fko-glow)"/>
  <rect x="638" y="155" width="118" height="110" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Location pin icon -->
  <circle cx="697" cy="179" r="12" fill="rgba(255,255,255,0.2)"/>
  <circle cx="697" cy="177" r="5" fill="rgba(255,255,255,0.4)"/>
  <path d="M697 191 L697 202" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <text x="697" y="217" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Distribution</text>
  <text x="697" y="232" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Partners, direct</text>
  <text x="697" y="243" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">service &amp; delivery</text>
  <text x="697" y="257" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">Demand-matched</text>

  <!-- Stat callout box -->
  <rect x="270" y="298" width="260" height="72" rx="12" fill="url(#fko-stat)" opacity="0.85"/>
  <rect x="270" y="298" width="260" height="72" rx="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="400" y="320" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(255,255,255,0.75)" text-anchor="middle">MEALS PRODUCED</text>
  <text x="400" y="348" font-family="system-ui" font-size="28" font-weight="700" fill="white" text-anchor="middle">5,000+</text>
  <text x="400" y="362" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">per week at full production capacity</text>

  <!-- Connecting line from pipeline to callout -->
  <line x1="400" y1="265" x2="400" y2="298" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom label -->
  <text x="400" y="388" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Food Bank Kitchen Operations — From Surplus Ingredients to Community Meals</text>
</svg>
