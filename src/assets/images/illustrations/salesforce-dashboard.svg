  <!-- Chart grid lines -->
  <line x1="285" y1="230" x2="510" y2="230" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="285" y1="265" x2="510" y2="265" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="285" y1="300" x2="510" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Bar chart -->
  <rect x="295" y="260" width="22" height="70" rx="3" fill="url(#sf-grad1)" opacity="0.7"/>
  <rect x="327" y="240" width="22" height="90" rx="3" fill="url(#sf-grad1)" opacity="0.8"/>
  <rect x="359" y="250" width="22" height="80" rx="3" fill="url(#sf-grad1)" opacity="0.7"/>
  <rect x="391" y="225" width="22" height="105" rx="3" fill="url(#sf-grad2)" opacity="0.9"/>
  <rect x="423" y="235" width="22" height="95" rx="3" fill="url(#sf-grad2)" opacity="0.8"/>
  <rect x="455" y="215" width="22" height="115" rx="3" fill="url(#sf-grad2)"/>
  <rect x="487" y="220" width="22" height="110" rx="3" fill="url(#sf-grad2)" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="306,255 338,235 370,245 402,220 434,230 466,210 498,215" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chart label -->
  <text x="275" y="215" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">Weekly Distribution</text>
  <!-- Right panel - recent activity -->
  <rect x="550" y="195" width="130" height="160" rx="10" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="565" y="218" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">Recent Activity</text>
  <circle cx="575" cy="240" r="4" fill="#10b981"/>
  <rect x="588" y="236" width="75" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="575" cy="262" r="4" fill="#0ea5e9"/>
  <rect x="588" y="258" width="65" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="575" cy="284" r="4" fill="#f59e0b"/>
  <rect x="588" y="280" width="80" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="575" cy="306" r="4" fill="#6366f1"/>
  <rect x="588" y="302" width="55" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="575" cy="328" r="4" fill="#10b981"/>
  <rect x="588" y="324" width="70" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
