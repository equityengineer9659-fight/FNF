<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="sf-grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sf-grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sf-grad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Main dashboard frame -->
  <rect x="100" y="30" width="600" height="340" rx="16" fill="rgba(15,23,42,0.6)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  <!-- Top bar -->
  <rect x="100" y="30" width="600" height="50" rx="16" fill="rgba(99,102,241,0.15)"/>
  <rect x="100" y="64" width="600" height="16" fill="rgba(99,102,241,0.15)"/>
  <!-- Top bar dots -->
  <circle cx="130" cy="55" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="150" cy="55" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="170" cy="55" r="6" fill="#10b981" opacity="0.7"/>
  <!-- Sidebar -->
  <rect x="100" y="80" width="140" height="290" fill="rgba(99,102,241,0.08)"/>
  <rect x="120" y="100" width="100" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
  <rect x="120" y="125" width="80" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="120" y="145" width="90" height="8" rx="4" fill="url(#sf-grad1)" opacity="0.6"/>
  <rect x="120" y="165" width="70" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="120" y="185" width="85" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="120" y="215" width="100" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
  <rect x="120" y="240" width="75" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="120" y="260" width="90" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <!-- Stat cards row -->
  <rect x="260" y="95" width="130" height="80" rx="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="280" y="130" font-family="system-ui" font-size="24" font-weight="700" fill="url(#sf-grad2)">2,847</text>
  <text x="280" y="155" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">Families Served</text>
  <rect x="405" y="95" width="130" height="80" rx="10" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="425" y="130" font-family="system-ui" font-size="24" font-weight="700" fill="url(#sf-grad3)">94%</text>
  <text x="425" y="155" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">Distribution Rate</text>
  <rect x="550" y="95" width="130" height="80" rx="10" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="570" y="130" font-family="system-ui" font-size="24" font-weight="700" fill="#f59e0b">156</text>
  <text x="570" y="155" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">Active Volunteers</text>
