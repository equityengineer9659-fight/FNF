<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Volunteer coordination dashboard showing weekly schedule, hours tracked, and automated reminders">
  <defs>
    <linearGradient id="vmt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="vmt-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="vmt-teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="vmt-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="vmt-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#vmt-bg)" rx="12"/>

  <!-- Platform frame / header bar -->
  <rect x="20" y="20" width="760" height="48" rx="8" fill="url(#vmt-blue)" opacity="0.25"/>
  <text x="40" y="50" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.9">Volunteer Management Dashboard</text>

  <!-- Stat cards row -->
  <!-- Hours Tracked -->
  <rect x="20" y="82" width="170" height="78" rx="8" fill="url(#vmt-card)" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="36" y="108" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Hours Tracked</text>
  <text x="36" y="134" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#vmt-teal)">4,820</text>
  <text x="36" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">▲ 12% this month</text>

  <!-- Active Volunteers -->
  <rect x="204" y="82" width="170" height="78" rx="8" fill="url(#vmt-card)" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="220" y="108" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Active Volunteers</text>
  <text x="220" y="134" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#vmt-blue)">342</text>
  <text x="220" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#0ea5e9">▲ 28 new this week</text>

  <!-- Reminders Sent -->
  <rect x="388" y="82" width="170" height="78" rx="8" fill="url(#vmt-card)" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="404" y="108" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Auto-Reminders Sent</text>
  <text x="404" y="134" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#vmt-amber)">218</text>
  <text x="404" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">↓ 37% no-show rate</text>

  <!-- No-Shows Prevented -->
  <rect x="572" y="82" width="208" height="78" rx="8" fill="url(#vmt-card)" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="588" y="108" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Shifts Filled</text>
  <text x="588" y="134" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#10b981">96%</text>
  <text x="588" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">vs 71% pre-platform</text>

