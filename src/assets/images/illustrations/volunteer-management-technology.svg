  <rect x="366" y="243" width="84" height="18" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="408" y="256" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">6/6 ✓</text>
  <rect x="476" y="243" width="84" height="18" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="518" y="256" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">5/6 ✓</text>
  <rect x="586" y="243" width="84" height="18" rx="4" fill="#0176D3" opacity="0.7"/>
  <text x="628" y="256" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">10/10 dist.</text>
  <rect x="696" y="243" width="84" height="18" rx="4" fill="rgba(255,255,255,0.1)" stroke="#334155" stroke-width="1"/>
  <text x="738" y="256" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">closed</text>

