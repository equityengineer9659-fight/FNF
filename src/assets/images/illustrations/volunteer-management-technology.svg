  <rect x="36" y="268" width="84" height="18" rx="4" fill="rgba(255,255,255,0.1)" stroke="#334155" stroke-width="1"/>
  <text x="78" y="281" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">—</text>
  <rect x="146" y="268" width="84" height="18" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="188" y="281" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">8/8 ✓</text>
  <rect x="256" y="268" width="84" height="18" rx="4" fill="rgba(255,255,255,0.1)" stroke="#334155" stroke-width="1"/>
  <text x="298" y="281" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">—</text>
  <rect x="366" y="268" width="84" height="18" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="408" y="281" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">5/8 open</text>
  <rect x="476" y="268" width="84" height="18" rx="4" fill="rgba(255,255,255,0.1)" stroke="#334155" stroke-width="1"/>
  <text x="518" y="281" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">—</text>
  <rect x="586" y="268" width="84" height="18" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="628" y="281" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">12/12 ✓</text>
  <rect x="696" y="268" width="84" height="18" rx="4" fill="rgba(255,255,255,0.1)" stroke="#334155" stroke-width="1"/>
  <text x="738" y="281" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">—</text>

  <!-- Legend -->
  <rect x="20" y="305" width="12" height="12" rx="2" fill="#10b981" opacity="0.8"/>
  <text x="36" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Filled</text>
  <rect x="90" y="305" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.7"/>
  <text x="106" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Open Slots</text>
  <rect x="180" y="305" width="12" height="12" rx="2" fill="#0176D3" opacity="0.7"/>
  <text x="196" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Distribution Event</text>

  <!-- Automated reminder notification -->
  <rect x="480" y="298" width="300" height="72" rx="8" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="496" y="316" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#06b6d4">Automated Reminder Sent</text>
  <text x="496" y="333" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">📅 Thu Mobile Pantry — 3 volunteers</text>
