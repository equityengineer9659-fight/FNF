<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Unified operations diagram showing SNAP workflows, partner management, and call center connected through Salesforce">
  <defs>
    <linearGradient id="rr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rr-hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rr-snap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="rr-partner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="rr-call" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="rr-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0"/>
    </radialGradient>
    <filter id="rr-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#rr-bg)"/>

  <!-- Title -->
  <text x="400" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">ROADRUNNER FOOD BANK — UNIFIED OPERATIONS</text>

  <!-- Hub glow halo -->
  <circle cx="400" cy="195" r="100" fill="url(#rr-hub-glow)"/>

  <!-- === DASHED CONNECTIONS (behind nodes) === -->
  <!-- Hub to SNAP (top-left) -->
  <line x1="348" y1="170" x2="195" y2="100" stroke="rgba(16,185,129,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Hub to Partner (top-right) -->
  <line x1="452" y1="170" x2="605" y2="100" stroke="rgba(245,158,11,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Hub to Call Center (bottom) -->
  <line x1="400" y1="245" x2="400" y2="310" stroke="rgba(139,92,246,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Cross-connections between satellites -->
  <line x1="195" y1="130" x2="400" y2="310" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="605" y1="130" x2="400" y2="310" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="195" y1="100" x2="605" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- === CENTRAL HUB === -->
  <circle cx="400" cy="195" r="55" fill="url(#rr-hub)" filter="url(#rr-glow)"/>
  <circle cx="400" cy="195" r="55" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="400" y="191" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">Salesforce</text>
  <text x="400" y="207" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle">Unified Platform</text>

  <!-- === SNAP / BENEFITS (top-left) === -->
  <circle cx="170" cy="95" r="42" fill="url(#rr-snap)"/>
  <circle cx="170" cy="95" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="170" y="88" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">SNAP</text>
  <text x="170" y="101" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">Benefits</text>
  <!-- Sub-process dots -->
  <circle cx="110" cy="148" r="14" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="110" y="152" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle">Intake</text>
  <line x1="124" y1="142" x2="148" y2="120" stroke="rgba(16,185,129,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="170" cy="158" r="14" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="170" y="162" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle">Tracking</text>
  <line x1="170" y1="144" x2="170" y2="137" stroke="rgba(16,185,129,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="230" cy="148" r="14" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="230" y="152" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle">Benefits</text>
  <line x1="216" y1="142" x2="192" y2="120" stroke="rgba(16,185,129,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- === PARTNER NETWORK (top-right) === -->
  <circle cx="630" cy="95" r="42" fill="url(#rr-partner)"/>
  <circle cx="630" cy="95" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="630" y="88" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Partner</text>
  <text x="630" y="101" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">Network</text>
  <!-- Sub-process dots -->
  <circle cx="570" cy="148" r="14" fill="rgba(245,158,11,0.3)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="570" y="152" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle">Agencies</text>
  <line x1="584" y1="142" x2="608" y2="120" stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="630" cy="158" r="14" fill="rgba(245,158,11,0.3)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="630" y="152" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">Distri-</text>
  <text x="630" y="162" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">bution</text>
  <line x1="630" y1="144" x2="630" y2="137" stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="690" cy="148" r="14" fill="rgba(245,158,11,0.3)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="690" y="148" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">Commu-</text>
  <text x="690" y="158" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">nication</text>
  <line x1="676" y1="142" x2="652" y2="120" stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- === CALL CENTER (bottom) === -->
  <circle cx="400" cy="320" r="42" fill="url(#rr-call)"/>
  <circle cx="400" cy="320" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="400" y="314" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Call</text>
  <text x="400" y="327" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">Center</text>
  <!-- Sub-process dots -->
  <circle cx="320" cy="340" r="14" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
  <text x="320" y="340" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">Work-</text>
  <text x="320" y="349" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">flows</text>
  <line x1="334" y1="336" x2="362" y2="326" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="400" cy="370" r="14" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
  <text x="400" y="374" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle">Tracking</text>
  <line x1="400" y1="356" x2="400" y2="362" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <circle cx="480" cy="340" r="14" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
  <text x="480" y="340" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">Repor-</text>
  <text x="480" y="349" font-family="system-ui,sans-serif" font-size="6.5" fill="rgba(255,255,255,0.7)" text-anchor="middle">ting</text>
  <line x1="466" y1="336" x2="438" y2="326" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Metric label -->
  <text x="400" y="268" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(14,165,233,0.6)" text-anchor="middle">60M lbs food distributed annually</text>

  <!-- Legend -->
  <circle cx="32" cy="378" r="7" fill="url(#rr-hub)"/>
  <text x="44" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Salesforce</text>
  <circle cx="120" cy="378" r="7" fill="url(#rr-snap)"/>
  <text x="132" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">SNAP/Benefits</text>
  <circle cx="230" cy="378" r="7" fill="url(#rr-partner)"/>
  <text x="242" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Partner Network</text>
  <circle cx="360" cy="378" r="7" fill="url(#rr-call)"/>
  <text x="372" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Call Center</text>
  <text x="780" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="end">Dashed lines = data + workflow integration</text>
</svg>
