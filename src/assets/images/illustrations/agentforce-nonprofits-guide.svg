<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hub-and-spoke diagram showing an AI agent at the center connecting to five nonprofit use case nodes">
  <defs>
    <linearGradient id="afg-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="afg-hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="afg-node-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="afg-node-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="afg-node-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="afg-node-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="afg-node-e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="afg-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="afg-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#afg-bg)"/>

  <!-- Subtle concentric rings around hub -->
  <circle cx="400" cy="200" r="100" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <circle cx="400" cy="200" r="150" fill="none" stroke="rgba(139,92,246,0.06)" stroke-width="1"/>
  <circle cx="400" cy="200" r="180" fill="none" stroke="rgba(139,92,246,0.04)" stroke-width="1"/>

  <!-- Hub glow -->
  <circle cx="400" cy="200" r="80" fill="url(#afg-hub-glow)"/>

  <!-- Connection lines (spokes) -->
  <!-- To Donor Queries (top) -->
  <line x1="400" y1="162" x2="400" y2="80" stroke="rgba(14,165,233,0.4)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- To Volunteer Scheduling (top right) -->
  <line x1="430" y1="172" x2="570" y2="108" stroke="rgba(139,92,246,0.4)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- To Grant Tracking (bottom right) -->
  <line x1="435" y1="220" x2="570" y2="295" stroke="rgba(6,182,212,0.4)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- To Intake Support (bottom left) -->
  <line x1="365" y1="220" x2="230" y2="295" stroke="rgba(16,185,129,0.4)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- To Reporting (top left) -->
  <line x1="370" y1="172" x2="230" y2="108" stroke="rgba(245,158,11,0.4)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Hub circle -->
  <circle cx="400" cy="200" r="62" fill="url(#afg-hub)" opacity="0.95" filter="url(#afg-glow)"/>
  <circle cx="400" cy="200" r="62" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Hub labels -->
  <text x="400" y="188" font-family="system-ui" font-size="13" font-weight="700" fill="white" text-anchor="middle">AI Agent</text>
  <!-- Lightning bolt symbol -->
  <text x="400" y="208" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle">⚡</text>
  <text x="400" y="226" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Agentforce</text>

  <!-- NODE A: Donor Queries (top center) -->
  <rect x="330" y="28" width="140" height="52" rx="10" fill="url(#afg-node-a)"/>
  <text x="400" y="50" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Donor Queries</text>
  <text x="400" y="66" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Automated inquiry responses</text>

  <!-- NODE B: Volunteer Scheduling (top right) -->
  <rect x="530" y="82" width="155" height="52" rx="10" fill="url(#afg-node-b)"/>
  <text x="607" y="104" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Volunteer</text>
  <text x="607" y="118" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Scheduling</text>

  <!-- NODE C: Grant Tracking (bottom right) -->
  <rect x="530" y="268" width="155" height="52" rx="10" fill="url(#afg-node-c)"/>
  <text x="607" y="290" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Grant Tracking</text>
  <text x="607" y="306" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Deadlines &amp; reports</text>

  <!-- NODE D: Intake Support (bottom left) -->
  <rect x="115" y="268" width="155" height="52" rx="10" fill="url(#afg-node-d)"/>
  <text x="192" y="290" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Intake Support</text>
  <text x="192" y="306" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Pre-screening &amp; routing</text>

  <!-- NODE E: Reporting (top left) -->
  <rect x="115" y="82" width="145" height="52" rx="10" fill="url(#afg-node-e)"/>
  <text x="187" y="104" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Reporting</text>
  <text x="187" y="120" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Auto-generated summaries</text>

  <!-- Animated dot indicators on spokes -->
  <circle cx="400" cy="125" r="3" fill="rgba(14,165,233,0.8)"/>
  <circle cx="494" cy="141" r="3" fill="rgba(139,92,246,0.8)"/>
  <circle cx="497" cy="256" r="3" fill="rgba(6,182,212,0.8)"/>
  <circle cx="303" cy="256" r="3" fill="rgba(16,185,129,0.8)"/>
  <circle cx="306" cy="141" r="3" fill="rgba(245,158,11,0.8)"/>

  <!-- Bottom label -->
  <text x="400" y="382" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Agentforce for Nonprofits — Autonomous AI Agent Architecture</text>
</svg>
