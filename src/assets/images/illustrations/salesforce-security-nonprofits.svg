<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Layered security diagram showing concentric rings from network security through application security to data security and client privacy at the center">
  <defs>
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a3a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ss-ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4F72;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="ss-ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.45"/>
    </linearGradient>
    <linearGradient id="ss-ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.65"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.55"/>
    </linearGradient>
    <linearGradient id="ss-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="ss-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0"/>
    </radialGradient>
    <filter id="ss-blur">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#ss-bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(1,118,211,0.06)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="rgba(1,118,211,0.06)" stroke-width="1"/>

  <!-- Glow behind rings -->
  <ellipse cx="400" cy="200" rx="190" ry="190" fill="url(#ss-glow)"/>

  <!-- Ring 1: Network Security (outermost) -->
  <circle cx="400" cy="200" r="175" fill="url(#ss-ring1)" opacity="0.7"/>
  <circle cx="400" cy="200" r="175" fill="none" stroke="rgba(1,118,211,0.5)" stroke-width="1.5"/>

  <!-- Ring 2: Application Security -->
  <circle cx="400" cy="200" r="130" fill="url(#ss-ring2)" opacity="0.75"/>
  <circle cx="400" cy="200" r="130" fill="none" stroke="rgba(14,165,233,0.55)" stroke-width="1.5"/>

  <!-- Ring 3: Data Security -->
  <circle cx="400" cy="200" r="85" fill="url(#ss-ring3)" opacity="0.8"/>
  <circle cx="400" cy="200" r="85" fill="none" stroke="rgba(6,182,212,0.65)" stroke-width="1.5"/>

  <!-- Core: Client Privacy -->
  <circle cx="400" cy="200" r="48" fill="url(#ss-core)" filter="url(#ss-blur)"/>
  <circle cx="400" cy="200" r="48" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Lock icon at center -->
  <!-- Lock body -->
  <rect x="388" y="196" width="24" height="18" rx="3" fill="rgba(255,255,255,0.95)"/>
  <!-- Lock shackle -->
  <path d="M392 196 Q392 185 400 185 Q408 185 408 196" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="400" cy="204" r="3" fill="rgba(6,182,212,0.9)"/>
  <rect x="398.5" y="204" width="3" height="5" rx="1" fill="rgba(6,182,212,0.9)"/>

  <!-- Ring labels -->
  <!-- Network Security (top of ring 1) -->
  <text x="400" y="24" font-family="system-ui" font-size="11" font-weight="700" fill="rgba(14,165,233,0.9)" text-anchor="middle" letter-spacing="1">NETWORK SECURITY</text>
  <!-- Application Security label on ring 2 -->
  <text x="400" y="71" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(14,165,233,0.85)" text-anchor="middle">APPLICATION SECURITY</text>
  <!-- Data Security label on ring 3 -->
  <text x="400" y="116" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle">DATA SECURITY</text>
  <!-- Client Privacy label in core ring -->
  <text x="400" y="172" font-family="system-ui" font-size="9" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle">CLIENT</text>
  <text x="400" y="182" font-family="system-ui" font-size="9" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle">PRIVACY</text>

  <!-- Feature badges arranged in arc around the diagram -->
  <!-- Badge: Profiles & Permissions -->
  <rect x="25" y="80" width="145" height="40" rx="8" fill="rgba(1,118,211,0.35)" stroke="rgba(1,118,211,0.5)" stroke-width="1"/>
  <text x="97" y="96" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">Profiles &amp; Permissions</text>
  <text x="97" y="111" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Least privilege access</text>
  <line x1="170" y1="100" x2="228" y2="140" stroke="rgba(1,118,211,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Badge: MFA -->
  <rect x="25" y="170" width="145" height="40" rx="8" fill="rgba(1,118,211,0.35)" stroke="rgba(1,118,211,0.5)" stroke-width="1"/>
  <text x="97" y="186" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">Multi-Factor Auth</text>
  <text x="97" y="201" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Required for all users</text>
  <line x1="170" y1="190" x2="225" y2="195" stroke="rgba(1,118,211,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Badge: Audit Trails -->
  <rect x="25" y="260" width="145" height="40" rx="8" fill="rgba(1,118,211,0.35)" stroke="rgba(1,118,211,0.5)" stroke-width="1"/>
  <text x="97" y="276" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">Audit Trails</text>
  <text x="97" y="291" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Login history &amp; changes</text>
  <line x1="170" y1="280" x2="228" y2="255" stroke="rgba(1,118,211,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Badge: Health Check -->
  <rect x="630" y="80" width="145" height="40" rx="8" fill="rgba(14,165,233,0.3)" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
  <text x="702" y="96" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">Health Check Score</text>
  <text x="702" y="111" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Security baseline audit</text>
  <line x1="630" y1="100" x2="572" y2="140" stroke="rgba(14,165,233,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Badge: Field-Level Security -->
  <rect x="630" y="170" width="145" height="40" rx="8" fill="rgba(14,165,233,0.3)" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
  <text x="702" y="186" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">Field-Level Security</text>
  <text x="702" y="201" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Sensitive data restriction</text>
  <line x1="630" y1="190" x2="575" y2="195" stroke="rgba(14,165,233,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Badge: Session Settings -->
  <rect x="630" y="260" width="145" height="40" rx="8" fill="rgba(14,165,233,0.3)" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
  <text x="702" y="276" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">Session Settings</text>
  <text x="702" y="291" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle">Timeout &amp; IP controls</text>
  <line x1="630" y1="280" x2="572" y2="255" stroke="rgba(14,165,233,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom label -->
  <text x="400" y="388" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Salesforce Security Layers — Defense-in-Depth for Nonprofit Organizations</text>
</svg>
