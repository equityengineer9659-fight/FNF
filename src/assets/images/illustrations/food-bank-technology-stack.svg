<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technology stack diagram showing functional layers from client management core outward to communications">
  <defs>
    <linearGradient id="ts-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ts-ring1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="ts-ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="ts-ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="ts-ring4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="ts-ring5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="ts-ring6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="ts-center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#0176D3;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#ts-bg)"/>

  <!-- Center glow -->
  <circle cx="310" cy="200" r="160" fill="url(#ts-center-glow)"/>

  <!-- Ring 6: Communications (outermost) -->
  <ellipse cx="310" cy="200" rx="278" ry="178" fill="url(#ts-ring6)" opacity="0.25" stroke="#06b6d4" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- Ring 5: Analytics & Reporting -->
  <ellipse cx="310" cy="200" rx="228" ry="148" fill="url(#ts-ring5)" opacity="0.3" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="6,3"/>

  <!-- Ring 4: Volunteer Management -->
  <ellipse cx="310" cy="200" rx="180" ry="118" fill="url(#ts-ring4)" opacity="0.35" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- Ring 3: Donor & Fundraising -->
  <ellipse cx="310" cy="200" rx="134" ry="90" fill="url(#ts-ring3)" opacity="0.4" stroke="#10b981" stroke-width="1.8"/>

  <!-- Ring 2: Inventory & Logistics -->
  <ellipse cx="310" cy="200" rx="92" ry="62" fill="url(#ts-ring2)" opacity="0.45" stroke="#0ea5e9" stroke-width="2"/>

  <!-- Ring 1 (core): Client Management -->
  <ellipse cx="310" cy="200" rx="55" ry="38" fill="url(#ts-ring1)" opacity="0.9"/>
  <text x="310" y="196" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">CLIENT</text>
  <text x="310" y="208" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">MGMT</text>

  <!-- Layer labels (ring 2) -->
  <text x="310" y="142" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7dd3fc" text-anchor="middle">Inventory &amp; Logistics</text>
  <text x="406" y="202" font-family="Arial, sans-serif" font-size="8" fill="#67e8f9" text-anchor="start">Warehouse · FIFO</text>

  <!-- Layer labels (ring 3) -->
  <text x="310" y="115" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Donor &amp; Fundraising</text>
  <text x="440" y="192" font-family="Arial, sans-serif" font-size="8" fill="#34d399" text-anchor="start">Gifts · Grants · CRM</text>

  <!-- Layer labels (ring 4) -->
  <text x="310" y="85" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Volunteer Management</text>
  <text x="488" y="193" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa" text-anchor="start">Scheduling · Hours</text>

  <!-- Layer labels (ring 5) -->
  <text x="310" y="55" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fde68a" text-anchor="middle">Analytics &amp; Reporting</text>
  <text x="534" y="195" font-family="Arial, sans-serif" font-size="8" fill="#fcd34d" text-anchor="start">Dashboards · Grants</text>

  <!-- Layer labels (ring 6) -->
  <text x="310" y="26" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#67e8f9" text-anchor="middle">Communications</text>
  <text x="578" y="197" font-family="Arial, sans-serif" font-size="8" fill="#22d3ee" text-anchor="start">Email · SMS · Social</text>

  <!-- ===== Right side: stack list / legend ===== -->
  <rect x="620" y="30" width="165" height="330" rx="10" fill="#0a1628" stroke="#1e3a5f" stroke-width="1.5" opacity="0.95"/>
  <text x="703" y="55" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e0f2fe" text-anchor="middle">Starter Stack</text>
  <line x1="635" y1="62" x2="770" y2="62" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Stack items -->
  <!-- Core -->
  <rect x="635" y="72" width="12" height="12" rx="2" fill="#0176D3"/>
  <text x="654" y="82" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#bae6fd">Salesforce NPSP</text>
  <text x="654" y="94" font-family="Arial, sans-serif" font-size="8" fill="#7ec8e8">Client · Donor · Volunteer</text>
  <text x="654" y="104" font-family="Arial, sans-serif" font-size="8" fill="#38bdf8">Free (Power of Us)</text>

  <line x1="635" y1="112" x2="770" y2="112" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="635" y="120" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="654" y="130" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6ee7b7">Google Workspace</text>
  <text x="654" y="142" font-family="Arial, sans-serif" font-size="8" fill="#34d399">Email · Docs · Drive</text>
  <text x="654" y="152" font-family="Arial, sans-serif" font-size="8" fill="#34d399">Free (Google for NPs)</text>

  <line x1="635" y1="160" x2="770" y2="160" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="635" y="168" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="654" y="178" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fde68a">Mailchimp</text>
  <text x="654" y="190" font-family="Arial, sans-serif" font-size="8" fill="#fcd34d">Email marketing</text>
  <text x="654" y="200" font-family="Arial, sans-serif" font-size="8" fill="#fcd34d">NP discount rate</text>

  <line x1="635" y1="208" x2="770" y2="208" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="635" y="216" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="654" y="226" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c4b5fd">Scheduling Tool</text>
  <text x="654" y="238" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa">Volunteers · Clients</text>
  <text x="654" y="248" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa">Free tier available</text>

  <line x1="635" y1="256" x2="770" y2="256" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Discounts callout -->
  <text x="703" y="274" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e0f2fe" text-anchor="middle">Discount Programs</text>
  <text x="703" y="289" font-family="Arial, sans-serif" font-size="8" fill="#7ec8e8" text-anchor="middle">TechSoup</text>
  <text x="703" y="302" font-family="Arial, sans-serif" font-size="8" fill="#7ec8e8" text-anchor="middle">Google for Nonprofits</text>
  <text x="703" y="315" font-family="Arial, sans-serif" font-size="8" fill="#7ec8e8" text-anchor="middle">Microsoft for Nonprofits</text>
  <text x="703" y="328" font-family="Arial, sans-serif" font-size="8" fill="#7ec8e8" text-anchor="middle">Salesforce Power of Us</text>
  <text x="703" y="341" font-family="Arial, sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">Can cut costs 60–80%</text>

  <!-- Bottom -->
  <text x="310" y="375" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e0f2fe" text-anchor="middle">Food Bank Technology Stack</text>
  <text x="310" y="393" font-family="Arial, sans-serif" font-size="10" fill="#7ec8e8" text-anchor="middle">Design as an integrated system · Avoid tool sprawl · Start with core, expand outward</text>
</svg>
