<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Diagram showing the grant development lifecycle as a six-stage circular flow — Research, Propose, Submit, Award, Report, Cultivate — managed by a central Salesforce CRM hub, with the human cost of emotional labor on the left and diversified funding outcomes on the right">
  <defs>
    <linearGradient id="gw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <linearGradient id="gw-hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0176D3"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gw-bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gw-bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gw-bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gw-bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="gw-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gw-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="gw-arrow-purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#8b5cf6" opacity="0.9"/>
    </marker>
    <marker id="gw-arrow-cyan" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#06b6d4" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#gw-bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4f6280" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- ── LEFT SIDE: The Human Cost ── -->
  <text x="110" y="30" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#fca5a5" letter-spacing="2" opacity="0.9">EMOTIONAL LABOR</text>

  <!-- Document stack (proposals piling up) -->
  <g opacity="0.75">
    <rect x="76" y="52" width="68" height="52" rx="3" fill="#1e0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <line x1="84" y1="62" x2="136" y2="62" stroke="#fca5a5" stroke-width="1.2" opacity="0.7"/>
    <line x1="84" y1="70" x2="128" y2="70" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
    <line x1="84" y1="78" x2="132" y2="78" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
    <line x1="84" y1="86" x2="122" y2="86" stroke="#fca5a5" stroke-width="0.8" opacity="0.4"/>
  </g>
  <g opacity="0.6">
    <rect x="70" y="110" width="68" height="52" rx="3" fill="#1e0a0a" stroke="#ef4444" stroke-width="1"/>
    <line x1="78" y1="120" x2="130" y2="120" stroke="#fca5a5" stroke-width="1.2" opacity="0.7"/>
    <line x1="78" y1="128" x2="122" y2="128" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
    <line x1="78" y1="136" x2="126" y2="136" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
    <line x1="78" y1="144" x2="116" y2="144" stroke="#fca5a5" stroke-width="0.8" opacity="0.4"/>
  </g>
  <g opacity="0.45">
    <rect x="64" y="168" width="68" height="52" rx="3" fill="#1e0a0a" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="72" y1="178" x2="124" y2="178" stroke="#fca5a5" stroke-width="1" opacity="0.6"/>
    <line x1="72" y1="186" x2="116" y2="186" stroke="#fca5a5" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Grant writer person icon -->
  <g filter="url(#gw-glow)" opacity="0.9">
    <circle cx="110" cy="252" r="14" fill="#1e0a0a" stroke="#ef4444" stroke-width="2"/>
    <circle cx="110" cy="248" r="7" fill="#ef4444" opacity="0.8"/>
    <rect x="96" y="258" width="28" height="20" rx="4" fill="#ef4444" opacity="0.7"/>
  </g>
  <text x="110" y="296" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" fill="#fca5a5" opacity="0.8" letter-spacing="1">GRANT WRITER</text>

  <!-- Weight arrows pushing down on person (burden) -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.5" fill="none">
    <line x1="95" y1="230" x2="95" y2="242"/>
    <polygon points="92,240 95,246 98,240" fill="#ef4444" stroke="none"/>
    <line x1="110" y1="228" x2="110" y2="240"/>
    <polygon points="107,238 110,244 113,238" fill="#ef4444" stroke="none"/>
    <line x1="125" y1="230" x2="125" y2="242"/>
    <polygon points="122,240 125,246 128,240" fill="#ef4444" stroke="none"/>
  </g>

  <!-- Arrow feeding into lifecycle ring -->
  <path d="M175,180 Q230,170 295,155" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3" marker-end="url(#gw-arrow-purple)"/>

  <!-- ── CENTER: Grant Lifecycle Ring ── -->
  <!-- Spoke lines from hub to each node -->
  <g stroke="#8b5cf6" stroke-width="0.8" opacity="0.25">
    <line x1="400" y1="200" x2="313" y2="150"/>
    <line x1="400" y1="200" x2="400" y2="105"/>
    <line x1="400" y1="200" x2="487" y2="150"/>
    <line x1="400" y1="200" x2="487" y2="250"/>
    <line x1="400" y1="200" x2="400" y2="295"/>
    <line x1="400" y1="200" x2="313" y2="250"/>
  </g>

  <!-- Lifecycle ring arcs (clockwise) with arrowheads -->
  <!-- RESEARCH → PROPOSE -->
  <path d="M313,150 A100,100 0 0 1 400,105" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#gw-arrow-purple)"/>
  <!-- PROPOSE → SUBMIT -->
  <path d="M400,105 A100,100 0 0 1 487,150" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#gw-arrow-purple)"/>
  <!-- SUBMIT → AWARD -->
  <path d="M487,150 A100,100 0 0 1 487,250" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#gw-arrow-cyan)"/>
  <!-- AWARD → REPORT -->
  <path d="M487,250 A100,100 0 0 1 400,295" stroke="#10b981" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#gw-arrow-cyan)"/>
  <!-- REPORT → CULTIVATE -->
  <path d="M400,295 A100,100 0 0 1 313,250" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#gw-arrow-cyan)"/>
  <!-- CULTIVATE → RESEARCH -->
  <path d="M313,250 A100,100 0 0 1 313,150" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.8" marker-end="url(#gw-arrow-purple)"/>

  <!-- Central CRM Hub -->
  <g filter="url(#gw-soft)">
    <circle cx="400" cy="200" r="44" fill="#0176D3" opacity="0.1"/>
    <polygon points="400,162 434,181 434,219 400,238 366,219 366,181" fill="#050c1a" stroke="url(#gw-hub)" stroke-width="2.5" opacity="0.95"/>
    <circle cx="400" cy="200" r="22" fill="url(#gw-hub)" opacity="0.9"/>
    <text x="400" y="197" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#ffffff" letter-spacing="1">SALES</text>
    <text x="400" y="208" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#ffffff" letter-spacing="1">FORCE</text>
  </g>

  <!-- ── 6 Lifecycle Nodes ── -->
  <!-- Node 1: RESEARCH (top-left, 313,150) — teal -->
  <g filter="url(#gw-glow)">
    <circle cx="313" cy="150" r="22" fill="#0a1a1a" stroke="#06b6d4" stroke-width="2" opacity="0.95"/>
    <text x="313" y="154" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#67e8f9" letter-spacing="1">RESEARCH</text>
  </g>

  <!-- Node 2: PROPOSE (top, 400,105) — purple -->
  <g filter="url(#gw-glow)">
    <circle cx="400" cy="105" r="22" fill="#0f0a1a" stroke="#8b5cf6" stroke-width="2" opacity="0.95"/>
    <text x="400" y="109" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#c4b5fd" letter-spacing="1">PROPOSE</text>
  </g>

  <!-- Node 3: SUBMIT (top-right, 487,150) — purple -->
  <g filter="url(#gw-glow)">
    <circle cx="487" cy="150" r="22" fill="#0f0a1a" stroke="#8b5cf6" stroke-width="2" opacity="0.95"/>
    <text x="487" y="154" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#c4b5fd" letter-spacing="1">SUBMIT</text>
  </g>

  <!-- Node 4: AWARD (bottom-right, 487,250) — green -->
  <g filter="url(#gw-glow)">
    <circle cx="487" cy="250" r="22" fill="#0a1a0a" stroke="#10b981" stroke-width="2.5" opacity="0.95"/>
    <text x="487" y="254" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#6ee7b7" letter-spacing="1">AWARD</text>
  </g>

  <!-- Node 5: REPORT (bottom, 400,295) — amber -->
  <g filter="url(#gw-glow)">
    <circle cx="400" cy="295" r="22" fill="#1a1000" stroke="#f59e0b" stroke-width="2" opacity="0.95"/>
    <text x="400" y="299" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#fcd34d" letter-spacing="1">REPORT</text>
  </g>

  <!-- Node 6: CULTIVATE (bottom-left, 313,250) — teal -->
  <g filter="url(#gw-glow)">
    <circle cx="313" cy="250" r="22" fill="#0a1a1a" stroke="#06b6d4" stroke-width="2" opacity="0.95"/>
    <text x="313" y="248" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" font-weight="700" fill="#67e8f9" letter-spacing="0.5">CULTIVATE</text>
    <text x="313" y="258" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" font-weight="700" fill="#67e8f9" letter-spacing="0.5">FUNDER</text>
  </g>

  <!-- ── RIGHT SIDE: Funding Pipeline Outcomes ── -->
  <text x="665" y="30" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#6ee7b7" letter-spacing="2" opacity="0.9">DIVERSIFIED FUNDING</text>

  <!-- Arrow from AWARD node to right panel -->
  <path d="M509,245 Q560,230 590,220" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,3" marker-end="url(#gw-arrow-cyan)"/>

  <!-- Funding diversity bar chart -->
  <!-- Bar 1: Federal grants (tallest) -->
  <rect x="600" y="110" width="28" height="180" rx="3" fill="url(#gw-bar1)" opacity="0.85"/>
  <text x="614" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#6ee7b7" opacity="0.8">FED</text>

  <!-- Bar 2: Foundation grants -->
  <rect x="638" y="145" width="28" height="145" rx="3" fill="url(#gw-bar2)" opacity="0.85"/>
  <text x="652" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#67e8f9" opacity="0.8">FNDTN</text>

  <!-- Bar 3: Corporate grants -->
  <rect x="676" y="170" width="28" height="120" rx="3" fill="url(#gw-bar3)" opacity="0.85"/>
  <text x="690" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#c4b5fd" opacity="0.8">CORP</text>

  <!-- Bar 4: State/Local -->
  <rect x="714" y="195" width="28" height="95" rx="3" fill="url(#gw-bar4)" opacity="0.85"/>
  <text x="728" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#fcd34d" opacity="0.8">STATE</text>

  <!-- Baseline for bar chart -->
  <line x1="592" y1="290" x2="750" y2="290" stroke="#4f6280" stroke-width="0.8" opacity="0.4"/>

  <!-- "No single funder dependency" indicator -->
  <rect x="595" y="318" width="158" height="20" rx="4" fill="#0a1a0a" stroke="#10b981" stroke-width="0.8" opacity="0.8"/>
  <text x="674" y="332" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" fill="#6ee7b7" opacity="0.9">NO SINGLE-FUNDER RISK</text>

  <!-- CRM "living calendar" strip at bottom -->
  <rect x="230" y="350" width="340" height="36" rx="5" fill="#0a0e1a" stroke="#8b5cf6" stroke-width="0.8" opacity="0.7"/>
  <text x="400" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#c4b5fd" letter-spacing="1.5" opacity="0.9">LIVING FUNDING CALENDAR</text>
  <!-- Calendar milestone dots -->
  <g opacity="0.7">
    <circle cx="255" cy="374" r="4" fill="#06b6d4"/>
    <circle cx="290" cy="374" r="4" fill="#8b5cf6"/>
    <circle cx="330" cy="374" r="5" fill="#10b981"/>
    <circle cx="375" cy="374" r="4" fill="#f59e0b"/>
    <circle cx="415" cy="374" r="4" fill="#8b5cf6"/>
    <circle cx="455" cy="374" r="5" fill="#10b981"/>
    <circle cx="495" cy="374" r="4" fill="#06b6d4"/>
    <circle cx="535" cy="374" r="4" fill="#f59e0b"/>
    <line x1="255" y1="374" x2="535" y2="374" stroke="#4f6280" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#f8fafc" letter-spacing="0.5" opacity="0.95">Grant Development: The Full Lifecycle</text>

  <!-- Corner glows -->
  <circle cx="0" cy="400" r="100" fill="#ef4444" opacity="0.02"/>
  <circle cx="800" cy="400" r="120" fill="#10b981" opacity="0.025"/>
  <circle cx="400" cy="0" r="140" fill="#8b5cf6" opacity="0.03"/>
</svg>
