<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Process automation flow showing meal planning, production, logistics, and compliance moving from Excel to automated Salesforce workflows">
  <defs>
    <linearGradient id="shpa-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shpa-meal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="shpa-prod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shpa-logistics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="shpa-compliance" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="shpa-arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="50%" style="stop-color:rgba(14,165,233,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(14,165,233,0.05)"/>
    </linearGradient>
    <radialGradient id="shpa-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <filter id="shpa-blur">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#shpa-bg)"/>

  <!-- Title -->
  <text x="400" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">FROM SPREADSHEETS TO AUTOMATED WORKFLOWS</text>

  <!-- === LEFT SIDE: Excel stack === -->
  <!-- Stack of Excel rectangles, slightly offset for depth -->
  <rect x="60" y="130" width="120" height="32" rx="4" fill="rgba(100,100,100,0.15)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
  <text x="120" y="150" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Spreadsheet</text>

  <rect x="55" y="155" width="120" height="32" rx="4" fill="rgba(100,100,100,0.15)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
  <text x="115" y="175" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Spreadsheet</text>

  <rect x="50" y="180" width="120" height="32" rx="4" fill="rgba(100,100,100,0.15)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
  <text x="110" y="200" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Spreadsheet</text>

  <rect x="45" y="205" width="120" height="32" rx="4" fill="rgba(100,100,100,0.15)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
  <text x="105" y="225" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Spreadsheet</text>

  <!-- Big X over the stack -->
  <line x1="40" y1="125" x2="185" y2="242" stroke="rgba(239,68,68,0.5)" stroke-width="3"/>
  <line x1="185" y1="125" x2="40" y2="242" stroke="rgba(239,68,68,0.5)" stroke-width="3"/>

  <!-- "Excel" label below stack -->
  <text x="110" y="268" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="rgba(239,68,68,0.5)" text-anchor="middle">Manual Excel</text>
  <text x="110" y="282" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">Processes</text>

  <!-- === TRANSFORMATION ARROW === -->
  <!-- Glow behind arrow area -->
  <ellipse cx="400" cy="195" rx="180" ry="60" fill="url(#shpa-glow)"/>

  <!-- Large flowing arrow -->
  <path d="M210,195 L330,195" stroke="rgba(14,165,233,0.3)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="325,185 345,195 325,205" fill="rgba(14,165,233,0.35)"/>

  <!-- Connecting lines between workflow boxes -->
  <line x1="465" y1="130" x2="525" y2="130" stroke="rgba(14,165,233,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="522,127 530,130 522,133" fill="rgba(14,165,233,0.4)"/>

  <line x1="465" y1="195" x2="525" y2="195" stroke="rgba(14,165,233,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="522,192 530,195 522,198" fill="rgba(14,165,233,0.4)"/>

  <line x1="465" y1="260" x2="525" y2="260" stroke="rgba(14,165,233,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="522,257 530,260 522,263" fill="rgba(14,165,233,0.4)"/>

  <!-- Vertical pipeline connector on the right -->
  <line x1="690" y1="105" x2="690" y2="285" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- === RIGHT SIDE: 4 Workflow Boxes === -->
  <!-- Meal Planning (cyan) -->
  <rect x="370" y="55" width="90" height="44" rx="6" fill="url(#shpa-meal)" filter="url(#shpa-blur)"/>
  <rect x="370" y="55" width="90" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="415" y="74" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">Meal</text>
  <text x="415" y="87" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">Planning</text>
  <!-- Checkmark -->
  <circle cx="470" cy="67" r="9" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.6)" stroke-width="1"/>
  <polyline points="465,67 468,71 476,63" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow from Meal Planning down -->
  <line x1="415" y1="99" x2="415" y2="120" stroke="rgba(14,165,233,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="412,118 415,125 418,118" fill="rgba(14,165,233,0.4)"/>

  <!-- Production (blue) -->
  <rect x="370" y="120" width="90" height="44" rx="6" fill="url(#shpa-prod)" filter="url(#shpa-blur)"/>
  <rect x="370" y="120" width="90" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="415" y="142" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">Production</text>
  <!-- Checkmark -->
  <circle cx="470" cy="132" r="9" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.6)" stroke-width="1"/>
  <polyline points="465,132 468,136 476,128" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow from Production down -->
  <line x1="415" y1="164" x2="415" y2="185" stroke="rgba(14,165,233,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="412,183 415,190 418,183" fill="rgba(14,165,233,0.4)"/>

  <!-- Logistics (green) -->
  <rect x="370" y="185" width="90" height="44" rx="6" fill="url(#shpa-logistics)" filter="url(#shpa-blur)"/>
  <rect x="370" y="185" width="90" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="415" y="210" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">Logistics</text>
  <!-- Checkmark -->
  <circle cx="470" cy="197" r="9" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.6)" stroke-width="1"/>
  <polyline points="465,197 468,201 476,193" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow from Logistics down -->
  <line x1="415" y1="229" x2="415" y2="250" stroke="rgba(14,165,233,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="412,248 415,255 418,248" fill="rgba(14,165,233,0.4)"/>

  <!-- Compliance (purple) -->
  <rect x="370" y="250" width="90" height="44" rx="6" fill="url(#shpa-compliance)" filter="url(#shpa-blur)"/>
  <rect x="370" y="250" width="90" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="415" y="275" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">Compliance</text>
  <!-- Checkmark -->
  <circle cx="470" cy="262" r="9" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.6)" stroke-width="1"/>
  <polyline points="465,262 468,266 476,258" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === RIGHT SIDE: Output labels === -->
  <!-- Connected metric boxes -->
  <rect x="535" y="108" width="90" height="44" rx="6" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.2)" stroke-width="1"/>
  <text x="580" y="127" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(14,165,233,0.8)" text-anchor="middle">Automated</text>
  <text x="580" y="140" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(14,165,233,0.8)" text-anchor="middle">Tracking</text>

  <rect x="535" y="173" width="90" height="44" rx="6" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="580" y="192" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(16,185,129,0.8)" text-anchor="middle">Real-Time</text>
  <text x="580" y="205" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(16,185,129,0.8)" text-anchor="middle">Visibility</text>

  <rect x="535" y="238" width="90" height="44" rx="6" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="580" y="257" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(139,92,246,0.8)" text-anchor="middle">Audit-Ready</text>
  <text x="580" y="270" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="rgba(139,92,246,0.8)" text-anchor="middle">Reports</text>

  <!-- Connector lines to vertical bar -->
  <line x1="625" y1="130" x2="690" y2="130" stroke="rgba(14,165,233,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="625" y1="195" x2="690" y2="195" stroke="rgba(16,185,129,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="625" y1="260" x2="690" y2="260" stroke="rgba(139,92,246,0.15)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Pipeline output label -->
  <text x="690" y="310" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="rgba(14,165,233,0.5)" text-anchor="middle">Salesforce</text>
  <text x="690" y="323" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="rgba(14,165,233,0.5)" text-anchor="middle">Workflows</text>

  <!-- Bottom label -->
  <rect x="300" y="330" width="200" height="24" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="400" y="346" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="rgba(239,68,68,0.5)" text-anchor="middle">Manual Processes Eliminated</text>

  <!-- Legend -->
  <circle cx="32" cy="382" r="7" fill="url(#shpa-meal)"/>
  <text x="44" y="386" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Meal Planning</text>
  <circle cx="140" cy="382" r="7" fill="url(#shpa-prod)"/>
  <text x="152" y="386" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Production</text>
  <circle cx="228" cy="382" r="7" fill="url(#shpa-logistics)"/>
  <text x="240" y="386" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Logistics</text>
  <circle cx="308" cy="382" r="7" fill="url(#shpa-compliance)"/>
  <text x="320" y="386" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Compliance</text>
  <circle cx="404" cy="382" r="9" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.6)" stroke-width="1"/>
  <polyline points="399,382 402,386 410,378" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="418" y="386" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Automated</text>
</svg>