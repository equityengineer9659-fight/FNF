<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Diagram showing SNAP policy cuts and ICE enforcement creating demand pressure on food banks, with distributed community partner network as the adaptive response">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <linearGradient id="snap-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="enf-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="hub-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0176D3"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="network-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4f6280" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- ── LEFT ZONE: SNAP CUTS pressure ── -->
  <!-- Red zone background -->
  <rect x="20" y="20" width="200" height="200" rx="8" fill="#ef4444" opacity="0.06"/>
  <rect x="20" y="20" width="200" height="200" rx="8" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.25"/>

  <!-- SNAP label -->
  <text x="120" y="44" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#fca5a5" letter-spacing="2" opacity="0.95">SNAP WORK REQUIREMENTS</text>

  <!-- Downward pressure arrows - red -->
  <g filter="url(#glow-red)">
    <polygon points="80,65 95,65 95,100 105,100 88,120 71,100 80,100" fill="#ef4444" opacity="0.85"/>
    <polygon points="120,55 135,55 135,100 145,100 128,120 111,100 120,100" fill="#ef4444" opacity="0.9"/>
    <polygon points="160,65 175,65 175,100 185,100 168,120 151,100 160,100" fill="#ef4444" opacity="0.85"/>
  </g>

  <!-- Visible demand people (solid) flowing toward center -->
  <!-- Person 1 -->
  <g opacity="0.85">
    <circle cx="65" cy="148" r="7" fill="#fca5a5"/>
    <rect x="59" y="157" width="12" height="16" rx="3" fill="#fca5a5"/>
  </g>
  <!-- Person 2 -->
  <g opacity="0.85">
    <circle cx="100" cy="145" r="7" fill="#fca5a5"/>
    <rect x="94" y="154" width="12" height="16" rx="3" fill="#fca5a5"/>
  </g>
  <!-- Person 3 -->
  <g opacity="0.85">
    <circle cx="135" cy="148" r="7" fill="#fca5a5"/>
    <rect x="129" y="157" width="12" height="16" rx="3" fill="#fca5a5"/>
  </g>
  <!-- Person 4 -->
  <g opacity="0.85">
    <circle cx="170" cy="145" r="7" fill="#fca5a5"/>
    <rect x="164" y="154" width="12" height="16" rx="3" fill="#fca5a5"/>
  </g>
  <!-- "Surge" label -->
  <text x="120" y="198" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8.5" fill="#ef4444" letter-spacing="1" opacity="0.9">↑ DEMAND SURGE</text>

  <!-- Arrow from SNAP zone to hub -->
  <path d="M220,120 Q280,140 340,180" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- ── RIGHT ZONE: ICE Enforcement chilling effect ── -->
  <!-- Amber zone background -->
  <rect x="580" y="20" width="200" height="200" rx="8" fill="#f59e0b" opacity="0.06"/>
  <rect x="580" y="20" width="200" height="200" rx="8" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>

  <!-- Enforcement label -->
  <text x="680" y="44" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#fcd34d" letter-spacing="2" opacity="0.95">ENFORCEMENT CHILLING</text>

  <!-- Warning/barrier shield icon -->
  <g filter="url(#glow-amber)">
    <polygon points="680,58 710,68 710,92 680,104 650,92 650,68" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="680" y="87" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="18" fill="#f59e0b" opacity="0.9">!</text>
  </g>

  <!-- Ghosted/invisible demand people (dashed outlines only) -->
  <!-- Ghost Person 1 -->
  <g opacity="0.4">
    <circle cx="625" cy="148" r="7" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
    <rect x="619" y="157" width="12" height="16" rx="3" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
  </g>
  <!-- Ghost Person 2 -->
  <g opacity="0.4">
    <circle cx="660" cy="145" r="7" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
    <rect x="654" y="154" width="12" height="16" rx="3" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
  </g>
  <!-- Ghost Person 3 -->
  <g opacity="0.4">
    <circle cx="695" cy="148" r="7" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
    <rect x="689" y="157" width="12" height="16" rx="3" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
  </g>
  <!-- Ghost Person 4 -->
  <g opacity="0.4">
    <circle cx="730" cy="145" r="7" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
    <rect x="724" y="154" width="12" height="16" rx="3" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2,2"/>
  </g>
  <!-- "Invisible demand" label -->
  <text x="680" y="198" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8.5" fill="#f59e0b" letter-spacing="1" opacity="0.9">INVISIBLE DEMAND</text>

  <!-- Arrow from enforcement zone to hub - dashed amber showing disruption -->
  <path d="M580,120 Q520,140 460,180" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- ── CENTER HUB: Food Bank + Data Infrastructure ── -->
  <g filter="url(#glow-blue)">
    <!-- Outer glow ring -->
    <circle cx="400" cy="195" r="58" fill="#0176D3" opacity="0.08"/>
    <!-- Hexagon outer -->
    <polygon points="400,142 450,170 450,222 400,250 350,222 350,170" fill="none" stroke="url(#hub-grad)" stroke-width="2.5" opacity="0.9"/>
    <!-- Hexagon inner -->
    <polygon points="400,155 435,174 435,215 400,233 365,215 365,174" fill="#050c1a" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>
    <!-- Core circle -->
    <circle cx="400" cy="195" r="28" fill="url(#hub-grad)" opacity="0.9"/>
    <!-- Inner cross/data symbol -->
    <line x1="400" y1="181" x2="400" y2="209" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="386" y1="195" x2="414" y2="195" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="400" cy="195" r="6" fill="#06b6d4" opacity="1"/>
  </g>
  <!-- Hub label -->
  <text x="400" y="270" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#bfdbfe" letter-spacing="1" opacity="0.95">FOOD BANK HUB</text>
  <text x="400" y="284" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" fill="#93c5fd" letter-spacing="1" opacity="0.75">DATA INFRASTRUCTURE</text>

  <!-- ── BOTTOM NETWORK: Distributed Community Partners ── -->
  <!-- Network background band -->
  <rect x="30" y="305" width="740" height="80" rx="8" fill="url(#network-grad)" opacity="0.06"/>
  <rect x="30" y="305" width="740" height="80" rx="8" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.2"/>

  <!-- Network label -->
  <text x="400" y="322" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#6ee7b7" letter-spacing="2" opacity="0.9">DISTRIBUTED COMMUNITY DISTRIBUTION NETWORK</text>

  <!-- Community node 1: Church/faith org -->
  <g filter="url(#glow-blue)">
    <circle cx="110" cy="355" r="18" fill="#0a1a12" stroke="#10b981" stroke-width="1.8" opacity="0.95"/>
    <line x1="110" y1="341" x2="110" y2="343" stroke="#10b981" stroke-width="2.5"/>
    <polygon points="110,342 103,351 117,351" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="110" y="384" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#6ee7b7" opacity="0.85">FAITH ORG</text>
  </g>
  <!-- Community node 2: Cultural org -->
  <g filter="url(#glow-blue)">
    <circle cx="230" cy="355" r="18" fill="#0a1a12" stroke="#06b6d4" stroke-width="1.8" opacity="0.95"/>
    <rect x="222" y="347" width="16" height="12" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="230" y1="347" x2="230" y2="359" stroke="#06b6d4" stroke-width="1"/>
    <text x="230" y="384" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#67e8f9" opacity="0.85">CULTURAL ORG</text>
  </g>
  <!-- Community node 3: Mobile pantry -->
  <g filter="url(#glow-blue)">
    <circle cx="350" cy="355" r="18" fill="#0a1a12" stroke="#10b981" stroke-width="1.8" opacity="0.95"/>
    <!-- Simple truck shape -->
    <rect x="340" y="348" width="18" height="10" rx="1" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <rect x="352" y="345" width="7" height="7" rx="1" fill="none" stroke="#10b981" stroke-width="1"/>
    <circle cx="343" cy="360" r="2.5" fill="#10b981"/>
    <circle cx="355" cy="360" r="2.5" fill="#10b981"/>
    <text x="350" y="384" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#6ee7b7" opacity="0.85">MOBILE PANTRY</text>
  </g>
  <!-- Community node 4: Home delivery -->
  <g filter="url(#glow-blue)">
    <circle cx="450" cy="355" r="18" fill="#0a1a12" stroke="#06b6d4" stroke-width="1.8" opacity="0.95"/>
    <!-- House shape -->
    <polygon points="450,344 443,351 443,360 457,360 457,351" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="447" y="353" width="6" height="7" rx="1" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <text x="450" y="384" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#67e8f9" opacity="0.85">HOME DELIVERY</text>
  </g>
  <!-- Community node 5: School -->
  <g filter="url(#glow-blue)">
    <circle cx="570" cy="355" r="18" fill="#0a1a12" stroke="#10b981" stroke-width="1.8" opacity="0.95"/>
    <!-- Book icon -->
    <rect x="562" y="347" width="16" height="12" rx="1" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <line x1="570" y1="347" x2="570" y2="359" stroke="#10b981" stroke-width="1"/>
    <text x="570" y="384" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#6ee7b7" opacity="0.85">SCHOOL SITE</text>
  </g>
  <!-- Community node 6: Clinic -->
  <g filter="url(#glow-blue)">
    <circle cx="690" cy="355" r="18" fill="#0a1a12" stroke="#06b6d4" stroke-width="1.8" opacity="0.95"/>
    <!-- Medical cross -->
    <line x1="690" y1="345" x2="690" y2="365" stroke="#06b6d4" stroke-width="2.5"/>
    <line x1="680" y1="355" x2="700" y2="355" stroke="#06b6d4" stroke-width="2.5"/>
    <text x="690" y="384" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#67e8f9" opacity="0.85">HEALTH CLINIC</text>
  </g>

  <!-- Distribution lines from hub to community nodes -->
  <line x1="370" y1="240" x2="118" y2="337" stroke="url(#network-grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="380" y1="245" x2="230" y2="337" stroke="url(#network-grad)" stroke-width="1.5" opacity="0.65"/>
  <line x1="392" y1="248" x2="350" y2="337" stroke="url(#network-grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="408" y1="248" x2="450" y2="337" stroke="url(#network-grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="420" y1="245" x2="562" y2="337" stroke="url(#network-grad)" stroke-width="1.5" opacity="0.65"/>
  <line x1="430" y1="240" x2="682" y2="337" stroke="url(#network-grad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Outreach arrows on network lines (small triangles pointing outward) -->
  <g fill="#10b981" opacity="0.7">
    <polygon points="175,296 181,302 169,302"/>
    <polygon points="302,293 308,299 296,299"/>
    <polygon points="487,293 493,299 481,299"/>
    <polygon points="622,295 628,301 616,301"/>
  </g>

  <!-- Title at top center -->
  <text x="400" y="22" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#f8fafc" letter-spacing="0.5" opacity="0.95">Two Policy Crises, One Adaptive Response</text>

  <!-- Corner ambient glows -->
  <circle cx="0" cy="400" r="120" fill="#ef4444" opacity="0.025"/>
  <circle cx="800" cy="0" r="100" fill="#f59e0b" opacity="0.025"/>
  <circle cx="400" cy="400" r="160" fill="#10b981" opacity="0.03"/>
</svg>
