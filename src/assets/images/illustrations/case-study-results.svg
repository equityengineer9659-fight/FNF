<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="cs-grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cs-grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cs-grad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="cs-grad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Four result cards -->
  <!-- Card 1 -->
  <rect x="60" y="50" width="160" height="300" rx="14" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.25)" stroke-width="1.5"/>
  <rect x="60" y="50" width="160" height="50" rx="14" fill="rgba(124,58,237,0.12)"/>
  <rect x="60" y="86" width="160" height="14" fill="rgba(124,58,237,0.12)"/>
  <text x="140" y="80" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Metro Food Bank</text>
  <!-- Upward arrow -->
  <circle cx="140" cy="145" r="28" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <polyline points="130,152 140,132 150,152" stroke="url(#cs-grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="140" y1="132" x2="140" y2="158" stroke="url(#cs-grad1)" stroke-width="3" stroke-linecap="round"/>
  <text x="140" y="200" font-family="system-ui" font-size="30" font-weight="700" fill="url(#cs-grad1)" text-anchor="middle">60%</text>
  <text x="140" y="222" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Faster Service</text>
  <line x1="90" y1="242" x2="190" y2="242" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="140" y="270" font-family="system-ui" font-size="24" font-weight="700" fill="url(#cs-grad1)" text-anchor="middle">35%</text>
  <text x="140" y="292" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">More Capacity</text>
  <text x="140" y="330" font-family="system-ui" font-size="9" fill="rgba(124,58,237,0.6)" text-anchor="middle">8 sites connected</text>
  <!-- Card 2 -->
  <rect x="240" y="50" width="160" height="300" rx="14" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.25)" stroke-width="1.5"/>
  <rect x="240" y="50" width="160" height="50" rx="14" fill="rgba(14,165,233,0.12)"/>
  <rect x="240" y="86" width="160" height="14" fill="rgba(14,165,233,0.12)"/>
  <text x="320" y="80" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Community Harvest</text>
  <circle cx="320" cy="145" r="28" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <!-- Clock icon -->
  <circle cx="320" cy="145" r="14" stroke="#0ea5e9" stroke-width="1.5" fill="none"/>
  <line x1="320" y1="145" x2="320" y2="137" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
  <line x1="320" y1="145" x2="327" y2="148" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
  <text x="320" y="200" font-family="system-ui" font-size="30" font-weight="700" fill="url(#cs-grad2)" text-anchor="middle">15h</text>
  <text x="320" y="222" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Saved Weekly</text>
  <line x1="270" y1="242" x2="370" y2="242" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="320" y="270" font-family="system-ui" font-size="24" font-weight="700" fill="url(#cs-grad2)" text-anchor="middle">40%</text>
  <text x="320" y="292" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">More Funding</text>
  <text x="320" y="330" font-family="system-ui" font-size="9" fill="rgba(14,165,233,0.6)" text-anchor="middle">Auto-reports enabled</text>
  <!-- Card 3 -->
  <rect x="420" y="50" width="160" height="300" rx="14" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1.5"/>
  <rect x="420" y="50" width="160" height="50" rx="14" fill="rgba(16,185,129,0.12)"/>
  <rect x="420" y="86" width="160" height="14" fill="rgba(16,185,129,0.12)"/>
  <text x="500" y="80" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Hope Valley</text>
  <circle cx="500" cy="145" r="28" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <!-- Heart icon -->
  <path d="M500 157 C500 157 487 147 487 139 C487 133 492 129 497 131 C499 132 500 134 500 134 C500 134 501 132 503 131 C508 129 513 133 513 139 C513 147 500 157 500 157Z" fill="url(#cs-grad3)" opacity="0.8"/>
  <text x="500" y="200" font-family="system-ui" font-size="30" font-weight="700" fill="url(#cs-grad3)" text-anchor="middle">3x</text>
  <text x="500" y="222" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Client Satisfaction</text>
  <line x1="450" y1="242" x2="550" y2="242" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="500" y="270" font-family="system-ui" font-size="24" font-weight="700" fill="url(#cs-grad3)" text-anchor="middle">50%</text>
  <text x="500" y="292" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Less Waste</text>
  <text x="500" y="330" font-family="system-ui" font-size="9" fill="rgba(16,185,129,0.6)" text-anchor="middle">30+ cultures served</text>
  <!-- Card 4 -->
  <rect x="600" y="50" width="160" height="300" rx="14" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1.5"/>
  <rect x="600" y="50" width="160" height="50" rx="14" fill="rgba(245,158,11,0.12)"/>
  <rect x="600" y="86" width="160" height="14" fill="rgba(245,158,11,0.12)"/>
  <text x="680" y="80" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Regional Network</text>
  <circle cx="680" cy="145" r="28" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <!-- Network icon -->
  <circle cx="672" cy="138" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="688" cy="138" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="680" cy="152" r="4" fill="#f59e0b" opacity="0.7"/>
  <line x1="672" y1="138" x2="688" y2="138" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="672" y1="138" x2="680" y2="152" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="688" y1="138" x2="680" y2="152" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="680" y="200" font-family="system-ui" font-size="30" font-weight="700" fill="url(#cs-grad4)" text-anchor="middle">25%</text>
  <text x="680" y="222" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Less Waste</text>
  <line x1="630" y1="242" x2="730" y2="242" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="680" y="270" font-family="system-ui" font-size="24" font-weight="700" fill="url(#cs-grad4)" text-anchor="middle">12</text>
  <text x="680" y="292" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Pantries Connected</text>
  <text x="680" y="330" font-family="system-ui" font-size="9" fill="rgba(245,158,11,0.6)" text-anchor="middle">3 counties unified</text>
</svg>
