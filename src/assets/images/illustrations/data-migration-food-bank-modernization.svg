<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Data migration pipeline showing legacy systems flowing through audit, mapping, and validation stages into Salesforce Nonprofit Cloud">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="legG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="sfG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0176d3"/>
      <stop offset="100%" stop-color="#0b5cab"/>
    </linearGradient>
    <linearGradient id="auditG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="mapG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="valG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgG)"/>
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em" opacity="0.9">THE DATA MIGRATION PIPELINE</text>
  <line x1="260" y1="38" x2="540" y2="38" stroke="#fff" stroke-width="0.5" opacity="0.15"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT: Legacy Systems (source) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(80,185)">
    <rect x="-55" y="-65" width="110" height="130" rx="8" fill="url(#legG)" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Spreadsheet icon -->
    <rect x="-20" y="-45" width="40" height="30" rx="3" fill="none" stroke="#fca5a5" stroke-width="1.2"/>
    <line x1="-10" y1="-38" x2="10" y2="-38" stroke="#fca5a5" stroke-width="0.8" opacity="0.6"/>
    <line x1="-10" y1="-33" x2="10" y2="-33" stroke="#fca5a5" stroke-width="0.8" opacity="0.6"/>
    <line x1="-10" y1="-28" x2="10" y2="-28" stroke="#fca5a5" stroke-width="0.8" opacity="0.6"/>
    <line x1="-10" y1="-23" x2="5" y2="-23" stroke="#fca5a5" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="-45" x2="0" y2="-15" stroke="#fca5a5" stroke-width="0.5" opacity="0.4"/>
    <!-- Warning symbols -->
    <text x="-15" y="8" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">Duplicates</text>
    <text x="-18" y="20" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">Missing fields</text>
    <text x="-20" y="32" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">Inconsistencies</text>
    <text x="25" y="-48" fill="#ef4444" font-family="system-ui,sans-serif" font-size="10" opacity="0.5">!</text>
    <text x="25" y="-32" fill="#ef4444" font-family="system-ui,sans-serif" font-size="10" opacity="0.5">!</text>
  </g>
  <text x="80" y="135" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="0.06em">LEGACY SYSTEMS</text>
  <text x="80" y="147" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Spreadsheets, old CRM</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- STAGE 1: Data Audit (amber) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(260,185)">
    <rect x="-50" y="-50" width="100" height="100" rx="8" fill="url(#auditG)" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Magnifying glass icon -->
    <circle cx="-5" cy="-15" r="12" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="4" y1="-6" x2="12" y2="2" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <!-- Checklist lines -->
    <text x="-3" y="-18" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="8">?</text>
    <text x="-18" y="15" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Profile records</text>
    <text x="-18" y="26" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Find duplicates</text>
    <text x="-18" y="37" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Standardize</text>
  </g>
  <text x="260" y="135" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.06em">1. AUDIT</text>
  <text x="260" y="147" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Highest-ROI step</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- STAGE 2: Field Mapping (purple) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(430,185)">
    <rect x="-50" y="-50" width="100" height="100" rx="8" fill="url(#mapG)" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Mapping arrows icon -->
    <rect x="-22" y="-35" width="18" height="10" rx="2" fill="none" stroke="#c4b5fd" stroke-width="1"/>
    <rect x="4" y="-35" width="18" height="10" rx="2" fill="none" stroke="#c4b5fd" stroke-width="1"/>
    <rect x="-22" y="-18" width="18" height="10" rx="2" fill="none" stroke="#c4b5fd" stroke-width="1"/>
    <rect x="4" y="-18" width="18" height="10" rx="2" fill="none" stroke="#c4b5fd" stroke-width="1"/>
    <path d="M-2,-30 L2,-30" stroke="#c4b5fd" stroke-width="0.8"/>
    <path d="M-2,-13 L2,-20" stroke="#c4b5fd" stroke-width="0.8"/>
    <path d="M-2,-30 L2,-13" stroke="#c4b5fd" stroke-width="0.8" opacity="0.5"/>
    <text x="-18" y="15" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Old fields &#x2192; SF</text>
    <text x="-18" y="26" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Households</text>
    <text x="-18" y="37" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Contacts, gifts</text>
  </g>
  <text x="430" y="135" text-anchor="middle" fill="#8b5cf6" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.06em">2. MAP</text>
  <text x="430" y="147" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Relational structure</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- STAGE 3: Validate (green) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(600,185)">
    <rect x="-50" y="-50" width="100" height="100" rx="8" fill="url(#valG)" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Checkmark shield icon -->
    <path d="M-10,-30 L0,-38 L10,-30 L10,-15 Q0,-5 -10,-15 Z" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <path d="M-4,-22 L-1,-18 L5,-26" fill="none" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round"/>
    <text x="-18" y="15" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Test imports</text>
    <text x="-18" y="26" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Verify counts</text>
    <text x="-18" y="37" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Stakeholder sign-off</text>
  </g>
  <text x="600" y="135" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.06em">3. VALIDATE</text>
  <text x="600" y="147" text-anchor="middle" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Before go-live</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT: Salesforce (destination) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(730,185)">
    <rect x="-40" y="-50" width="80" height="100" rx="8" fill="url(#sfG)" fill-opacity="0.15" stroke="#0176d3" stroke-width="1.8" stroke-opacity="0.7" filter="url(#glow)"/>
    <!-- Cloud icon -->
    <ellipse cx="0" cy="-22" rx="18" ry="11" fill="none" stroke="#93c5fd" stroke-width="1.5"/>
    <ellipse cx="-10" cy="-17" rx="8" ry="6" fill="#1a1040" stroke="#93c5fd" stroke-width="1"/>
    <ellipse cx="10" cy="-17" rx="8" ry="6" fill="#1a1040" stroke="#93c5fd" stroke-width="1"/>
    <text x="0" y="8" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="7" font-weight="600">NONPROFIT</text>
    <text x="0" y="18" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="7" font-weight="600">CLOUD</text>
    <!-- Clean data indicator -->
    <text x="0" y="35" text-anchor="middle" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="8" opacity="0.7">Clean data</text>
  </g>
  <text x="730" y="135" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.06em">SALESFORCE</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Flow arrows between stages -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="138" y1="185" x2="205" y2="185" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="315" y1="185" x2="375" y2="185" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="485" y1="185" x2="545" y2="185" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="655" y1="185" x2="685" y2="185" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- BOTTOM: Culture & People layer -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="160" y="290" width="510" height="65" rx="8" fill="rgba(6,182,212,0.06)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="415" y="310" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.06em">ORGANIZATIONAL CULTURE (60% OF SUCCESS)</text>
  <g transform="translate(220,335)">
    <!-- Person icon -->
    <circle cx="0" cy="-5" r="4" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <path d="M-6,5 Q0,0 6,5" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <text x="15" y="0" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Staff training</text>
  </g>
  <g transform="translate(370,335)">
    <circle cx="0" cy="-5" r="4" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <path d="M-6,5 Q0,0 6,5" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <text x="15" y="0" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Data stewards</text>
  </g>
  <g transform="translate(530,335)">
    <circle cx="0" cy="-5" r="4" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <path d="M-6,5 Q0,0 6,5" fill="none" stroke="#67e8f9" stroke-width="1"/>
    <text x="15" y="0" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="8" opacity="0.8">Entry standards</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- TOP: Cost multiplier callout -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(260,60)">
    <rect x="-45" y="-12" width="90" height="24" rx="4" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="9" font-weight="600">1x cost here</text>
  </g>
  <g transform="translate(600,60)">
    <rect x="-55" y="-12" width="110" height="24" rx="4" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="9" font-weight="600">3-5x cost after</text>
  </g>
  <path d="M310,60 L545,60" stroke="#475569" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Bottom tagline -->
  <text x="400" y="390" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="8" opacity="0.3" letter-spacing="0.04em">LEGACY DATA &#x2192; AUDIT &#x2192; MAP &#x2192; VALIDATE &#x2192; CLEAN SALESFORCE ENVIRONMENT</text>
</svg>