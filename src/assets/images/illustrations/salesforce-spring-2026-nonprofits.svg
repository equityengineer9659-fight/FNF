<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dashboard-style illustration showing Spring 2026 Salesforce feature cards for nonprofit admins">
  <defs>
    <linearGradient id="ss26-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1a3a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ss26-cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="ss26-card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="ss26-card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="ss26-card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="ss26-card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#0176D3;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="ss26-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="ss26-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#ss26-bg)"/>

  <!-- Background cloud motif (large, subtle) -->
  <!-- Main cloud body -->
  <ellipse cx="400" cy="200" rx="300" ry="120" fill="url(#ss26-cloud)"/>
  <ellipse cx="280" cy="170" rx="130" ry="80" fill="url(#ss26-cloud)"/>
  <ellipse cx="520" cy="165" rx="130" ry="80" fill="url(#ss26-cloud)"/>
  <ellipse cx="400" cy="145" rx="110" ry="70" fill="url(#ss26-cloud)"/>

  <!-- Dashboard header bar -->
  <rect x="60" y="32" width="680" height="44" rx="8" fill="url(#ss26-header)" filter="url(#ss26-shadow)"/>
  <text x="90" y="54" font-family="system-ui" font-size="11" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="1">SALESFORCE SPRING 2026</text>
  <text x="400" y="54" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="0.5">Key Updates for Nonprofit Admins</text>
  <!-- Status dots in header -->
  <circle cx="674" cy="54" r="5" fill="rgba(52,211,153,0.9)"/>
  <circle cx="656" cy="54" r="5" fill="rgba(251,191,36,0.9)"/>
  <circle cx="638" cy="54" r="5" fill="rgba(255,255,255,0.3)"/>

  <!-- CARD 1: Agentforce (top left) -->
  <rect x="60" y="100" width="168" height="130" rx="12" fill="url(#ss26-card1)" filter="url(#ss26-shadow)"/>
  <!-- Card header accent -->
  <rect x="60" y="100" width="168" height="6" rx="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Icon: robot/agent symbol -->
  <circle cx="144" cy="138" r="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="144" y="144" font-family="system-ui" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.9)">🤖</text>
  <text x="144" y="168" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Agentforce</text>
  <text x="144" y="184" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">AI Agents for</text>
  <text x="144" y="196" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Nonprofit Cloud</text>
  <!-- New badge -->
  <rect x="74" y="208" width="140" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="144" y="219" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">NOW AVAILABLE ✓</text>

  <!-- CARD 2: Flow Builder (top right of col 1) -->
  <rect x="248" y="100" width="168" height="130" rx="12" fill="url(#ss26-card2)" filter="url(#ss26-shadow)"/>
  <rect x="248" y="100" width="168" height="6" rx="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Icon: flow symbol -->
  <circle cx="332" cy="138" r="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Flow arrows icon -->
  <path d="M 322 132 L 342 132 L 342 138 L 348 132 L 342 126 L 342 132" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" fill="none"/>
  <path d="M 322 144 L 332 144 L 332 138" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none"/>
  <text x="332" y="168" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Flow Builder</text>
  <text x="332" y="184" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Screen flow &amp;</text>
  <text x="332" y="196" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">table enhancements</text>
  <rect x="262" y="208" width="140" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="332" y="219" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">TEST IN SANDBOX FIRST</text>

  <!-- CARD 3: Health Check (bottom left) -->
  <rect x="436" y="100" width="168" height="130" rx="12" fill="url(#ss26-card3)" filter="url(#ss26-shadow)"/>
  <rect x="436" y="100" width="168" height="6" rx="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Shield icon -->
  <circle cx="520" cy="138" r="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <path d="M 520 122 L 530 126 L 530 136 Q 530 144 520 148 Q 510 144 510 136 L 510 126 Z" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
  <text x="520" y="142" font-family="system-ui" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">✓</text>
  <text x="520" y="168" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Health Check</text>
  <text x="520" y="184" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Updated NIST security</text>
  <text x="520" y="196" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">baselines &amp; flags</text>
  <rect x="450" y="208" width="140" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="520" y="219" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">REVIEW IMMEDIATELY !</text>

  <!-- CARD 4: Reports (far right) -->
  <rect x="624" y="100" width="116" height="130" rx="12" fill="url(#ss26-card4)" filter="url(#ss26-shadow)"/>
  <rect x="624" y="100" width="116" height="6" rx="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Chart icon -->
  <circle cx="682" cy="138" r="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="672" y="136" width="5" height="10" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="679" y="130" width="5" height="16" rx="1" fill="rgba(255,255,255,0.7)"/>
  <rect x="686" y="124" width="5" height="22" rx="1" fill="rgba(255,255,255,0.9)"/>
  <text x="682" y="168" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Reports</text>
  <text x="682" y="184" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Dynamic filters</text>
  <text x="682" y="196" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">&amp; cross-object</text>
  <rect x="634" y="208" width="96" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="682" y="219" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">SCHEDULE REVIEW</text>

  <!-- Bottom section: Priority guide -->
  <rect x="60" y="255" width="680" height="100" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="276" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">ADMIN PRIORITY GUIDE</text>

  <!-- Priority items -->
  <circle cx="106" cy="305" r="6" fill="rgba(239,68,68,0.8)"/>
  <text x="118" y="309" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(255,255,255,0.8)">Urgent</text>
  <text x="165" y="309" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">Health Check baselines, Agentforce permissions review</text>

  <circle cx="106" cy="330" r="6" fill="rgba(245,158,11,0.8)"/>
  <text x="118" y="334" font-family="system-ui" font-size="10" font-weight="600" fill="rgba(255,255,255,0.8)">Scheduled</text>
  <text x="175" y="334" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">Flow Builder enhancements, Reports cross-object review</text>

  <!-- Bottom label -->
  <text x="400" y="382" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">Salesforce Spring 2026 — Nonprofit Admin Release Guide</text>
</svg>
