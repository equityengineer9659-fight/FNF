<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Salesforce Flow Builder canvas showing a record-triggered flow with trigger, decision node, and branching actions">
  <defs>
    <linearGradient id="sfb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sfb-canvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#162032;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="sfb-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sfb-decision" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sfb-action" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sfb-update" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176D3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sfb-end" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#sfb-bg)" rx="12"/>

  <!-- Canvas area -->
  <rect x="16" y="48" width="768" height="316" rx="8" fill="url(#sfb-canvas)" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Grid dots pattern -->
  <pattern id="sfb-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1e3a5f" opacity="0.6"/>
  </pattern>
  <rect x="16" y="48" width="768" height="316" fill="url(#sfb-grid)" rx="8"/>

  <!-- Top bar (Flow Builder header) -->
  <rect x="16" y="12" width="768" height="34" rx="8" fill="rgba(1,118,211,0.2)" stroke="#0176D3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="32" y="33" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#7dd3fc">⚡ Flow Builder</text>
  <text x="160" y="33" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">New Client Onboarding — Record-Triggered Flow</text>
  <rect x="650" y="18" width="70" height="22" rx="4" fill="#0176D3"/>
  <text x="685" y="33" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Activate</text>
  <rect x="726" y="18" width="48" height="22" rx="4" fill="rgba(255,255,255,0.1)" stroke="#334155" stroke-width="1"/>
  <text x="750" y="33" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Debug</text>

  <!-- ===== FLOW ELEMENTS ===== -->

  <!-- START (rounded rectangle - trigger) -->
  <rect x="60" y="170" width="110" height="56" rx="28" fill="url(#sfb-blue)"/>
  <text x="115" y="193" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.8">TRIGGER</text>
  <text x="115" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Record Created</text>
  <text x="115" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle">Contact — New Client</text>
  <!-- Label below -->
  <text x="115" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">When: After Save</text>

  <!-- Connector line -->
  <line x1="170" y1="198" x2="215" y2="198" stroke="#0176D3" stroke-width="2" stroke-opacity="0.7"/>
  <polygon points="211,194 219,198 211,202" fill="#0176D3" opacity="0.7"/>

  <!-- DECISION diamond -->
  <polygon points="295,160 365,198 295,236 225,198" fill="url(#sfb-decision)"/>
  <text x="295" y="192" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">Is New</text>
  <text x="295" y="204" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">Client?</text>
  <!-- Label -->
  <text x="295" y="252" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Check: Record Type</text>

  <!-- YES label on branch -->
  <text x="400" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7">YES</text>
  <!-- Connector YES branch (right) -->
  <line x1="365" y1="198" x2="415" y2="198" stroke="#10b981" stroke-width="2" stroke-opacity="0.8"/>
  <polygon points="411,194 419,198 411,202" fill="#10b981" opacity="0.8"/>

  <!-- NO label on branch (down) -->
  <text x="310" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#f87171">NO</text>
  <!-- Connector NO branch (down) -->
  <line x1="295" y1="236" x2="295" y2="290" stroke="#f87171" stroke-width="2" stroke-opacity="0.7"/>
  <polygon points="291,286 295,294 299,286" fill="#f87171" opacity="0.7"/>

  <!-- ===== YES BRANCH (right column) ===== -->

  <!-- ACTION 1: Send Welcome Email -->
  <rect x="420" y="100" width="140" height="58" rx="6" fill="url(#sfb-action)"/>
  <text x="490" y="120" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.8">EMAIL ACTION</text>
  <text x="490" y="134" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Send Welcome Email</text>
  <text x="490" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#a7f3d0" text-anchor="middle">Template: Client_Welcome</text>

  <!-- Fork from decision YES up to email -->
  <line x1="490" y1="175" x2="490" y2="158" stroke="#10b981" stroke-width="2" stroke-opacity="0.8"/>
  <polygon points="486,162 490,154 494,162" fill="#10b981" opacity="0.8"/>
  <!-- Vertical from 198 to fork -->
  <line x1="490" y1="198" x2="490" y2="175" stroke="#10b981" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Horizontal from decision -->
  <line x1="419" y1="198" x2="490" y2="198" stroke="#10b981" stroke-width="2" stroke-opacity="0.8"/>

  <!-- Connector email → create task -->
  <line x1="560" y1="129" x2="600" y2="129" stroke="#10b981" stroke-width="2" stroke-opacity="0.7"/>
  <polygon points="596,125 604,129 596,133" fill="#10b981" opacity="0.7"/>

  <!-- ACTION 2: Create Intake Task -->
  <rect x="608" y="100" width="148" height="58" rx="6" fill="url(#sfb-action)"/>
  <text x="682" y="120" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.8">CREATE RECORD</text>
  <text x="682" y="134" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Create Intake Task</text>
  <text x="682" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#a7f3d0" text-anchor="middle">Assign to: Intake Coord.</text>

  <!-- Connector email → assign case worker -->
  <line x1="490" y1="129" x2="490" y2="248" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="4,3"/>

  <!-- ACTION 3: Assign Case Worker -->
  <rect x="420" y="252" width="140" height="58" rx="6" fill="url(#sfb-update)"/>
  <text x="490" y="272" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.8">UPDATE RECORD</text>
  <text x="490" y="286" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Assign Case Worker</text>
  <text x="490" y="300" font-family="system-ui, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle">By: Zip Code → Staff</text>

  <!-- Connector case worker → end -->
  <line x1="560" y1="281" x2="608" y2="281" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.7"/>
  <polygon points="604,277 612,281 604,285" fill="#06b6d4" opacity="0.7"/>

  <!-- END circle (yes branch) -->
  <circle cx="640" cy="281" r="24" fill="url(#sfb-end)" stroke="#475569" stroke-width="2"/>
  <text x="640" y="276" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">END</text>
  <text x="640" y="289" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Success</text>

  <!-- ===== NO BRANCH (down) ===== -->
  <!-- UPDATE RECORD: Update Existing Contact -->
  <rect x="228" y="294" width="140" height="50" rx="6" fill="url(#sfb-update)" opacity="0.8"/>
  <text x="298" y="312" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.8">UPDATE RECORD</text>
  <text x="298" y="326" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Update Visit Count</text>
  <text x="298" y="340" font-family="system-ui, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle">Increment last_visit date</text>

  <!-- Connector to end (no branch) -->
  <line x1="368" y1="319" x2="414" y2="319" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.7"/>
  <polygon points="410,315 418,319 410,323" fill="#06b6d4" opacity="0.7"/>

  <!-- END circle (no branch) -->
  <circle cx="444" cy="319" r="22" fill="url(#sfb-end)" stroke="#475569" stroke-width="2"/>
  <text x="444" y="315" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle">END</text>
  <text x="444" y="328" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Updated</text>

  <!-- Legend -->
  <rect x="620" y="225" width="148" height="94" rx="6" fill="rgba(0,0,0,0.4)" stroke="#334155" stroke-width="1"/>
  <text x="694" y="243" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle">Legend</text>
  <rect x="630" y="251" width="10" height="10" rx="5" fill="#0176D3"/>
  <text x="646" y="261" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Trigger</text>
  <polygon points="647,272 657,276 647,280 637,276" fill="#8b5cf6"/>
  <text x="662" y="280" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Decision</text>
  <rect x="630" y="288" width="10" height="10" rx="2" fill="#059669"/>
  <text x="646" y="297" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Action / Create</text>
  <rect x="630" y="304" width="10" height="10" rx="2" fill="#0176D3"/>
  <text x="646" y="313" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Update Record</text>

  <text x="400" y="393" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">food-n-force.com · Salesforce Flow Builder for Nonprofits</text>
</svg>
