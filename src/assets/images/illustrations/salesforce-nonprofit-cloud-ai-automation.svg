<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Three-layer technology architecture diagram: Nonprofit Cloud data foundation at bottom, event-triggered automation in the middle, and ambient AI intelligence at top, with data flowing upward through each layer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <linearGradient id="layer1-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="layer2-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="layer3-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="flow-blue" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="flow-purple" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#4f6280" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- ── LAYER 1: Nonprofit Cloud Foundation ── -->
  <rect x="60" y="298" width="680" height="72" rx="6" fill="url(#layer1-grad)" opacity="0.85"/>
  <rect x="60" y="298" width="680" height="72" rx="6" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <text x="400" y="323" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#e0f2fe" letter-spacing="2" opacity="0.9">NONPROFIT CLOUD</text>
  <text x="400" y="341" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#bae6fd" letter-spacing="1" opacity="0.75">UNIFIED DATA FOUNDATION</text>

  <!-- Data record icons in layer 1 -->
  <g opacity="0.8">
    <rect x="90" y="312" width="26" height="20" rx="2" fill="#075985" stroke="#06b6d4" stroke-width="0.8"/>
    <rect x="93" y="316" width="8" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="93" y="319" width="13" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="93" y="322" width="10" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <text x="103" y="342" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#93c5fd">Clients</text>

    <rect x="128" y="312" width="26" height="20" rx="2" fill="#075985" stroke="#06b6d4" stroke-width="0.8"/>
    <rect x="131" y="316" width="8" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="131" y="319" width="13" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="131" y="322" width="10" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <text x="141" y="342" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#93c5fd">Donors</text>

    <rect x="166" y="312" width="26" height="20" rx="2" fill="#075985" stroke="#06b6d4" stroke-width="0.8"/>
    <rect x="169" y="316" width="8" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="169" y="319" width="13" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="169" y="322" width="10" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <text x="179" y="342" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#93c5fd">Inventory</text>

    <rect x="204" y="312" width="26" height="20" rx="2" fill="#075985" stroke="#06b6d4" stroke-width="0.8"/>
    <rect x="207" y="316" width="8" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="207" y="319" width="13" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <rect x="207" y="322" width="10" height="1.5" rx="0.5" fill="#7dd3fc"/>
    <text x="217" y="342" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7.5" fill="#93c5fd">Volunteers</text>
  </g>

  <!-- ── LAYER 2: Automation ── -->
  <rect x="80" y="196" width="640" height="72" rx="6" fill="url(#layer2-grad)" opacity="0.85"/>
  <rect x="80" y="196" width="640" height="72" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <text x="400" y="221" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ede9fe" letter-spacing="2" opacity="0.9">EVENT-TRIGGERED AUTOMATION</text>
  <text x="400" y="239" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#ddd6fe" letter-spacing="1" opacity="0.75">REAL-TIME FLOWS &amp; WORKFLOWS</text>

  <!-- Automation event nodes -->
  <circle cx="168" cy="248" r="12" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.2" opacity="0.95"/>
  <text x="168" y="252" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#ddd6fe">INTAKE</text>
  <circle cx="298" cy="248" r="12" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.2" opacity="0.95"/>
  <text x="298" y="252" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#ddd6fe">ROUTE</text>
  <circle cx="428" cy="248" r="12" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.2" opacity="0.95"/>
  <text x="428" y="252" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#ddd6fe">ALERT</text>
  <circle cx="558" cy="248" r="12" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.2" opacity="0.95"/>
  <text x="558" y="252" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="7" fill="#ddd6fe">REPORT</text>

  <!-- Automation flow lines -->
  <g stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6" fill="none">
    <line x1="180" y1="248" x2="286" y2="248"/>
    <line x1="310" y1="248" x2="416" y2="248"/>
    <line x1="440" y1="248" x2="546" y2="248"/>
  </g>

  <!-- ── LAYER 3: AI Intelligence ── -->
  <rect x="100" y="94" width="600" height="72" rx="6" fill="url(#layer3-grad)" opacity="0.85"/>
  <rect x="100" y="94" width="600" height="72" rx="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="400" y="119" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#fef3c7" letter-spacing="2" opacity="0.9">AMBIENT AI INTELLIGENCE</text>
  <text x="400" y="137" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9" fill="#fde68a" letter-spacing="1" opacity="0.75">ENTERPRISE GENERAL INTELLIGENCE</text>

  <!-- AI neural network nodes -->
  <g filter="url(#glow)">
    <circle cx="178" cy="147" r="7" fill="#78350f" stroke="#f59e0b" stroke-width="1.2"/>
    <circle cx="258" cy="141" r="5" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
    <circle cx="338" cy="149" r="7" fill="#78350f" stroke="#f59e0b" stroke-width="1.2"/>
    <circle cx="400" cy="143" r="5" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
    <circle cx="462" cy="149" r="7" fill="#78350f" stroke="#f59e0b" stroke-width="1.2"/>
    <circle cx="542" cy="141" r="5" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
    <circle cx="622" cy="147" r="7" fill="#78350f" stroke="#f59e0b" stroke-width="1.2"/>
    <line x1="178" y1="147" x2="258" y2="141" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
    <line x1="258" y1="141" x2="338" y2="149" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
    <line x1="338" y1="149" x2="400" y2="143" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
    <line x1="400" y1="143" x2="462" y2="149" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
    <line x1="462" y1="149" x2="542" y2="141" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
    <line x1="542" y1="141" x2="622" y2="147" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
  </g>

  <!-- ── Flow pillars L1 → L2 ── -->
  <rect x="193" y="270" width="5" height="26" rx="2" fill="url(#flow-blue)" opacity="0.9"/>
  <rect x="326" y="270" width="5" height="26" rx="2" fill="url(#flow-blue)" opacity="0.9"/>
  <rect x="458" y="270" width="5" height="26" rx="2" fill="url(#flow-blue)" opacity="0.9"/>
  <rect x="590" y="270" width="5" height="26" rx="2" fill="url(#flow-blue)" opacity="0.9"/>
  <g fill="#06b6d4" opacity="0.85">
    <polygon points="193,270 198,270 195.5,265"/>
    <polygon points="326,270 331,270 328.5,265"/>
    <polygon points="458,270 463,270 460.5,265"/>
    <polygon points="590,270 595,270 592.5,265"/>
  </g>

  <!-- ── Flow pillars L2 → L3 ── -->
  <rect x="228" y="168" width="5" height="26" rx="2" fill="url(#flow-purple)" opacity="0.9"/>
  <rect x="362" y="168" width="5" height="26" rx="2" fill="url(#flow-purple)" opacity="0.9"/>
  <rect x="496" y="168" width="5" height="26" rx="2" fill="url(#flow-purple)" opacity="0.9"/>
  <g fill="#8b5cf6" opacity="0.85">
    <polygon points="228,168 233,168 230.5,163"/>
    <polygon points="362,168 367,168 364.5,163"/>
    <polygon points="496,168 501,168 498.5,163"/>
  </g>

  <!-- ── Outcome badges ── -->
  <rect x="700" y="107" width="76" height="20" rx="4" fill="#1c1917" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="738" y="121" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" fill="#fde68a">Predictions</text>
  <rect x="700" y="209" width="76" height="20" rx="4" fill="#1c1917" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="738" y="223" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" fill="#ddd6fe">Workflows</text>
  <rect x="700" y="311" width="76" height="20" rx="4" fill="#1c1917" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="738" y="325" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="8" fill="#bae6fd">Records</text>

  <!-- ── Title ── -->
  <text x="380" y="50" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#f8fafc" letter-spacing="0.5">From Records to Real-Time: The FNF Technology Stack</text>
  <text x="380" y="68" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="9.5" fill="#94a3b8" letter-spacing="0.5">Nonprofit Cloud  ·  Event Automation  ·  Ambient AI</text>

  <!-- Corner glows -->
  <circle cx="0" cy="400" r="160" fill="#06b6d4" opacity="0.03"/>
  <circle cx="800" cy="0" r="140" fill="#8b5cf6" opacity="0.04"/>
</svg>
