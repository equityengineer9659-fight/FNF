<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Abstract geometric diagram showing three concentric hexagonal rings representing layered technology capabilities: innermost ring depicts a structured data grid for Nonprofit Cloud, middle ring shows flowing arrows for event-triggered automation, and outer ring displays connected nodes representing ambient AI intelligence, on a dark gradient background with teal, slate blue, and amber accents">
  <defs>
    <linearGradient id="npc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="npc-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="npc-teal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0176D3"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="npc-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="npc-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="npc-glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="npc-glow-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#npc-bg)"/>

  <!-- Subtle background grid pattern -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="650" y1="0" x2="650" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
  </g>

  <!-- CENTER: Innermost hexagon - Structured data grid (Nonprofit Cloud) -->
  <!-- Hexagon centered at 400,200 with radius ~60 -->
  <!-- Inner glow base -->
  <polygon points="400,140 452,170 452,230 400,260 348,230 348,170"
    fill="#0176D3" fill-opacity="0.15" stroke="url(#npc-teal)" stroke-width="2"
    filter="url(#npc-glow-lg)"/>

  <!-- Data grid inside inner hex -->
  <g clip-path="none" opacity="0.85">
    <!-- Horizontal grid lines inside hex -->
    <line x1="358" y1="178" x2="442" y2="178" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="354" y1="192" x2="446" y2="192" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="354" y1="206" x2="446" y2="206" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="356" y1="220" x2="444" y2="220" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="362" y1="234" x2="438" y2="234" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <!-- Vertical grid lines inside hex -->
    <line x1="370" y1="148" x2="370" y2="252" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="385" y1="142" x2="385" y2="258" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="400" y1="140" x2="400" y2="260" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="415" y1="142" x2="415" y2="258" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <line x1="430" y1="148" x2="430" y2="252" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Grid cell highlights -->
  <rect x="370" y="178" width="15" height="14" fill="#0176D3" fill-opacity="0.5" rx="1"/>
  <rect x="400" y="192" width="15" height="14" fill="#06b6d4" fill-opacity="0.4" rx="1"/>
  <rect x="385" y="206" width="15" height="14" fill="#0176D3" fill-opacity="0.5" rx="1"/>
  <rect x="415" y="178" width="15" height="14" fill="#06b6d4" fill-opacity="0.35" rx="1"/>
  <rect x="370" y="220" width="15" height="14" fill="#06b6d4" fill-opacity="0.3" rx="1"/>

  <!-- Inner hex border -->
  <polygon points="400,140 452,170 452,230 400,260 348,230 348,170"
    fill="none" stroke="url(#npc-teal)" stroke-width="2.5" filter="url(#npc-glow-sm)"/>

  <!-- Center dot -->
  <circle cx="400" cy="200" r="6" fill="url(#npc-teal)" filter="url(#npc-glow)"/>
  <circle cx="400" cy="200" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- MIDDLE RING: Event-triggered automation arrows -->
  <!-- Middle hexagon radius ~115 -->
  <polygon points="400,85 500,143 500,257 400,315 300,257 300,143"
    fill="#8b5cf6" fill-opacity="0.07" stroke="url(#npc-purple)" stroke-width="1.5"
    filter="url(#npc-glow)"/>

  <!-- Flowing arrows on middle ring edges -->
  <!-- Top-right edge arrow -->
  <g filter="url(#npc-glow-sm)">
    <!-- Arrow along top-right edge -->
    <polyline points="440,107 465,121 470,131" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" marker-end="none"/>
    <polygon points="470,131 462,120 478,122" fill="#8b5cf6" opacity="0.9"/>

    <!-- Arrow along right edge -->
    <polyline points="498,165 501,188 499,211" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="499,211 492,200 506,199" fill="#f59e0b" opacity="0.9"/>

    <!-- Arrow along bottom-right edge -->
    <polyline points="472,271 455,284 438,293" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="438,293 449,282 447,297" fill="#8b5cf6" opacity="0.9"/>

    <!-- Arrow along bottom-left edge -->
    <polyline points="362,295 342,281 323,268" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="323,268 335,279 321,282" fill="#f59e0b" opacity="0.9"/>

    <!-- Arrow along left edge -->
    <polyline points="301,233 299,210 301,187" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="301,187 294,198 308,199" fill="#8b5cf6" opacity="0.9"/>

    <!-- Arrow along top-left edge -->
    <polyline points="328,129 347,115 368,104" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="368,104 355,113 358,98" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Pulse nodes at middle hex vertices -->
  <g filter="url(#npc-glow)">
    <circle cx="400" cy="85" r="5" fill="#f59e0b" opacity="0.9"/>
    <circle cx="500" cy="143" r="5" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="500" cy="257" r="5" fill="#f59e0b" opacity="0.9"/>
    <circle cx="400" cy="315" r="5" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="300" cy="257" r="5" fill="#f59e0b" opacity="0.9"/>
    <circle cx="300" cy="143" r="5" fill="#8b5cf6" opacity="0.9"/>
  </g>

  <!-- Inner connector lines from center to middle ring -->
  <g opacity="0.3" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,6">
    <line x1="400" y1="140" x2="400" y2="85"/>
    <line x1="452" y1="170" x2="500" y2="143"/>
    <line x1="452" y1="230" x2="500" y2="257"/>
    <line x1="400" y1="260" x2="400" y2="315"/>
    <line x1="348" y1="230" x2="300" y2="257"/>
    <line x1="348" y1="170" x2="300" y2="143"/>
  </g>

  <!-- OUTER RING: Ambient AI nodes and luminous connections -->
  <!-- Outer hexagon radius ~175 -->
  <polygon points="400,25 552,112 552,287 400,375 248,287 248,112"
    fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"
    stroke-dasharray="8,4" filter="url(#npc-glow-sm)"/>

  <!-- Scattered AI nodes -->
  <g filter="url(#npc-glow)">
    <!-- Top cluster -->
    <circle cx="400" cy="32" r="7" fill="#10b981" opacity="0.9"/>
    <circle cx="370" cy="48" r="4" fill="#06b6d4" opacity="0.8"/>
    <circle cx="430" cy="48" r="4" fill="#8b5cf6" opacity="0.8"/>

    <!-- Top-right cluster -->
    <circle cx="510" cy="80" r="7" fill="#f59e0b" opacity="0.9"/>
    <circle cx="535" cy="100" r="4" fill="#10b981" opacity="0.8"/>
    <circle cx="528" cy="128" r="5" fill="#06b6d4" opacity="0.8"/>

    <!-- Right cluster -->
    <circle cx="553" cy="175" r="7" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="558" cy="200" r="4" fill="#10b981" opacity="0.8"/>
    <circle cx="553" cy="225" r="5" fill="#f59e0b" opacity="0.8"/>

    <!-- Bottom-right cluster -->
    <circle cx="530" cy="272" r="7" fill="#06b6d4" opacity="0.9"/>
    <circle cx="510" cy="295" r="4" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="488" cy="314" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Bottom cluster -->
    <circle cx="400" cy="368" r="7" fill="#f59e0b" opacity="0.9"/>
    <circle cx="370" cy="353" r="4" fill="#06b6d4" opacity="0.8"/>
    <circle cx="430" cy="353" r="4" fill="#8b5cf6" opacity="0.8"/>

    <!-- Bottom-left cluster -->
    <circle cx="270" cy="314" r="7" fill="#10b981" opacity="0.9"/>
    <circle cx="248" cy="290" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="255" cy="265" r="5" fill="#06b6d4" opacity="0.8"/>

    <!-- Left cluster
  </g>
</svg>