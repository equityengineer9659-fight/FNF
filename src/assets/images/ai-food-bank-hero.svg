<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d2847"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>

    <!-- Cyan glow gradient -->
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue glow gradient -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0176d3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0176d3" stop-opacity="0"/>
    </radialGradient>

    <!-- Node gradient -->
    <radialGradient id="nodeGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4dd8ff"/>
      <stop offset="100%" stop-color="#0176d3"/>
    </radialGradient>

    <!-- AI brain gradient -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0176d3"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- Data flow gradient -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Pulse animation filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(1,118,211,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Ambient glow effects -->
  <ellipse cx="400" cy="260" rx="300" ry="200" fill="url(#glowBlue)"/>
  <ellipse cx="350" cy="300" rx="180" ry="150" fill="url(#glowCyan)" opacity="0.5"/>

  <!-- Neural network connections (background layer) -->
  <g stroke="rgba(0,212,255,0.12)" stroke-width="1" fill="none">
    <!-- Outer network lines -->
    <line x1="80" y1="120" x2="200" y2="200"/>
    <line x1="200" y1="200" x2="340" y2="180"/>
    <line x1="340" y1="180" x2="460" y2="200"/>
    <line x1="460" y1="200" x2="600" y2="160"/>
    <line x1="600" y1="160" x2="720" y2="130"/>
    <line x1="80" y1="480" x2="200" y2="400"/>
    <line x1="200" y1="400" x2="340" y2="420"/>
    <line x1="340" y1="420" x2="460" y2="400"/>
    <line x1="460" y1="400" x2="600" y2="440"/>
    <line x1="600" y1="440" x2="720" y2="470"/>
    <!-- Cross connections -->
    <line x1="200" y1="200" x2="260" y2="300"/>
    <line x1="340" y1="180" x2="340" y2="300"/>
    <line x1="460" y1="200" x2="460" y2="300"/>
    <line x1="600" y1="160" x2="540" y2="300"/>
    <line x1="200" y1="400" x2="260" y2="300"/>
    <line x1="340" y1="420" x2="340" y2="300"/>
    <line x1="460" y1="400" x2="460" y2="300"/>
    <line x1="600" y1="440" x2="540" y2="300"/>
  </g>

  <!-- Central AI circuit brain -->
  <g transform="translate(400,280)" filter="url(#softGlow)">
    <!-- Brain outline - abstract circuit -->
    <ellipse cx="0" cy="0" rx="95" ry="80" fill="none" stroke="url(#brainGrad)" stroke-width="1.5" opacity="0.6" stroke-dasharray="8,4"/>
    <ellipse cx="0" cy="0" rx="70" ry="58" fill="none" stroke="url(#brainGrad)" stroke-width="1" opacity="0.4" stroke-dasharray="4,6"/>

    <!-- Inner circuit paths -->
    <g stroke="#00d4ff" stroke-width="1.2" fill="none" opacity="0.7">
      <path d="M-40,-30 L-20,-30 L-20,-10 L0,-10 L0,10 L20,10 L20,30 L40,30"/>
      <path d="M-35,15 L-15,15 L-15,-5 L15,-5 L15,15 L35,15"/>
      <path d="M0,-45 L0,-25 L-20,-25"/>
      <path d="M0,45 L0,25 L20,25"/>
      <path d="M-55,0 L-35,0"/>
      <path d="M35,0 L55,0"/>
    </g>

    <!-- Central processor node -->
    <circle cx="0" cy="0" r="12" fill="#0d2847" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#00d4ff" opacity="0.8"/>
    <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#0a1628" font-family="monospace" font-size="7" font-weight="bold">AI</text>

    <!-- Circuit junction nodes -->
    <circle cx="-20" cy="-30" r="4" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="20" cy="10" r="4" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="-15" cy="15" r="3.5" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="15" cy="-5" r="3.5" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="40" cy="30" r="4" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="-40" cy="-30" r="4" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="0" cy="-45" r="3" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="0" cy="45" r="3" fill="#0176d3" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <!-- Left side: Supply chain icons -->
  <g transform="translate(140,260)" filter="url(#glow)">
    <!-- Warehouse/Distribution icon -->
    <rect x="-28" y="-20" width="56" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-28" y1="-8" x2="28" y2="-8" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <rect x="-18" y="-2" width="12" height="14" rx="1" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <rect x="6" y="-2" width="12" height="14" rx="1" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Roof -->
    <path d="M-32,-20 L0,-35 L32,-20" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Data flow lines from left to center -->
  <g opacity="0.6">
    <line x1="185" y1="255" x2="295" y2="270" stroke="url(#flowGrad)" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="185" y1="265" x2="295" y2="280" stroke="url(#flowGrad)" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="185" y1="275" x2="295" y2="290" stroke="url(#flowGrad)" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Right side: Community/People icon -->
  <g transform="translate(660,260)" filter="url(#glow)">
    <!-- People silhouettes -->
    <circle cx="-15" cy="-18" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <path d="M-30,-4 Q-15,-12 0,-4 L0,18 L-30,18 Z" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" rx="3"/>
    <circle cx="15" cy="-22" r="7" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6"/>
    <path d="M3,-8 Q15,-15 27,-8 L27,14 L3,14 Z" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5" rx="3"/>
  </g>

  <!-- Data flow lines from center to right -->
  <g opacity="0.6">
    <line x1="505" y1="270" x2="620" y2="255" stroke="url(#flowGrad)" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="505" y1="280" x2="620" y2="265" stroke="url(#flowGrad)" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="505" y1="290" x2="620" y2="275" stroke="url(#flowGrad)" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Top: Analytics/Chart icon -->
  <g transform="translate(400,120)" filter="url(#glow)">
    <!-- Chart frame -->
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
    <!-- Bar chart -->
    <rect x="-20" y="5" width="8" height="15" fill="#0176d3" opacity="0.6" rx="1"/>
    <rect x="-8" y="-5" width="8" height="25" fill="#00d4ff" opacity="0.5" rx="1"/>
    <rect x="4" y="-10" width="8" height="30" fill="#0176d3" opacity="0.6" rx="1"/>
    <rect x="16" y="0" width="8" height="20" fill="#00d4ff" opacity="0.5" rx="1"/>
    <!-- Trend line -->
    <polyline points="-16,8 -4,-2 8,-8 20,2" fill="none" stroke="#4dd8ff" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Data flow from top to center -->
  <g opacity="0.5">
    <line x1="400" y1="155" x2="400" y2="195" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>

  <!-- Bottom: Food/Grocery icon -->
  <g transform="translate(400,440)" filter="url(#glow)">
    <!-- Shopping bag / food box -->
    <rect x="-25" y="-15" width="50" height="35" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <path d="M-12,-15 L-12,-25 Q0,-35 12,-25 L12,-15" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
    <!-- Apple/food inside -->
    <circle cx="0" cy="3" r="8" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <path d="M0,-5 Q3,-10 5,-7" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Data flow from center to bottom -->
  <g opacity="0.5">
    <line x1="400" y1="365" x2="400" y2="415" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>

  <!-- Floating data particles -->
  <g fill="#00d4ff">
    <circle cx="120" cy="180" r="2" opacity="0.4"/>
    <circle cx="250" cy="140" r="1.5" opacity="0.3"/>
    <circle cx="550" cy="150" r="2" opacity="0.4"/>
    <circle cx="680" cy="190" r="1.5" opacity="0.3"/>
    <circle cx="160" cy="380" r="1.5" opacity="0.3"/>
    <circle cx="280" cy="430" r="2" opacity="0.4"/>
    <circle cx="520" cy="420" r="1.5" opacity="0.3"/>
    <circle cx="650" cy="370" r="2" opacity="0.4"/>
    <circle cx="100" cy="300" r="1.5" opacity="0.25"/>
    <circle cx="700" cy="310" r="1.5" opacity="0.25"/>
    <circle cx="320" cy="100" r="1.5" opacity="0.2"/>
    <circle cx="480" cy="500" r="1.5" opacity="0.2"/>
  </g>

  <!-- Network outer nodes -->
  <g filter="url(#glow)">
    <circle cx="80" cy="120" r="4" fill="url(#nodeGrad)" opacity="0.6"/>
    <circle cx="200" cy="200" r="5" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="340" cy="180" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="460" cy="200" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="600" cy="160" r="5" fill="url(#nodeGrad)" opacity="0.6"/>
    <circle cx="720" cy="130" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="80" cy="480" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="200" cy="400" r="5" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="340" cy="420" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="460" cy="400" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
    <circle cx="600" cy="440" r="5" fill="url(#nodeGrad)" opacity="0.6"/>
    <circle cx="720" cy="470" r="4" fill="url(#nodeGrad)" opacity="0.5"/>
  </g>

  <!-- Subtle label text -->
  <g font-family="'Segoe UI', system-ui, sans-serif" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle" letter-spacing="0.5">
    <text x="140" y="310" font-size="9">SUPPLY CHAIN</text>
    <text x="660" y="310" font-size="9">COMMUNITIES</text>
    <text x="400" y="92" font-size="9">ANALYTICS</text>
    <text x="400" y="490" font-size="9">FOOD RELIEF</text>
  </g>
</svg>
