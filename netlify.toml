# Netlify Configuration File

[build]
  # Build command
  command = "npm run build"
  # Directory to publish
  publish = "dist"
  # Node version for builds
  environment = { NODE_VERSION = "18" }

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Language = ["en"]}

# Headers (these merge with _headers file)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "0"

# Dev settings
[dev]
  command = "npm run dev"
  port = 4173
