<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" aria-labelledby="logo-title-white" role="img">
  <title id="logo-title-white">Food-N-Force Logo - White Variant</title>
  <defs>
    <!-- White/light theme gradients -->
    <linearGradient id="outerGradWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#F8F9FA;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E9ECEF;stop-opacity:0.85" />
    </linearGradient>
    
    <!-- Inner light background -->
    <linearGradient id="innerGradWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E9ECEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEE2E6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dark text shadow for white background -->
    <filter id="textShadowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Outer rounded rectangle -->
  <rect x="20" y="20" width="360" height="360" rx="60" ry="60" 
        fill="url(#outerGradWhite)" 
        stroke="#DEE2E6" stroke-width="2"
        style="filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1))"/>
  
  <!-- Inner rounded rectangle -->
  <rect x="60" y="60" width="280" height="280" rx="40" ry="40" 
        fill="url(#innerGradWhite)" 
        stroke="#CED4DA" stroke-width="1"/>
  
  <!-- F-n-F Text -->
  <text x="200" y="230" 
        font-family="'Orbitron', Arial, sans-serif" 
        font-weight="700" 
        font-size="72" 
        fill="#1B96FF" 
        text-anchor="middle" 
        dominant-baseline="middle"
        filter="url(#textShadowDark)">F-n-F</text>
</svg>