<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" aria-labelledby="logo-title" role="img">
  <title id="logo-title">Food-N-Force Logo</title>
  <defs>
    <!-- Outer gradient background -->
    <linearGradient id="outerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#357ABD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F8E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner dark background -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A2F4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162535;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text shadow filter -->
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer rounded rectangle -->
  <rect x="20" y="20" width="360" height="360" rx="60" ry="60" 
        fill="url(#outerGrad)" 
        style="filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25))"/>
  
  <!-- Inner rounded rectangle -->
  <rect x="60" y="60" width="280" height="280" rx="40" ry="40" 
        fill="url(#innerGrad)" 
        style="filter: drop-shadow(inset 0 4px 8px rgba(0,0,0,0.2))"/>
  
  <!-- F-n-F Text -->
  <text x="200" y="230" 
        font-family="'Orbitron', Arial, sans-serif" 
        font-weight="700" 
        font-size="72" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        dominant-baseline="middle"
        filter="url(#textShadow)">F-n-F</text>
</svg>