<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-labelledby="logo-icon-title" role="img">
  <title id="logo-icon-title">Food-N-Force Icon</title>
  <defs>
    <!-- Icon gradient background -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#357ABD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F8E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner dark background -->
    <linearGradient id="iconInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A2F4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162535;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text shadow filter -->
    <filter id="iconTextShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Outer rounded rectangle -->
  <rect x="5" y="5" width="90" height="90" rx="15" ry="15" 
        fill="url(#iconGrad)" 
        style="filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2))"/>
  
  <!-- Inner rounded rectangle -->
  <rect x="15" y="15" width="70" height="70" rx="10" ry="10" 
        fill="url(#iconInner)"/>
  
  <!-- F-n-F Text -->
  <text x="50" y="57" 
        font-family="'Orbitron', Arial, sans-serif" 
        font-weight="700" 
        font-size="18" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        dominant-baseline="middle"
        filter="url(#iconTextShadow)">F-n-F</text>
</svg>