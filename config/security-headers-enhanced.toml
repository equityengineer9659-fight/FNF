# PHASE 4.2: COMPREHENSIVE SECURITY HARDENING IMPLEMENTATION
# Enhanced HTML-First Architecture - Security Headers Configuration

# Enhanced Security Headers for Production
[[headers]]
  for = "/*"
  [headers.values]
    # HSTS - HTTP Strict Transport Security (365 days)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Enhanced Security Headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Enhanced Permissions Policy (disable unused features)
    Permissions-Policy = """
      camera=(), 
      microphone=(), 
      geolocation=(), 
      payment=(), 
      usb=(), 
      magnetometer=(), 
      gyroscope=(), 
      accelerometer=(), 
      ambient-light-sensor=(), 
      autoplay=(), 
      encrypted-media=(), 
      fullscreen=(self), 
      picture-in-picture=()
    """
    
    # Enhanced Content Security Policy for Premium Effects
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https:;
      connect-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      media-src 'none';
      worker-src 'none';
      manifest-src 'self';
      upgrade-insecure-requests;
      block-all-mixed-content;
    """
    
    # Security reporting
    Report-To = """{"group":"csp","max_age":31536000,"endpoints":[{"url":"https://foodnforce.report-uri.com/r/d/csp/enforce"}]}"""
    Content-Security-Policy-Report-Only = """
      default-src 'self'; 
      report-uri https://foodnforce.report-uri.com/r/d/csp/reportOnly; 
      report-to csp;
    """

# HTTPS Redirect Configuration
[[redirects]]
  from = "http://foodnforce.com/*"
  to = "https://foodnforce.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.foodnforce.com/*"
  to = "https://foodnforce.com/:splat"
  status = 301
  force = true
